<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Endosymbiosis: From Bacteria to Organelles</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #162033;
      --muted: #526070;
      --line: #d8e1ed;
      --host: #5667c9;
      --host-dark: #3644a1;
      --host-fill: #dfe7ff;
      --bact: #e36b2c;
      --bact-dark: #b64222;
      --bact-fill: #ffe1cd;
      --cyano: #2fa85e;
      --cyano-dark: #167746;
      --cyano-fill: #d8f4df;
      --dna: #3d236a;
      --mito: #f08a3e;
      --chlor: #40b36d;
      --button: #273766;
      --button-soft: #eef2ff;
      --focus: #1f7ad7;
      --shadow: 0 18px 40px rgba(42, 53, 87, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    .page {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .attribution {
      margin: 0 0 8px;
      color: #354059;
      font-size: 0.96rem;
      font-weight: 650;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.65rem, 2.4vw, 2.35rem);
      letter-spacing: 0;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(700px, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .animation-shell,
    .control-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .animation-shell {
      border-radius: 10px;
      overflow: hidden;
    }

    .svg-wrap {
      position: relative;
      width: 100%;
      min-height: 430px;
      background:
        radial-gradient(circle at 20% 10%, rgba(86, 103, 201, 0.08), transparent 28%),
        radial-gradient(circle at 84% 16%, rgba(47, 168, 94, 0.08), transparent 30%),
        #fbfdff;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      min-height: 430px;
    }

    .caption {
      margin: 0;
      min-height: 72px;
      padding: 14px 18px 16px;
      border-top: 1px solid var(--line);
      color: #23304a;
      font-size: 1rem;
      background: #ffffff;
    }

    .control-shell {
      border-radius: 10px;
      padding: 16px;
    }

    .controls-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 750;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      min-height: 42px;
      border: 1px solid #c8d3e4;
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    button:hover {
      background: #f3f6ff;
      border-color: #9fb1d0;
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(31, 122, 215, 0.28);
      outline-offset: 2px;
    }

    .primary {
      grid-column: 1 / -1;
      background: var(--button);
      border-color: var(--button);
      color: #ffffff;
    }

    .primary:hover {
      background: #1e2c55;
      border-color: #1e2c55;
    }

    .compare {
      grid-column: 1 / -1;
      background: #ecfbf2;
      border-color: #a7d9ba;
      color: #145737;
    }

    .slider-block,
    .toggle-block {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .slider-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--host-dark);
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      color: #263348;
      font-weight: 650;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--host-dark);
    }

    .timeline {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .timeline-title {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stage-button {
      min-height: 40px;
      padding: 8px 10px;
      text-align: left;
      background: #ffffff;
      color: #24304a;
      font-weight: 700;
    }

    .stage-button.active {
      background: var(--button-soft);
      border-color: #8fa2d6;
      color: #22348c;
    }

    .stage-button .num {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      margin-right: 7px;
      border-radius: 50%;
      background: #e7ecf8;
      color: #304061;
      font-size: 0.78rem;
      font-weight: 850;
    }

    .stage-button.active .num {
      background: #3344a5;
      color: #ffffff;
    }

    .progress {
      height: 8px;
      margin-top: 14px;
      overflow: hidden;
      border-radius: 99px;
      background: #e7edf7;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5568ca, #35a967);
      border-radius: inherit;
      transition: width 100ms linear;
    }

    .svg-label {
      font-size: 17px;
      font-weight: 750;
      fill: #1d2840;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .svg-small {
      font-size: 13px;
      font-weight: 700;
    }

    .svg-tiny {
      font-size: 11px;
      font-weight: 700;
    }

    .callout {
      stroke: #53617a;
      stroke-width: 1.4;
      fill: none;
    }

    .legend-text {
      font-size: 12px;
      font-weight: 700;
      fill: #27344b;
    }

    .membrane-badge {
      font-size: 14px;
      font-weight: 850;
      fill: #12233f;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    @media (max-width: 1120px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .control-shell {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .controls-title,
      .timeline {
        grid-column: 1 / -1;
      }

      .button-row,
      .slider-block,
      .toggle-block {
        margin: 0;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 18px, 1440px);
        padding-top: 12px;
      }

      .control-shell {
        display: block;
      }

      .button-row {
        grid-template-columns: 1fr;
      }

      .svg-wrap {
        min-height: 330px;
      }

      svg {
        min-height: 330px;
      }

      .caption {
        min-height: 96px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="attribution">Animation Prompted by Jerred Seveyka for his biology class.</p>
    <h1>Endosymbiosis: From Bacteria to Organelles</h1>

    <section class="workspace" aria-label="Interactive endosymbiosis animation">
      <div class="animation-shell">
        <div class="svg-wrap">
          <svg id="stageSvg" viewBox="0 0 1000 620" role="img" aria-labelledby="svgTitle svgDesc">
            <title id="svgTitle">Endosymbiosis animation</title>
            <desc id="svgDesc">An interactive diagram showing primary, secondary, and tertiary endosymbiosis.</desc>
          </svg>
        </div>
        <p id="caption" class="caption" aria-live="polite"></p>
      </div>

      <aside class="control-shell" aria-label="Animation controls">
        <h2 class="controls-title">Controls</h2>
        <div class="button-row">
          <button id="playPause" class="primary" type="button">Pause</button>
          <button id="reset" type="button">Reset</button>
          <button id="back" type="button">Step Back</button>
          <button id="forward" type="button">Step Forward</button>
          <button id="compare" class="compare" type="button">Compare organelles</button>
        </div>

        <div class="slider-block">
          <div class="slider-top">
            <label for="speed">Speed</label>
            <span id="speedValue">1.0x</span>
          </div>
          <input id="speed" type="range" min="0.35" max="2" value="1" step="0.05">
        </div>

        <div class="toggle-block">
          <label class="check" for="labels">
            <input id="labels" type="checkbox" checked>
            <span>Show / Hide Labels</span>
          </label>
          <label class="check" for="membranes">
            <input id="membranes" type="checkbox" checked>
            <span>Show membrane count</span>
          </label>
        </div>

        <div class="timeline" id="timeline" aria-label="Clickable stages">
          <div class="timeline-title">Timeline</div>
        </div>
        <div class="progress" aria-hidden="true"><div id="progressBar" class="progress-bar"></div></div>
      </aside>
    </section>
  </main>

  <script>
    /*
      Instructor notes:
      - Edit STAGES to change timeline names, durations, or captions.
      - The drawing helpers below render all structures as SVG primitives.
      - Stage functions use progress values from 0 to 1 for smooth motion.
    */

    const STAGES = [
      {
        id: "initial",
        name: "Archaeal host + bacterium",
        duration: 7,
        caption: "A proto-eukaryotic archaeal host with internal membrane infoldings is shown beside an aerobic bacterium. This educational model represents events over evolutionary time, not in one short-lived individual cell."
      },
      {
        id: "mitochondrion-origin",
        name: "Mitochondrion origin",
        duration: 10,
        caption: "A proto-eukaryotic host engulfs an aerobic bacterium but does not digest it. The bacterial endosymbiont becomes a mitochondrion while retaining double membranes, circular DNA, 70S ribosomes, porins, and electron transport proteins."
      },
      {
        id: "mitochondrial-transfer",
        name: "Mitochondrial gene transfer",
        duration: 8,
        caption: "Over evolutionary time, many genes from the endosymbiont move to the host nucleus, while their protein products are imported back into the organelle."
      },
      {
        id: "mitochondrial-division",
        name: "Mitochondrial division",
        duration: 8,
        caption: "Mitochondria replicate by binary fission, similar to their bacterial ancestors. With many functional mitochondria and reduced genomes in each, the eukaryotic cell is now able to produce much more ATP per gene than a prokaryote."
      },
      {
        id: "cyanobacterium-engulfment",
        name: "Cyanobacterium engulfment",
        duration: 9,
        caption: "A eukaryote with mitochondria engulfs a photosynthetic cyanobacterium."
      },
      {
        id: "chloroplast-origin",
        name: "Chloroplast origin",
        duration: 11,
        caption: "The cyanobacterium evolves into a chloroplast. Like mitochondria, chloroplasts retain bacterial traits, transfer many genes to the nucleus, and divide by binary fission."
      },
      {
        id: "secondary",
        name: "Secondary endosymbiosis",
        duration: 10,
        caption: "In secondary endosymbiosis, one eukaryote engulfs a photosynthetic eukaryote. Most of the engulfed cell is lost, but its chloroplast remains with extra surrounding membranes."
      },
      {
        id: "tertiary",
        name: "Tertiary endosymbiosis",
        duration: 10,
        caption: "In tertiary endosymbiosis, a eukaryote acquires a plastid by engulfing another eukaryote that already contains a secondary plastid."
      }
    ];

    const svg = document.getElementById("stageSvg");
    const caption = document.getElementById("caption");
    const playPause = document.getElementById("playPause");
    const resetButton = document.getElementById("reset");
    const backButton = document.getElementById("back");
    const forwardButton = document.getElementById("forward");
    const compareButton = document.getElementById("compare");
    const speedInput = document.getElementById("speed");
    const speedValue = document.getElementById("speedValue");
    const labelsInput = document.getElementById("labels");
    const membranesInput = document.getElementById("membranes");
    const timeline = document.getElementById("timeline");
    const progressBar = document.getElementById("progressBar");

    const state = {
      stageIndex: 0,
      progress: 0,
      playing: true,
      speed: 1,
      labels: true,
      membraneCounts: true,
      comparing: false,
      lastTime: 0
    };

    const hostRibosomes = [
      [-112, -52], [-78, -86], [-35, -70], [18, -86], [74, -58], [116, -18],
      [-138, 4], [-91, 36], [-39, 26], [32, 38], [88, 4], [126, 48],
      [-118, 82], [-52, 90], [14, 88], [69, 82], [104, -86], [-9, -22]
    ];

    const mitochondriaBase = [
      { x: 268, y: 356, s: 0.54, a: -13 },
      { x: 365, y: 246, s: 0.5, a: 12 },
      { x: 210, y: 245, s: 0.45, a: 18 },
      { x: 426, y: 352, s: 0.42, a: -18 }
    ];

    const chloroplastBase = [
      { x: 318, y: 248, s: 0.56, a: -12 },
      { x: 230, y: 350, s: 0.48, a: 14 },
      { x: 410, y: 348, s: 0.45, a: -4 }
    ];

    function esc(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function smooth(t) {
      t = clamp(t, 0, 1);
      return t * t * (3 - 2 * t);
    }

    function segment(t, start, end) {
      return smooth(clamp((t - start) / (end - start), 0, 1));
    }

    function pulse(t, phase = 0) {
      return 0.5 + 0.5 * Math.sin((t + phase) * Math.PI * 2);
    }

    function attrs(values) {
      return Object.entries(values)
        .filter(([, value]) => value !== undefined && value !== null)
        .map(([key, value]) => `${key}="${esc(value)}"`)
        .join(" ");
    }

    function wrapLines(text, maxChars = 24) {
      const words = String(text).split(" ");
      const lines = [];
      let line = "";
      words.forEach((word) => {
        if ((line + " " + word).trim().length > maxChars && line) {
          lines.push(line);
          line = word;
        } else {
          line = (line + " " + word).trim();
        }
      });
      if (line) lines.push(line);
      return lines;
    }

    function textBlock(text, x, y, options = {}) {
      const lines = wrapLines(text, options.maxChars || 28);
      const anchor = options.anchor || "middle";
      const cls = options.className || "svg-label";
      const lineHeight = options.lineHeight || 18;
      const fill = options.fill ? ` fill="${options.fill}"` : "";
      return `<text x="${x}" y="${y}" text-anchor="${anchor}" class="${cls}"${fill}>${
        lines.map((line, i) => `<tspan x="${x}" dy="${i === 0 ? 0 : lineHeight}">${esc(line)}</tspan>`).join("")
      }</text>`;
    }

    function label(text, x, y, options = {}) {
      if (!state.labels && !options.force) return "";
      let out = "";
      if (options.to) {
        const midX = options.elbowX ?? x;
        const midY = options.elbowY ?? y;
        out += `<path class="callout" d="M ${options.to[0]} ${options.to[1]} L ${midX} ${midY} L ${x} ${y - 6}" />`;
      }
      out += textBlock(text, x, y, options);
      return out;
    }

    function membraneBadge(text, x, y) {
      if (!state.membraneCounts) return "";
      return `<text x="${x}" y="${y}" text-anchor="middle" class="membrane-badge">${esc(text)}</text>`;
    }

    function circle(x, y, r, extra = {}) {
      return `<circle ${attrs({ cx: x, cy: y, r, ...extra })} />`;
    }

    function ellipse(x, y, rx, ry, extra = {}) {
      return `<ellipse ${attrs({ cx: x, cy: y, rx, ry, ...extra })} />`;
    }

    function rect(x, y, width, height, extra = {}) {
      return `<rect ${attrs({ x, y, width, height, ...extra })} />`;
    }

    function defs() {
      return `
        <defs>
          <marker id="arrowHost" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#5567c9"></path>
          </marker>
          <marker id="arrowGene" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a4ee6"></path>
          </marker>
          <marker id="arrowProtein" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e8fcf"></path>
          </marker>
          <marker id="arrowLight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f4c842"></path>
          </marker>
          <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3.5" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
        </defs>
      `;
    }

    function sceneBackground() {
      return `
        <rect x="0" y="0" width="1000" height="620" fill="#fbfdff"></rect>
        <path d="M 0 535 H 1000 V 620 H 0 Z" fill="#f2f6fc"></path>
      `;
    }

    function legend() {
      const y1 = 565;
      const y2 = 596;
      const items = [
        { x: 28, y: y1, label: "70S ribosomes", mark: circle(39, y1 - 5, 4, { fill: "#d94f31" }) },
        { x: 190, y: y1, label: "80S ribosomes", mark: `${circle(200, y1 - 7, 4, { fill: "#5366c9" })}${circle(206, y1 - 2, 3, { fill: "#7b8ee8" })}` },
        { x: 352, y: y1, label: "circular DNA", mark: `<ellipse cx="364" cy="${y1 - 5}" rx="13" ry="7" fill="none" stroke="#3d236a" stroke-width="2"></ellipse>` },
        { x: 512, y: y1, label: "electron transport chain", mark: `${rect(520, y1 - 13, 8, 15, { rx: 2, fill: "#e0516f" })}${rect(532, y1 - 14, 8, 16, { rx: 2, fill: "#f0c14b" })}${rect(544, y1 - 13, 8, 15, { rx: 2, fill: "#56a6e3" })}` },
        { x: 28, y: y2, label: "photosystems", mark: `${circle(40, y2 - 5, 5, { fill: "#f1c43c", stroke: "#23834c", "stroke-width": 2 })}` },
        { x: 190, y: y2, label: "nuclear DNA", mark: `<path d="M 200 ${y2 - 11} C 210 ${y2 - 18}, 220 ${y2 + 2}, 230 ${y2 - 7} S 252 ${y2 - 1}, 260 ${y2 - 10}" fill="none" stroke="#3d236a" stroke-width="3"></path>` },
        { x: 352, y: y2, label: "organelle membranes", mark: `${ellipse(366, y2 - 6, 15, 9, { fill: "none", stroke: "#e36b2c", "stroke-width": 2 })}${ellipse(366, y2 - 6, 10, 6, { fill: "none", stroke: "#b64222", "stroke-width": 2 })}` }
      ];

      return `
        <g aria-label="Legend">
          <text x="28" y="546" class="legend-text" style="font-size:13px;font-weight:850;">Legend</text>
          ${items.map((item) => `
            <g>
              ${item.mark}
              <text x="${item.x + 26}" y="${item.y}" class="legend-text">${esc(item.label)}</text>
            </g>
          `).join("")}
        </g>
      `;
    }

    function hostPath(cx, cy, rx, ry, stretch = 0) {
      const s = stretch;
      const right = cx + rx + s * 72;
      const upperArm = cy - ry * (0.42 + 0.1 * s);
      const lowerArm = cy + ry * (0.42 + 0.1 * s);
      return `
        M ${cx - rx} ${cy}
        C ${cx - rx * 1.02} ${cy - ry * 0.62}, ${cx - rx * 0.54} ${cy - ry * 1.06}, ${cx + rx * 0.05} ${cy - ry * 0.94}
        C ${cx + rx * 0.62} ${cy - ry * 0.84}, ${right - 24 * s} ${upperArm}, ${right} ${cy - ry * 0.05}
        C ${right - 20 * s} ${cy + ry * 0.4}, ${cx + rx * 0.66} ${lowerArm}, ${cx + rx * 0.42} ${cy + ry * 0.76}
        C ${cx - rx * 0.12} ${cy + ry * 1.05}, ${cx - rx * 0.88} ${cy + ry * 0.68}, ${cx - rx} ${cy}
        Z
      `;
    }

    function drawHostCell(cx, cy, rx, ry, options = {}) {
      const stretch = options.stretch || 0;
      const opacity = options.opacity ?? 1;
      const ribosomeOpacity = options.ribosomes ?? 1;
      const ribosomeScale = options.ribosomeScale ?? 1;
      const nucleusOpacity = options.nucleus ?? 0;
      const nucleusScale = options.nucleusScale ?? 1;
      const nucleusX = cx + (options.nucleusOffsetX ?? -18);
      const nucleusY = cy + (options.nucleusOffsetY ?? -6);
      const internal = options.internal ?? 1;
      const labelText = options.label || "Proto-eukaryotic archaeal host";
      const id = options.id || "";
      let out = `<g opacity="${opacity}">`;
      out += `<path d="${hostPath(cx, cy, rx, ry, stretch)}" fill="${options.fill || "#dfe7ff"}" stroke="#5667c9" stroke-width="${options.strokeWidth || 5}" />`;

      if (internal > 0) {
        out += `
          <g opacity="${internal}">
            <path d="M ${cx - 95} ${cy - 50} C ${cx - 34} ${cy - 100}, ${cx + 28} ${cy - 22}, ${cx + 104} ${cy - 72}" fill="none" stroke="#7a89df" stroke-width="8" stroke-linecap="round" opacity="0.65"></path>
            <path d="M ${cx - 126} ${cy + 34} C ${cx - 54} ${cy - 8}, ${cx + 12} ${cy + 80}, ${cx + 100} ${cy + 30}" fill="none" stroke="#7a89df" stroke-width="7" stroke-linecap="round" opacity="0.58"></path>
            <path d="M ${cx - 32} ${cy - 6} C ${cx + 20} ${cy - 46}, ${cx + 74} ${cy + 10}, ${cx + 122} ${cy - 22}" fill="none" stroke="#7a89df" stroke-width="6" stroke-linecap="round" opacity="0.5"></path>
          </g>
        `;
      }

      if (nucleusOpacity > 0) {
        out += `<g transform="translate(${nucleusX} ${nucleusY}) scale(${nucleusScale}) translate(${-nucleusX} ${-nucleusY})">`;
        out += drawNucleus(nucleusX, nucleusY, 72, 54, nucleusOpacity, options.nuclearGenes || 0);
        out += `</g>`;
      } else {
        out += `<path d="M ${cx - 42} ${cy - 18} C ${cx - 6} ${cy - 50}, ${cx + 35} ${cy + 8}, ${cx + 70} ${cy - 21}" fill="none" stroke="#3d236a" stroke-width="4" opacity="0.75"></path>`;
      }

      if (ribosomeOpacity > 0) {
        out += `<g opacity="${ribosomeOpacity}">`;
        hostRibosomes.forEach(([dx, dy], index) => {
          const wiggle = Math.sin((state.progress + index) * 2.4) * 1.5 * ribosomeScale;
          out += circle(cx + dx * ribosomeScale + wiggle, cy + dy * ribosomeScale, 4.2 * ribosomeScale, { fill: "#5366c9" });
          out += circle(cx + (dx + 5) * ribosomeScale + wiggle, cy + (dy + 3) * ribosomeScale, 3.2 * ribosomeScale, { fill: "#7c8ee8" });
        });
        out += `</g>`;
      }

      if (state.labels) {
        out += label(labelText, cx - 20, cy - ry - 30, { to: [cx - 34, cy - ry + 12], maxChars: 30 });
        if (internal > 0.3 && !options.simpleLabels) {
          out += label("Internal membrane infoldings", cx - rx + 24, cy + ry + 32, { anchor: "start", to: [cx - 80, cy + 28], maxChars: 26, className: "svg-label svg-small" });
        }
        if (ribosomeOpacity > 0.2 && !options.simpleLabels) {
          out += label("80S ribosomes", cx + rx - 28, cy + ry + 34, { anchor: "end", to: [cx + 76, cy + 58], maxChars: 18, className: "svg-label svg-small" });
        }
      }

      out += id ? `<title>${esc(id)}</title>` : "";
      out += `</g>`;
      return out;
    }

    function drawNucleus(cx, cy, rx, ry, opacity = 1, geneGlow = 0) {
      let out = `<g opacity="${opacity}">`;
      out += ellipse(cx, cy, rx, ry, { fill: "#eee8ff", stroke: "#4c54ba", "stroke-width": 4 });
      out += ellipse(cx, cy, rx - 9, ry - 8, { fill: "none", stroke: "#9a9ee7", "stroke-width": 2.5, "stroke-dasharray": "8 5" });
      out += `<path d="M ${cx - 40} ${cy - 8} C ${cx - 12} ${cy - 32}, ${cx + 8} ${cy + 17}, ${cx + 40} ${cy - 9} S ${cx + 74} ${cy + 15}, ${cx + 86} ${cy - 3}" fill="none" stroke="#3d236a" stroke-width="4" stroke-linecap="round"></path>`;
      if (geneGlow > 0) {
        out += `<g opacity="${geneGlow}" filter="url(#softGlow)">
          ${rect(cx + 12, cy - 22, 12, 5, { rx: 2, fill: "#7a4ee6" })}
          ${rect(cx + 31, cy - 5, 13, 5, { rx: 2, fill: "#42a96b" })}
          ${rect(cx - 19, cy + 13, 12, 5, { rx: 2, fill: "#7a4ee6" })}
        </g>`;
      }
      out += `</g>`;
      return out;
    }

    function porins(x, y, w, h) {
      let out = "";
      const pts = [
        [x + 36, y + 5], [x + 76, y + 4], [x + 128, y + 5], [x + 168, y + 7],
        [x + 48, y + h - 5], [x + 104, y + h - 4], [x + 150, y + h - 5]
      ];
      pts.forEach(([px, py]) => {
        out += circle(px, py, 5, { fill: "#f9b05e", stroke: "#9a3a1f", "stroke-width": 1.5 });
        out += circle(px, py, 1.8, { fill: "#fff3de" });
      });
      return out;
    }

    function ribosomeDots(points, color = "#d94f31") {
      return points.map(([x, y]) => circle(x, y, 3.5, { fill: color, opacity: 0.95 })).join("");
    }

    function drawBacterium(x, y, scale = 1, options = {}) {
      const w = 220 * scale;
      const h = 92 * scale;
      const labelOffset = options.labelOffset || 0;
      const opacity = options.opacity ?? 1;
      const detail = options.detail ?? true;
      const cellLabel = options.cellLabel || "Aerobic bacterium";
      let out = `<g opacity="${opacity}" transform="translate(${x} ${y}) rotate(${options.rotate || 0} ${w / 2} ${h / 2})">`;
      out += rect(0, 0, w, h, { rx: h / 2, fill: "#ffe1cd", stroke: "#e36b2c", "stroke-width": 5 * scale });
      out += rect(13 * scale, 14 * scale, w - 26 * scale, h - 28 * scale, { rx: (h - 28 * scale) / 2, fill: "none", stroke: "#b64222", "stroke-width": 4 * scale });
      out += porins(0, 0, w, h);
      out += `<g>`;
      [55, 92, 130, 166].forEach((px, i) => {
        out += rect(px * scale, 9 * scale, 10 * scale, 10 * scale, { rx: 3 * scale, fill: ["#e0516f", "#f0c14b", "#56a6e3", "#6abf69"][i] });
      });
      out += `</g>`;
      out += `<ellipse cx="${110 * scale}" cy="${47 * scale}" rx="${28 * scale}" ry="${14 * scale}" fill="none" stroke="#3d236a" stroke-width="${3 * scale}"></ellipse>`;
      out += ribosomeDots([
        [48 * scale, 39 * scale], [69 * scale, 60 * scale], [144 * scale, 39 * scale],
        [181 * scale, 53 * scale], [99 * scale, 67 * scale], [30 * scale, 54 * scale]
      ]);
      out += `</g>`;

      if (detail && state.labels) {
        const gx = x;
        const gy = y;
        const rightX = Math.min(972, gx + w + 48);
        out += label(cellLabel, gx + w / 2, gy - 26 - labelOffset, { to: [gx + w / 2, gy + 8], maxChars: 22 });
        out += label("Outer membrane", rightX, gy + 10, { anchor: "end", to: [gx + w - 16, gy + 17], maxChars: 20, className: "svg-label svg-small" });
        out += label("Inner membrane", rightX, gy + 42, { anchor: "end", to: [gx + w - 42, gy + 42], maxChars: 20, className: "svg-label svg-small" });
        out += label("Porin proteins", rightX, gy + 76, { anchor: "end", to: [gx + w - 52, gy + 7], maxChars: 20, className: "svg-label svg-small" });
        out += label("Electron transport chain", gx + w / 2, gy + h + 46, { to: [gx + 130 * scale, gy + 14 * scale], maxChars: 28, className: "svg-label svg-small" });
        out += label("Circular chromosome", gx - 34, gy + h + 28, { anchor: "end", to: [gx + 110 * scale, gy + 47 * scale], maxChars: 24, className: "svg-label svg-small" });
        out += label("70S ribosomes", gx - 34, gy + 54, { anchor: "end", to: [gx + 66 * scale, gy + 60 * scale], maxChars: 18, className: "svg-label svg-small" });
      }
      return out;
    }

    function drawMitochondrion(x, y, scale = 1, options = {}) {
      const opacity = options.opacity ?? 1;
      const rot = options.rotate || 0;
      const elongate = options.elongate || 1;
      const labelText = options.label;
      const extraClass = options.className || "";
      const w = 132 * scale * elongate;
      const h = 62 * scale;
      const cristaLeft = -w / 2 + 18 * scale;
      const cristaRight = w / 2 - 18 * scale;
      const cristaSpan = cristaRight - cristaLeft;
      let out = `<g opacity="${opacity}" transform="translate(${x} ${y}) rotate(${rot})" class="${extraClass}">`;
      out += ellipse(0, 0, w / 2, h / 2, { fill: "#ffe3cf", stroke: "#e36b2c", "stroke-width": 4 * scale });
      out += ellipse(0, 0, w / 2 - 8 * scale, h / 2 - 8 * scale, { fill: "none", stroke: "#b64222", "stroke-width": 3 * scale });
      out += `<path d="M ${cristaLeft} ${-4 * scale}
        C ${cristaLeft + cristaSpan * 0.22} ${-16 * scale}, ${cristaLeft + cristaSpan * 0.36} ${14 * scale}, ${cristaLeft + cristaSpan * 0.52} 0
        S ${cristaLeft + cristaSpan * 0.8} ${12 * scale}, ${cristaRight} ${-4 * scale}" fill="none" stroke="#b64222" stroke-width="${3 * scale}" stroke-linecap="round"></path>`;
      [
        [cristaLeft + cristaSpan * 0.2, -7 * scale],
        [cristaLeft + cristaSpan * 0.4, 4 * scale],
        [cristaLeft + cristaSpan * 0.62, 2 * scale],
        [cristaLeft + cristaSpan * 0.82, 4 * scale]
      ].forEach(([px, py], i) => {
        out += rect(px - 3 * scale, py - 4 * scale, 6 * scale, 8 * scale, { rx: 2 * scale, fill: ["#e0516f", "#f0c14b", "#56a6e3", "#6abf69"][i] });
      });
      out += ellipse(-24 * scale, 14 * scale, 15 * scale, 8 * scale, { fill: "none", stroke: "#3d236a", "stroke-width": 2.3 * scale });
      out += ribosomeDots([
        [14 * scale, 11 * scale], [33 * scale, -8 * scale], [-42 * scale, -10 * scale]
      ], "#d94f31");
      if (options.pinch) {
        out += `<path d="M 0 ${-h / 2 - 2 * scale} C ${-8 * scale} ${-10 * scale}, ${8 * scale} ${10 * scale}, 0 ${h / 2 + 2 * scale}" fill="none" stroke="#b64222" stroke-width="${3 * scale}" stroke-linecap="round"></path>`;
      }
      out += `</g>`;
      if (labelText && state.labels) {
        out += label(labelText, x, y - h / 2 - 20, { to: [x, y - h / 2], maxChars: 22, className: "svg-label svg-small" });
      }
      if (options.badge) {
        out += membraneBadge(options.badge, x, y + h / 2 + 28);
      }
      return out;
    }

    function drawProteinDots(points, opacity = 1) {
      return `<g opacity="${opacity}">${points.map(([x, y, c]) => circle(x, y, 5, { fill: c || "#2e8fcf", stroke: "#ffffff", "stroke-width": 1.5 })).join("")}</g>`;
    }

    function drawGeneTransfer(start, end, options = {}) {
      const color = options.color || "#7a4ee6";
      const marker = options.marker || "arrowGene";
      const opacity = options.opacity ?? 1;
      const dashOffset = (1 - state.progress) * 70;
      let out = `<g opacity="${opacity}" filter="url(#softGlow)">`;
      out += `<path d="M ${start[0]} ${start[1]} C ${start[0] + 80} ${start[1] - 80}, ${end[0] - 86} ${end[1] + 54}, ${end[0]} ${end[1]}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" stroke-dashoffset="${dashOffset}" marker-end="url(#${marker})"></path>`;
      out += `</g>`;
      return out;
    }

    function drawProteinImport(start, end, opacity = 1) {
      let out = `<g opacity="${opacity}">`;
      out += `<path d="M ${start[0]} ${start[1]} C ${start[0] + 44} ${start[1] + 72}, ${end[0] - 44} ${end[1] - 60}, ${end[0]} ${end[1]}" fill="none" stroke="#2e8fcf" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrowProtein)"></path>`;
      out += `</g>`;
      return out;
    }

    function drawCyanobacterium(x, y, scale = 1, options = {}) {
      const w = 230 * scale;
      const h = 106 * scale;
      const opacity = options.opacity ?? 1;
      let out = `<g opacity="${opacity}" transform="translate(${x} ${y}) rotate(${options.rotate || 0} ${w / 2} ${h / 2})">`;
      out += rect(0, 0, w, h, { rx: h / 2, fill: "#d8f4df", stroke: "#2fa85e", "stroke-width": 5 * scale });
      out += rect(14 * scale, 15 * scale, w - 28 * scale, h - 30 * scale, { rx: (h - 30 * scale) / 2, fill: "none", stroke: "#167746", "stroke-width": 4 * scale });
      [28, 48, 68].forEach((yy, i) => {
        const py = yy * scale;
        out += `<path d="M ${34 * scale} ${py} C ${80 * scale} ${py - 18 * scale}, ${132 * scale} ${py + 18 * scale}, ${190 * scale} ${py}" fill="none" stroke="#39a969" stroke-width="${5 * scale}" stroke-linecap="round"></path>`;
        [68, 116, 164].forEach((px) => {
          out += circle(px * scale, py + (i % 2 ? 3 : -3) * scale, 5.2 * scale, { fill: "#f1c43c", stroke: "#167746", "stroke-width": 1.4 * scale });
        });
      });
      out += ellipse(118 * scale, 55 * scale, 28 * scale, 14 * scale, { fill: "none", stroke: "#3d236a", "stroke-width": 3 * scale });
      out += ribosomeDots([
        [46 * scale, 82 * scale], [76 * scale, 35 * scale], [151 * scale, 78 * scale],
        [190 * scale, 44 * scale], [105 * scale, 84 * scale]
      ], "#237c47");
      if (options.light !== false) {
        out += `<g opacity="0.85">
          <path d="M ${22 * scale} ${-30 * scale} L ${55 * scale} ${22 * scale}" stroke="#f4c842" stroke-width="${3 * scale}" marker-end="url(#arrowLight)" />
          <path d="M ${72 * scale} ${-36 * scale} L ${98 * scale} ${28 * scale}" stroke="#f4c842" stroke-width="${3 * scale}" marker-end="url(#arrowLight)" />
          <path d="M ${128 * scale} ${-28 * scale} L ${158 * scale} ${30 * scale}" stroke="#f4c842" stroke-width="${3 * scale}" marker-end="url(#arrowLight)" />
        </g>`;
      }
      out += `</g>`;

      if (options.detail && state.labels) {
        const gx = x;
        const gy = y;
        const rightX = Math.min(972, gx + w + 42);
        out += label("Photosynthetic cyanobacterium", gx + w / 2, gy - 32, { to: [gx + w / 2, gy + 8], maxChars: 27 });
        out += label("Outer membrane", rightX, gy + 10, { anchor: "end", to: [gx + w - 20, gy + 17], maxChars: 18, className: "svg-label svg-small" });
        out += label("Inner membrane", rightX, gy + 41, { anchor: "end", to: [gx + w - 45, gy + 44], maxChars: 18, className: "svg-label svg-small" });
        out += label("Photosynthetic membranes / thylakoids", gx + w / 2, gy + h + 48, { to: [gx + 115 * scale, gy + 50 * scale], maxChars: 32, className: "svg-label svg-small" });
        out += label("Photosystems", gx - 28, gy + 35, { anchor: "end", to: [gx + 68 * scale, gy + 28 * scale], maxChars: 18, className: "svg-label svg-small" });
        out += label("Circular DNA", gx - 28, gy + 70, { anchor: "end", to: [gx + 118 * scale, gy + 55 * scale], maxChars: 16, className: "svg-label svg-small" });
        out += label("70S ribosomes", gx - 28, gy + 102, { anchor: "end", to: [gx + 46 * scale, gy + 82 * scale], maxChars: 18, className: "svg-label svg-small" });
      }
      return out;
    }

    function drawChloroplast(x, y, scale = 1, options = {}) {
      const opacity = options.opacity ?? 1;
      const rot = options.rotate || 0;
      const extraMembranes = options.extraMembranes || 0;
      const labelText = options.label;
      const w = 142 * scale;
      const h = 72 * scale;
      let out = `<g opacity="${opacity}" transform="translate(${x} ${y}) rotate(${rot})">`;
      for (let i = extraMembranes; i > 0; i -= 1) {
        out += ellipse(0, 0, w / 2 + 9 * i * scale, h / 2 + 8 * i * scale, {
          fill: i === extraMembranes ? "rgba(222,231,255,0.28)" : "none",
          stroke: i % 2 ? "#5667c9" : "#7a89df",
          "stroke-width": 2.5 * scale,
          "stroke-dasharray": i === 1 ? "" : "8 5"
        });
      }
      out += ellipse(0, 0, w / 2, h / 2, { fill: "#d8f4df", stroke: "#2fa85e", "stroke-width": 4 * scale });
      out += ellipse(0, 0, w / 2 - 8 * scale, h / 2 - 8 * scale, { fill: "none", stroke: "#167746", "stroke-width": 3 * scale });
      [-16, 0, 16].forEach((yy, i) => {
        out += `<path d="M ${-48 * scale} ${yy * scale} C ${-22 * scale} ${(yy - 10) * scale}, ${22 * scale} ${(yy + 10) * scale}, ${48 * scale} ${yy * scale}" fill="none" stroke="#39a969" stroke-width="${4.5 * scale}" stroke-linecap="round"></path>`;
        [-25, 5, 32].forEach((px) => {
          out += circle(px * scale, (yy + (i % 2 ? 3 : -3)) * scale, 4.2 * scale, { fill: "#f1c43c", stroke: "#167746", "stroke-width": 1.2 * scale });
        });
      });
      out += ellipse(-35 * scale, 20 * scale, 13 * scale, 7 * scale, { fill: "none", stroke: "#3d236a", "stroke-width": 2.2 * scale });
      out += ribosomeDots([[20 * scale, 20 * scale], [42 * scale, -11 * scale], [-8 * scale, -24 * scale]], "#237c47");
      out += `</g>`;
      if (labelText && state.labels) {
        out += label(labelText, x, y - h / 2 - 20 - extraMembranes * 5, { to: [x, y - h / 2], maxChars: 24, className: "svg-label svg-small" });
      }
      if (options.badge) {
        out += membraneBadge(options.badge, x, y + h / 2 + 30 + extraMembranes * 6);
      }
      return out;
    }

    function drawEngulfmentVesicle(x, y, rx, ry, opacity, color = "#5667c9") {
      if (opacity <= 0) return "";
      return `<g opacity="${opacity}">
        ${ellipse(x, y, rx, ry, { fill: "rgba(223,231,255,0.28)", stroke: color, "stroke-width": 3, "stroke-dasharray": "8 6" })}
      </g>`;
    }

    function drawLightArrows(opacity = 1) {
      return `<g opacity="${opacity}">
        <path d="M 138 94 L 186 152" stroke="#f4c842" stroke-width="4" marker-end="url(#arrowLight)" />
        <path d="M 188 78 L 226 152" stroke="#f4c842" stroke-width="4" marker-end="url(#arrowLight)" />
        <path d="M 246 86 L 275 158" stroke="#f4c842" stroke-width="4" marker-end="url(#arrowLight)" />
      </g>`;
    }

    function drawEukaryoteWithMitochondria(options = {}) {
      const cx = options.cx ?? 330;
      const cy = options.cy ?? 300;
      const rx = options.rx ?? 215;
      const ry = options.ry ?? 155;
      const labelText = options.label || "Eukaryotic cell with mitochondria";
      let out = drawHostCell(cx, cy, rx, ry, {
        label: labelText,
        nucleus: 1,
        ribosomes: 1,
        internal: 0.45,
        simpleLabels: options.simpleLabels ?? true,
        fill: options.fill
      });
      const mitoList = options.mitochondria || mitochondriaBase;
      mitoList.forEach((m, i) => {
        out += drawMitochondrion(
          cx + (m.x - 330) + Math.sin(state.progress * 2 + i) * 3,
          cy + (m.y - 300) + Math.cos(state.progress * 2.2 + i) * 2,
          m.s,
          { rotate: m.a, badge: i === 0 && options.badgeMito ? "2 membranes" : "" }
        );
      });
      return out;
    }

    function stageInitial(t) {
      const ribo = segment(t, 0.28, 0.68);
      let out = sceneBackground();
      out += drawHostCell(260, 300, 184, 134, {
        ribosomes: ribo,
        nucleus: 0,
        internal: 1,
        label: "Proto-eukaryotic archaeal host"
      });
      out += drawBacterium(660, 244, 1, { detail: true, cellLabel: "Aerobic bacterium" });
      out += label("No completed nucleus yet", 100, 172, { anchor: "start", to: [292, 280], maxChars: 25, className: "svg-label svg-small" });
      return out;
    }

    function stageMitoOrigin(t) {
      const engulf = segment(t, 0.05, 0.43);
      const nucleus = segment(t, 0.38, 0.72);
      const vesicleFade = 1 - segment(t, 0.58, 0.9);
      const bactX = lerp(662, 336, engulf);
      const bactY = lerp(244, 328, engulf);
      const bactScale = lerp(0.9, 0.47, segment(t, 0.32, 0.75));
      const hostStretch = segment(t, 0.08, 0.38) * (1 - segment(t, 0.48, 0.78));
      const mitoOpacity = segment(t, 0.62, 0.92);
      const bactOpacity = 1 - segment(t, 0.68, 0.92);
      let out = sceneBackground();
      out += drawHostCell(300, 304, 220, 155, {
        ribosomes: segment(t, 0.18, 0.5),
        nucleus,
        internal: 1 - nucleus * 0.45,
        nuclearGenes: 0,
        stretch: hostStretch,
        label: "Proto-eukaryotic archaeal host"
      });

      if (engulf > 0.05 && engulf < 0.9) {
        out += `<path d="M ${440 + hostStretch * 26} 230 C ${535} ${217}, ${565} ${274}, ${500} ${315}" fill="none" stroke="#5667c9" stroke-width="13" stroke-linecap="round" opacity="${0.78 * (1 - segment(t, 0.52, 0.8))}"></path>`;
        out += `<path d="M ${443 + hostStretch * 22} 380 C ${532} ${404}, ${568} ${348}, ${505} ${312}" fill="none" stroke="#5667c9" stroke-width="13" stroke-linecap="round" opacity="${0.78 * (1 - segment(t, 0.52, 0.8))}"></path>`;
        out += label("Engulfment", 574, 226, { to: [506, 280], maxChars: 18 });
      }

      out += drawEngulfmentVesicle(370, 350, 74, 44, vesicleFade * segment(t, 0.36, 0.52), "#5667c9");
      if (bactOpacity > 0.05) {
        out += drawBacterium(bactX, bactY, bactScale, { detail: false, opacity: bactOpacity, cellLabel: "Aerobic bacterium" });
      }
      if (mitoOpacity > 0.05) {
        const labelText = t < 0.78 ? "Proto-mitochondrion" : "Mitochondrion";
        out += drawMitochondrion(388, 354, 0.72, { opacity: mitoOpacity, rotate: -9, label: labelText, badge: "2 membranes" });
      }

      if (nucleus > 0.2) {
        out += label("Nuclear envelope forms", 148, 144, { to: [274, 298], maxChars: 25, className: "svg-label svg-small" });
        out += label("Nucleus", 198, 210, { to: [278, 300], maxChars: 14, className: "svg-label svg-small" });
        out += label("Host nuclear DNA", 150, 260, { to: [300, 300], maxChars: 20, className: "svg-label svg-small" });
      }
      if (state.membraneCounts && segment(t, 0.36, 0.58) > 0.1 && vesicleFade > 0.18) {
        out += membraneBadge("temporary vesicle + bacterial outer + inner membranes", 598, 405);
      }
      return out;
    }

    function stageMitoTransfer(t) {
      const gene = segment(t, 0.1, 0.72);
      const protein = segment(t, 0.45, 0.95);
      let out = sceneBackground();
      out += drawEukaryoteWithMitochondria({
        cx: 342,
        cy: 308,
        rx: 230,
        ry: 160,
        mitochondria: [{ x: 390, y: 352, s: 0.64, a: -10 }],
        label: "Early eukaryotic cell",
        badgeMito: true
      });
      out += drawGeneTransfer([382, 352], [305, 304], { opacity: gene, color: "#7a4ee6" });
      out += drawProteinImport([300, 230], [386, 346], protein);
      out += drawProteinDots([
        [330, 244, "#2e8fcf"], [354, 270, "#2e8fcf"], [370, 303, "#2e8fcf"]
      ], protein);
      out += label("Endosymbiotic gene transfer", 604, 172, { to: [420, 280], maxChars: 28 });
      out += label("Genes move to nucleus", 560, 232, { to: [306, 300], maxChars: 24, className: "svg-label svg-small" });
      out += label("Nuclear-encoded proteins imported into mitochondrion", 666, 370, { to: [390, 350], maxChars: 34, className: "svg-label svg-small" });
      return out;
    }

    function stageMitoDivision(t) {
      let out = sceneBackground();
      out += drawHostCell(330, 306, 230, 160, {
        label: "Eukaryotic cell",
        nucleus: 1,
        ribosomes: 1,
        internal: 0.45,
        simpleLabels: true
      });

      if (t < 0.42) {
        const e = lerp(1, 1.75, segment(t, 0.02, 0.38));
        out += drawMitochondrion(330, 346, 0.78, { rotate: -4, elongate: e, pinch: t > 0.27, label: "Binary fission", badge: "2 membranes" });
      } else if (t < 0.72) {
        const split = segment(t, 0.42, 0.72);
        out += drawMitochondrion(lerp(330, 270, split), 346, 0.68, { rotate: -10, badge: "2 membranes" });
        out += drawMitochondrion(lerp(330, 394, split), 344, 0.68, { rotate: 12 });
        out += label("Binary fission", 334, 222, { to: [332, 342], maxChars: 20 });
      } else {
        const appear = segment(t, 0.72, 0.95);
        mitochondriaBase.forEach((m, i) => {
          const op = i < 2 ? 1 : appear;
          out += drawMitochondrion(m.x, m.y, m.s, { rotate: m.a, opacity: op, badge: i === 0 ? "2 membranes" : "" });
        });
        out += label("Several mitochondria in the cytoplasm", 640, 232, { to: [365, 246], maxChars: 34, className: "svg-label svg-small" });
      }
      return out;
    }

    function stageCyanoEngulfment(t) {
      const engulf = segment(t, 0.14, 0.72);
      const cyanoX = lerp(680, 372, engulf);
      const cyanoY = lerp(254, 350, engulf);
      const cyanoScale = lerp(0.86, 0.48, segment(t, 0.42, 0.82));
      let out = sceneBackground();
      out += drawEukaryoteWithMitochondria({
        cx: 300,
        cy: 308,
        rx: 220,
        ry: 160,
        label: "Eukaryote with mitochondria",
        badgeMito: true
      });
      if (engulf > 0.08 && engulf < 0.92) {
        out += `<path d="M 438 230 C 544 230, 566 286, 500 324" fill="none" stroke="#5667c9" stroke-width="13" stroke-linecap="round" opacity="${0.8 * (1 - segment(t, 0.64, 0.86))}"></path>`;
        out += `<path d="M 438 390 C 550 408, 568 350, 500 324" fill="none" stroke="#5667c9" stroke-width="13" stroke-linecap="round" opacity="${0.8 * (1 - segment(t, 0.64, 0.86))}"></path>`;
        out += label("Engulfment", 560, 220, { to: [500, 308], maxChars: 18 });
      }
      out += drawEngulfmentVesicle(404, 374, 82, 48, segment(t, 0.56, 0.76), "#5667c9");
      out += drawCyanobacterium(cyanoX, cyanoY, cyanoScale, { detail: t < 0.42, light: true });
      return out;
    }

    function stageChloroplastOrigin(t) {
      const vesicleFade = 1 - segment(t, 0.15, 0.44);
      const chlor = segment(t, 0.05, 0.38);
      const gene = segment(t, 0.26, 0.64);
      const divide = segment(t, 0.62, 0.98);
      let out = sceneBackground();
      out += drawHostCell(330, 306, 232, 162, {
        label: "Photosynthetic eukaryote",
        nucleus: 1,
        ribosomes: 1,
        internal: 0.35,
        simpleLabels: true,
        nuclearGenes: gene
      });
      mitochondriaBase.slice(0, 3).forEach((m, i) => {
        out += drawMitochondrion(m.x, m.y + 14, m.s * 0.9, { rotate: m.a, badge: i === 0 ? "Mitochondrion: 2 membranes" : "" });
      });
      out += drawEngulfmentVesicle(384, 248, 88, 54, vesicleFade, "#5667c9");

      if (divide < 0.08) {
        if (chlor < 0.86) {
          out += drawCyanobacterium(320, 214, 0.54, { detail: false, light: false, opacity: 1 - chlor * 0.55 });
        }
        out += drawChloroplast(384, 264, 0.78, { opacity: chlor, rotate: -12, label: "Primary chloroplast", badge: "Primary plastid: 2 membranes" });
      } else {
        const split = divide;
        if (split < 0.56) {
          out += drawChloroplast(384, 264, 0.82, { rotate: -12, label: "Chloroplast binary fission", badge: "Primary plastid: 2 membranes" });
          out += `<path d="M 384 230 C 375 250, 394 276, 384 298" fill="none" stroke="#167746" stroke-width="3" stroke-linecap="round" opacity="${split}"></path>`;
        } else {
          chloroplastBase.forEach((c, i) => {
            const op = i === 0 ? 1 : segment(divide, 0.52 + i * 0.08, 0.86 + i * 0.05);
            out += drawChloroplast(c.x, c.y, c.s, { rotate: c.a, opacity: op, badge: i === 0 ? "Primary plastid: 2 membranes" : "" });
          });
          out += label("Chloroplast binary fission", 604, 262, { to: [318, 248], maxChars: 28 });
        }
      }

      out += drawGeneTransfer([384, 264], [300, 304], { opacity: gene, color: "#42a96b", marker: "arrowGene" });
      out += drawProteinImport([304, 232], [382, 262], segment(t, 0.42, 0.75));
      out += label("Chloroplast genes move to nucleus", 620, 154, { to: [394, 248], maxChars: 29, className: "svg-label svg-small" });
      out += label("Nuclear-encoded chloroplast proteins imported back", 666, 382, { to: [384, 264], maxChars: 34, className: "svg-label svg-small" });
      out += drawLightArrows(chlor);
      return out;
    }

    function drawPhotosyntheticEukaryote(cx, cy, scale = 1, options = {}) {
      const rx = 148 * scale;
      const ry = 108 * scale;
      let out = `<g opacity="${options.opacity ?? 1}">`;
      out += drawHostCell(cx, cy, rx, ry, {
        label: options.label || "Photosynthetic eukaryote",
        nucleus: options.nucleusOpacity ?? 1,
        nucleusScale: 0.58,
        nucleusOffsetX: -45 * scale,
        nucleusOffsetY: -18 * scale,
        ribosomes: 0.65,
        ribosomeScale: 0.62 * scale,
        internal: 0,
        simpleLabels: true,
        fill: "#e9fbef",
        strokeWidth: 4
      });
      out += drawMitochondrion(cx - 28 * scale, cy + 54 * scale, 0.35 * scale, { rotate: 15, opacity: options.mitoOpacity ?? 1 });
      out += drawChloroplast(cx + 50 * scale, cy + 20 * scale, 0.52 * scale, { rotate: -12, opacity: options.chlorOpacity ?? 1 });
      out += `</g>`;
      return out;
    }

    function stageSecondary(t) {
      const approach = segment(t, 0.05, 0.42);
      const degrade = segment(t, 0.44, 0.78);
      const plastidReady = segment(t, 0.58, 0.94);
      const preyX = lerp(730, 452, approach);
      const preyY = lerp(304, 320, approach);
      let out = sceneBackground();
      out += drawHostCell(338, 310, 244, 172, {
        label: "Eukaryotic host",
        nucleus: 1,
        ribosomes: 1,
        internal: 0.35,
        simpleLabels: true,
        fill: "#e5e8ff"
      });
      [
        [218, 238, 0.36, -14],
        [438, 238, 0.34, 12],
        [220, 390, 0.34, 15],
        [430, 392, 0.32, -12]
      ].forEach(([mx, my, ms, ma]) => {
        out += drawMitochondrion(mx, my, ms, { rotate: ma });
      });

      if (approach < 0.86) {
        out += drawPhotosyntheticEukaryote(preyX, preyY, 0.86, { label: "Photosynthetic eukaryote" });
      } else {
        const preyOpacity = 1 - degrade * 0.78;
        out += drawHostCell(430, 320, 128 * (1 - degrade * 0.34), 92 * (1 - degrade * 0.34), {
          label: "Engulfed eukaryote mostly degraded",
          nucleus: 1 - degrade * 0.85,
          nucleusScale: 0.55 * (1 - degrade * 0.2),
          nucleusOffsetX: -34,
          nucleusOffsetY: -14,
          ribosomes: 0.25 * (1 - degrade),
          ribosomeScale: 0.48 * (1 - degrade * 0.25),
          internal: 0,
          simpleLabels: true,
          opacity: preyOpacity,
          fill: "#e9fbef"
        });
        out += drawMitochondrion(390, 352, 0.34, { rotate: 8, opacity: 1 - degrade });
      }

      if (approach > 0.08 && approach < 0.92) {
        out += `<path d="M 496 228 C 588 240, 604 290, 520 328" fill="none" stroke="#5667c9" stroke-width="14" stroke-linecap="round" opacity="${0.78 * (1 - segment(t, 0.42, 0.66))}"></path>`;
        out += `<path d="M 490 405 C 592 390, 604 344, 520 328" fill="none" stroke="#5667c9" stroke-width="14" stroke-linecap="round" opacity="${0.78 * (1 - segment(t, 0.42, 0.66))}"></path>`;
      }

      if (approach >= 0.86) {
        out += drawChloroplast(452, 314, 0.74, {
          rotate: -12,
          opacity: Math.max(0.35 * (1 - degrade), plastidReady),
          extraMembranes: 2,
          label: "Secondary plastid",
          badge: "Secondary plastid: 3-4 membranes"
        });
      }

      if (plastidReady > 0.4) {
        out += label("Additional membrane added", 664, 318, { to: [506, 302], maxChars: 26, className: "svg-label svg-small" });
        out += circle(405, 268, 11, { fill: "#eee8ff", stroke: "#4c54ba", "stroke-width": 2, opacity: 0.9 });
        out += label("nucleomorph present in some lineages", 652, 222, { to: [405, 268], maxChars: 32, className: "svg-label svg-small" });
      }

      out += label("Secondary endosymbiosis", 500, 130, { to: [468, 246], maxChars: 25 });
      out += label("Engulfed eukaryote mostly degraded", 648, 422, { to: [430, 320], maxChars: 32, className: "svg-label svg-small" });
      return out;
    }

    function drawSecondaryPrey(cx, cy, scale = 1, opacity = 1) {
      let out = `<g opacity="${opacity}">`;
      out += drawHostCell(cx, cy, 142 * scale, 102 * scale, {
        label: "Eukaryote with secondary plastid",
        nucleus: 1,
        nucleusScale: 0.55,
        nucleusOffsetX: -45 * scale,
        nucleusOffsetY: -18 * scale,
        ribosomes: 0.55,
        ribosomeScale: 0.6 * scale,
        internal: 0,
        simpleLabels: true,
        fill: "#eef8ff"
      });
      out += drawMitochondrion(cx - 26 * scale, cy + 52 * scale, 0.3 * scale, { rotate: -12 });
      out += drawChloroplast(cx + 50 * scale, cy + 20 * scale, 0.48 * scale, { rotate: 11, extraMembranes: 2 });
      out += `</g>`;
      return out;
    }

    function stageTertiary(t) {
      const approach = segment(t, 0.06, 0.42);
      const degrade = segment(t, 0.43, 0.8);
      const plastidReady = segment(t, 0.6, 0.96);
      const preyX = lerp(742, 454, approach);
      const preyY = lerp(306, 318, approach);
      let out = sceneBackground();
      out += drawHostCell(338, 310, 244, 172, {
        label: "New eukaryotic host",
        nucleus: 1,
        ribosomes: 1,
        internal: 0.3,
        simpleLabels: true,
        fill: "#e8ecff"
      });
      [
        [218, 238, 0.36, -14],
        [438, 238, 0.34, 12],
        [220, 390, 0.34, 15],
        [430, 392, 0.32, -12]
      ].forEach(([mx, my, ms, ma]) => {
        out += drawMitochondrion(mx, my, ms, { rotate: ma });
      });

      if (approach < 0.86) {
        out += drawSecondaryPrey(preyX, preyY, 0.86, 1);
      } else {
        out += drawHostCell(430, 318, 116 * (1 - degrade * 0.28), 84 * (1 - degrade * 0.28), {
          label: "Engulfed cell mostly degrades",
          nucleus: 1 - degrade * 0.8,
          nucleusScale: 0.45 * (1 - degrade * 0.18),
          nucleusOffsetX: -52,
          nucleusOffsetY: -16,
          ribosomes: 0.25 * (1 - degrade),
          ribosomeScale: 0.44 * (1 - degrade * 0.2),
          internal: 0,
          simpleLabels: true,
          opacity: 1 - degrade * 0.82,
          fill: "#eef8ff"
        });
      }

      if (approach > 0.1 && approach < 0.92) {
        out += `<path d="M 494 226 C 586 236, 606 288, 520 326" fill="none" stroke="#5667c9" stroke-width="14" stroke-linecap="round" opacity="${0.78 * (1 - segment(t, 0.42, 0.66))}"></path>`;
        out += `<path d="M 490 404 C 594 392, 608 342, 520 326" fill="none" stroke="#5667c9" stroke-width="14" stroke-linecap="round" opacity="${0.78 * (1 - segment(t, 0.42, 0.66))}"></path>`;
      }

      if (approach >= 0.86) {
        out += drawChloroplast(478, 314, 0.75, {
          rotate: 9,
          opacity: Math.max(0.35 * (1 - degrade), plastidReady),
          extraMembranes: plastidReady > 0.4 ? 3 : 2,
          label: plastidReady > 0.4 ? "Tertiary plastid" : "Secondary plastid in engulfed cell",
          badge: plastidReady > 0.4 ? "Tertiary plastid: multiple membranes" : "Secondary plastid: 3-4 membranes"
        });
      }
      out += label("Tertiary endosymbiosis", 500, 128, { to: [466, 240], maxChars: 26 });
      out += label("A eukaryote engulfs another eukaryote that already has a secondary plastid", 692, 250, { to: [510, 308], maxChars: 38, className: "svg-label svg-small" });
      if (plastidReady > 0.4) {
        out += label("Complex surrounding membranes remain", 650, 414, { to: [498, 306], maxChars: 32, className: "svg-label svg-small" });
      }
      return out;
    }

    function comparisonScene() {
      const headers = [
        "Mitochondrion from aerobic bacterium",
        "Primary chloroplast from cyanobacterium",
        "Secondary plastid from photosynthetic eukaryote",
        "Tertiary plastid from eukaryote with secondary plastid"
      ];
      const rows = [
        ["Original source", "Aerobic bacterium", "Photosynthetic cyanobacterium", "Photosynthetic eukaryote", "Eukaryote with secondary plastid"],
        ["Key retained traits", "Double membranes, circular DNA, 70S ribosomes, electron transport chain", "Double membranes, thylakoids, photosystems, circular DNA, 70S ribosomes", "Retained plastid with extra surrounding membranes; nucleomorph in some lineages", "Acquired complex plastid with multiple surrounding membranes"],
        ["Membrane number", "2", "2", "Usually 3-4", "Multiple membranes"],
        ["Gene transfer to nucleus", "Common and extensive", "Common and extensive", "Often continues across host, plastid, and remnant compartments", "Can involve several host and endosymbiont genomes over time"],
        ["Binary fission", "Yes", "Yes", "Plastid division retained", "Plastid division retained after acquisition"]
      ];
      const x0 = 42;
      const y0 = 80;
      const rowH = [72, 70, 118, 54, 82, 62];
      const colW = [154, 196, 196, 196, 196];
      let out = `<rect x="0" y="0" width="1000" height="620" fill="#fbfdff"></rect>`;
      out += textBlock("Comparison of endosymbiotic organelles", 500, 42, { maxChars: 60, className: "svg-label", force: true });
      let y = y0;
      out += `<g>`;
      out += rect(x0, y, colW.reduce((a, b) => a + b, 0), rowH[0], { fill: "#eef3ff", stroke: "#cfd9ea", "stroke-width": 1.5 });
      let x = x0 + colW[0];
      headers.forEach((header, i) => {
        out += rect(x, y, colW[i + 1], rowH[0], { fill: i === 0 ? "#fff1e6" : i === 1 ? "#e9fbef" : "#eef3ff", stroke: "#cfd9ea", "stroke-width": 1.5 });
        out += textBlock(header, x + colW[i + 1] / 2, y + 24, { maxChars: 22, className: "svg-label svg-small", lineHeight: 16, force: true });
        x += colW[i + 1];
      });
      y += rowH[0];

      rows.forEach((row, r) => {
        x = x0;
        out += rect(x, y, colW[0], rowH[r + 1], { fill: "#f5f7fb", stroke: "#cfd9ea", "stroke-width": 1.5 });
        out += textBlock(row[0], x + 12, y + 30, { anchor: "start", maxChars: 17, className: "svg-label svg-small", lineHeight: 16, force: true });
        x += colW[0];
        for (let c = 1; c < row.length; c += 1) {
          out += rect(x, y, colW[c], rowH[r + 1], { fill: "#ffffff", stroke: "#cfd9ea", "stroke-width": 1.5 });
          out += textBlock(row[c], x + 12, y + 24, { anchor: "start", maxChars: 23, className: "svg-label svg-tiny", lineHeight: 14, force: true });
          x += colW[c];
        }
        y += rowH[r + 1];
      });
      out += `</g>`;
      out += `<text x="500" y="594" text-anchor="middle" class="legend-text">All panels are simplified educational models of evolutionary histories, not literal short-term events inside one individual cell.</text>`;
      return out;
    }

    function renderStage() {
      const t = smooth(state.progress);
      const stage = STAGES[state.stageIndex];
      let content = defs();
      if (state.comparing) {
        content += comparisonScene();
      } else if (stage.id === "initial") {
        content += stageInitial(t);
      } else if (stage.id === "mitochondrion-origin") {
        content += stageMitoOrigin(t);
      } else if (stage.id === "mitochondrial-transfer") {
        content += stageMitoTransfer(t);
      } else if (stage.id === "mitochondrial-division") {
        content += stageMitoDivision(t);
      } else if (stage.id === "cyanobacterium-engulfment") {
        content += stageCyanoEngulfment(t);
      } else if (stage.id === "chloroplast-origin") {
        content += stageChloroplastOrigin(t);
      } else if (stage.id === "secondary") {
        content += stageSecondary(t);
      } else if (stage.id === "tertiary") {
        content += stageTertiary(t);
      }
      if (!state.comparing) content += legend();
      svg.innerHTML = content;
      updateCaption();
      updateControls();
    }

    function currentCaption() {
      if (state.comparing) {
        return "Summary comparison: mitochondria and plastids retain evidence of bacterial ancestry, while secondary and tertiary endosymbiosis add surrounding membranes by engulfing eukaryotic cells.";
      }
      const stage = STAGES[state.stageIndex];
      const p = state.progress;
      if (stage.id === "mitochondrion-origin" && p < 0.45) {
        return "A proto-eukaryotic host engulfs an aerobic bacterium but does not digest it. The temporary vesicle, bacterial outer membrane, and bacterial inner membrane are shown together.";
      }
      if (stage.id === "mitochondrion-origin" && p >= 0.45) {
        return "The bacterial endosymbiont becomes a mitochondrion. Many bacterial traits remain, including double membranes, circular DNA, 70S ribosomes, porins, and electron transport proteins.";
      }
      if (stage.id === "chloroplast-origin" && p > 0.62) {
        return "Chloroplasts divide by binary fission, reflecting their cyanobacterial origin.";
      }
      return stage.caption;
    }

    function updateCaption() {
      caption.textContent = currentCaption();
    }

    function updateControls() {
      playPause.textContent = state.playing ? "Pause" : "Play";
      progressBar.style.width = state.comparing ? "100%" : `${Math.round(state.progress * 100)}%`;
      document.querySelectorAll(".stage-button").forEach((button) => {
        const active = Number(button.dataset.stage) === state.stageIndex && !state.comparing;
        button.classList.toggle("active", active);
        button.setAttribute("aria-current", active ? "step" : "false");
      });
    }

    function jumpToStage(index, play = false) {
      state.stageIndex = clamp(index, 0, STAGES.length - 1);
      state.progress = 0;
      state.comparing = false;
      state.playing = play;
      renderStage();
    }

    function step(direction) {
      state.comparing = false;
      state.playing = false;
      if (direction < 0 && state.progress > 0.18) {
        state.progress = 0;
      } else {
        state.stageIndex = clamp(state.stageIndex + direction, 0, STAGES.length - 1);
        state.progress = direction > 0 ? 0 : 0.92;
      }
      renderStage();
    }

    function buildTimeline() {
      STAGES.forEach((stage, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "stage-button";
        button.dataset.stage = String(index);
        button.innerHTML = `<span class="num">${index + 1}</span>${esc(stage.name)}`;
        button.addEventListener("click", () => jumpToStage(index, false));
        timeline.appendChild(button);
      });
    }

    function tick(time) {
      if (!state.lastTime) state.lastTime = time;
      const delta = Math.min(0.06, (time - state.lastTime) / 1000);
      state.lastTime = time;

      if (state.playing && !state.comparing) {
        const stage = STAGES[state.stageIndex];
        state.progress += (delta * state.speed) / stage.duration;
        if (state.progress >= 1) {
          if (state.stageIndex < STAGES.length - 1) {
            state.stageIndex += 1;
            state.progress = 0;
          } else {
            state.progress = 1;
            state.playing = false;
          }
        }
        renderStage();
      }
      requestAnimationFrame(tick);
    }

    playPause.addEventListener("click", () => {
      if (state.comparing) {
        state.comparing = false;
        state.progress = 0;
      }
      state.playing = !state.playing;
      renderStage();
    });

    resetButton.addEventListener("click", () => {
      state.stageIndex = 0;
      state.progress = 0;
      state.comparing = false;
      state.playing = false;
      renderStage();
    });

    backButton.addEventListener("click", () => step(-1));
    forwardButton.addEventListener("click", () => step(1));

    compareButton.addEventListener("click", () => {
      state.playing = false;
      state.comparing = true;
      renderStage();
    });

    speedInput.addEventListener("input", () => {
      state.speed = Number(speedInput.value);
      speedValue.textContent = `${state.speed.toFixed(1)}x`;
    });

    labelsInput.addEventListener("change", () => {
      state.labels = labelsInput.checked;
      renderStage();
    });

    membranesInput.addEventListener("change", () => {
      state.membraneCounts = membranesInput.checked;
      renderStage();
    });

    buildTimeline();
    renderStage();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
