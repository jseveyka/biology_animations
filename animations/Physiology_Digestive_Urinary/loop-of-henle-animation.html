<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loop of Henle Countercurrent Animation</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #182126;
      --muted: #52636b;
      --panel: #ffffff;
      --line: #c8d4d7;
      --cortex: #dff0e9;
      --wall: #6f665f;
      --wall-hi: #5d544f;
      --lumen-light: #dff5ff;
      --lumen-mid: #84c6db;
      --lumen-dark: #28657a;
      --blood-light: #f5b8bd;
      --blood-mid: #bc4e61;
      --blood-dark: #6d1730;
      --water: #2296d2;
      --sodium: #ef8f21;
      --potassium: #7b4bb3;
      --chloride: #1fa66a;
      --drug: #d93636;
      --adh: #2c70bf;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #edf3f4;
      color: var(--ink);
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    header {
      display: grid;
      gap: 6px;
      padding: 4px 2px 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.2vw, 2.15rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .attribution {
      margin: 0;
      font-weight: 800;
      color: #25343a;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 14px;
      align-items: start;
    }

    .stage {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(24, 33, 38, 0.08);
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      min-height: 610px;
    }

    .controls {
      display: grid;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(24, 33, 38, 0.08);
    }

    .controls h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    button {
      border: 1px solid #b8c6ca;
      background: #f8fbfc;
      color: var(--ink);
      min-height: 42px;
      border-radius: 7px;
      font: inherit;
      font-weight: 700;
      text-align: left;
      padding: 9px 11px;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: #eef6f8;
      border-color: #7fb0bd;
    }

    button[aria-pressed="true"] {
      background: #1f6372;
      border-color: #1f6372;
      color: #fff;
    }

    .readout {
      display: grid;
      gap: 7px;
      padding-top: 2px;
    }

    .readout strong {
      font-size: 0.98rem;
    }

    .readout p {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 0.94rem;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px 10px;
      padding-top: 4px;
      border-top: 1px solid var(--line);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      font-size: 0.9rem;
      color: #2b3b41;
    }

    .swatch {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }

    .swatch.na { background: var(--sodium); }
    .swatch.k { background: var(--potassium); transform: rotate(45deg); border-radius: 4px; }
    .swatch.cl { background: var(--chloride); border-radius: 5px; }
    .swatch.water { background: var(--water); }

    .svg-label {
      font-size: 18px;
      font-weight: 800;
      fill: #223137;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.82);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .small-label {
      font-size: 15px;
      font-weight: 800;
      fill: #26363c;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.86);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .tiny-label {
      font-size: 12px;
      font-weight: 800;
      fill: #26363c;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.88);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .osmosis-label {
      font-size: 26px;
      font-weight: 900;
      text-anchor: end;
      fill: #243238;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.78);
      stroke-width: 6px;
      stroke-linejoin: round;
    }

    .lumen-text {
      font-size: 12px;
      font-weight: 900;
      text-anchor: middle;
      fill: #10232a;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.7);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .lumen-text.dark {
      fill: #fff;
      stroke: rgba(0, 0, 0, 0.28);
    }

    .tube-wall {
      fill: none;
      stroke: var(--wall);
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tube-shadow {
      fill: none;
      stroke: rgba(24, 33, 38, 0.16);
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tube-lumen {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 220ms ease, opacity 220ms ease;
    }

    .vasa-wall {
      fill: none;
      stroke: #84283a;
      stroke-width: 34;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .vasa-lumen {
      fill: none;
      stroke-width: 21;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 220ms ease, opacity 220ms ease;
    }

    .extra-vasa-wall {
      stroke-width: 28;
    }

    .extra-vasa-lumen {
      fill: none;
      stroke-width: 17;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .arrow {
      fill: none;
      stroke: #33454c;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowHead);
    }

    .arrow.water { stroke: var(--water); }
    .arrow.solute { stroke: #7a5735; }
    .arrow.blood { stroke: #8a2437; }
    .arrow.drug { stroke: var(--drug); }

    .particle {
      pointer-events: none;
    }

    .particle circle,
    .particle rect,
    .particle polygon {
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
    }

    .particle text {
      font-size: 8.5px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: central;
      fill: #fff;
      pointer-events: none;
    }

    .water-particle circle { fill: var(--water); }
    .na-particle circle { fill: var(--sodium); }
    .k-particle polygon { fill: var(--potassium); }
    .cl-particle rect { fill: var(--chloride); }
    .blood-particle circle { fill: #b92f46; }

    .aquaporin {
      fill: #55b9da;
      stroke: #137195;
      stroke-width: 1.5;
      transition: opacity 180ms ease;
    }

    .blocker,
    .aldo-group,
    .dct-retained,
    .extra-note {
      transition: opacity 180ms ease;
    }

    .hidden-state {
      opacity: 0;
      pointer-events: none;
    }

    .drug-symbol circle {
      fill: #fff;
      stroke: var(--drug);
      stroke-width: 5;
    }

    .drug-symbol line {
      stroke: var(--drug);
      stroke-width: 5;
      stroke-linecap: round;
    }

    .urine-fill {
      transition: y 260ms ease, height 260ms ease, fill 260ms ease;
    }

    @media (max-width: 1040px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .button-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 10px;
      }

      .button-grid,
      .legend {
        grid-template-columns: 1fr;
      }

      button {
        text-align: center;
      }

      svg {
        min-height: 520px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>

    <header>
      <p class="attribution">Animation Prompted by Jerred Seveyka for his biology class.</p>

          <rect x="0" y="0" width="1180" height="840" fill="#f7fbfc"></rect>

            <use href="#vasaDescTopPath" class="vasa-lumen" id="vasaDescTop" stroke="var(--blood-light)"></use>

            <use href="#vasaBendPath" class="vasa-lumen" id="vasaBend" stroke="var(--blood-dark)"></use>

            </g>

              <circle r="7"></circle>
              <animateMotion dur="7.8s" begin="-5.2s" repeatCount="indefinite">
                <mpath href="#vasaFullPath"></mpath>
              </animateMotion>
            </g>
          </g>

          <g id="extraRightVasaRecta">
            <use href="#rightVasaFullPath" class="vasa-wall"></use>
            <use href="#rightVasaDescTopPath" class="vasa-lumen" stroke="var(--blood-light)"></use>
            <use href="#rightVasaDescDeepPath" class="vasa-lumen" stroke="var(--blood-mid)"></use>

          <g id="exchangeArrows">
            <path class="arrow water" d="M180 286 C220 286 256 314 304 314"></path>

      aldosterone: {

      }
    };

    const byId = (id) => document.getElementById(id);
    const textIds = {
      descTop: "descTopText",
      descMid: "descMidText",
      descDeep: "descDeepText",
      loop: "loopText",
      asc: "ascText",
      ascMid: "ascMidText",
      dct: "dctText",
      cd: "cdText"
    };

    const setTwoLineOsm = (element, value) => {
      element.innerHTML = "";
      const top = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
      const bottom = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
      const x = element.getAttribute("x");
      top.setAttribute("x", x);
      bottom.setAttribute("x", x);
      bottom.setAttribute("dy", "13");
      top.textContent = value;
      bottom.textContent = "mOsm";
      element.append(top, bottom);
    };

    const setVisibleCount = (selector, count) => {
      document.querySelectorAll(selector).forEach((node) => {
        const index = Number(node.dataset.index ?? node.dataset.aqp ?? 0);
        node.style.opacity = index < count ? "1" : "0";
      });
    };

    const setGroupVisible = (id, visible) => {
      byId(id).classList.toggle("hidden-state", !visible);
    };

    const setUrine = ({ level, color, label }) => {
      const cupHeight = 60;
      const fillHeight = Math.max(8, cupHeight * level);
      const y = 820 - fillHeight;
      const fill = byId("urineFill");
      fill.setAttribute("y", y.toFixed(1));
      fill.setAttribute("height", fillHeight.toFixed(1));
      fill.setAttribute("fill", color);
      byId("urineText").textContent = label;
    };

    const applyState = (stateKey) => {
      const config = stateConfigs[stateKey] || stateConfigs.normal;

      document.querySelectorAll("button[data-state]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.state === stateKey));
      });

      byId("stateName").textContent = config.name;
      byId("stateSummary").textContent = config.summary;

      document.querySelectorAll("[data-osm-index]").forEach((label) => {
        label.textContent = config.interstitial[Number(label.dataset.osmIndex)];
      });

      byId("medStopTop").setAttribute("stop-color", config.medullaStops[0]);
      byId("medStopMid").setAttribute("stop-color", config.medullaStops[1]);
      byId("medStopDeep").setAttribute("stop-color", config.medullaStops[2]);

      byId("descTopLumen").setAttribute("stroke", config.tube.descTop);
      byId("descDeepLumen").setAttribute("stroke", config.tube.descDeep);
      byId("loopLumen").setAttribute("stroke", config.tube.loop);
      byId("ascDeepLumen").setAttribute("stroke", config.tube.ascDeep);
      byId("ascTopLumen").setAttribute("stroke", config.tube.ascTop);
      byId("dctLumen").setAttribute("stroke", config.tube.dct);
      byId("cdLumen").setAttribute("stroke", config.tube.cd);

      Object.entries(textIds).forEach(([key, id]) => {
        setTwoLineOsm(byId(id), config.labels[key]);
      });

      byId("vasaTopLabel").textContent = config.labels.vasaTop;
      byId("vasaDescMidLabel").textContent = config.labels.vasaDescMid;
      byId("vasaDeepLabel").textContent = config.labels.vasaDeep;
      byId("vasaAscMidLabel").textContent = config.labels.vasaAscMid;
      byId("vasaExitLabel").textContent = config.labels.vasaExit;
      byId("rightVasaTopLabel").textContent = config.labels.vasaTop;
      byId("rightVasaDescMidLabel").textContent = config.labels.vasaDescMid;
      byId("rightVasaDeepLabel").textContent = config.labels.vasaDeep;
      byId("rightVasaAscMidLabel").textContent = config.labels.vasaAscMid;
      byId("rightVasaExitLabel").textContent = config.labels.vasaExit;

      setVisibleCount(".aquaporin", config.counts.aquaporin);
      setVisibleCount('[data-kind="descWater"]', config.counts.descWater);
      setVisibleCount('[data-kind="ascIon"]', config.counts.ascIon);
      setVisibleCount('[data-kind="cdWater"]', config.counts.cdWater);
      setVisibleCount('[data-kind="rightVasaWater"]', config.counts.rightVasaWater);
      setVisibleCount('[data-kind="retainedWater"]', config.counts.retainedWater);
      setVisibleCount('[data-kind="dctNaCl"]', config.counts.dctNaCl);

      setGroupVisible("loopBlocker", config.showLoopBlocker);
      setGroupVisible("thiazideBlocker", config.showThiazideBlocker);
      setGroupVisible("aldosteroneGroup", config.showAldosterone);
      setGroupVisible("dctRetained", config.showDctRetained);
      setUrine(config.urine);
    };

    document.querySelectorAll("button[data-state]").forEach((button) => {
      button.addEventListener("click", () => applyState(button.dataset.state));
    });

    applyState("normal");
  </script>
