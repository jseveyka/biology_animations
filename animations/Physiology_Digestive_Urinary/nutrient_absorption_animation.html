<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nutrient Absorption Animation</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2a33;
      --muted: #526271;
      --panel: #ffffff;
      --line: #c9d7e6;
      --lumen: #eaf8ff;
      --cell: #ffe6c9;
      --cell-deep: #ffd7a3;
      --interstitial: #eef8f1;
      --capillary: #ffe4e9;
      --lacteal: #e8f8e7;
      --na: #ffd447;
      --glucose: #3d9bf5;
      --aa: #8c5bd6;
      --water: #8bdcff;
      --fructose: #ff9d35;
      --lipid: #56c46b;
      --k: #ff7eb3;
      --cl: #52b86b;
      --dash-duration: 1.55s;
      --arrow-duration: 2.2s;
      --glow-duration: 4.4s;
      --lipid-glow-duration: 5.2s;
      --pump-duration: 1.45s;
      --atp-duration: 1.15s;
      --lipid-sequence-duration: 12s;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f5f8fb;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-width: 320px;
    }

    .app {
      width: min(1400px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 9px clamp(10px, 2vw, 22px) 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .credit {
      margin: 0;
      text-align: center;
      font-size: clamp(12px, 1.1vw, 15px);
      font-weight: 700;
      line-height: 1.15;
      color: #52606d;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(28, 42, 58, 0.08);
    }

    .title-block {
      min-width: 260px;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.1vw, 31px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: clamp(13px, 1.2vw, 16px);
      font-weight: 700;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mode-switch {
      display: inline-flex;
      padding: 3px;
      gap: 3px;
      border: 1px solid #bac9d8;
      border-radius: 8px;
      background: #eef4f8;
    }

    button,
    .toggle-label,
    .speed-control {
      min-height: 34px;
      border-radius: 7px;
      border: 1px solid #a9b9c9;
      background: #ffffff;
      color: var(--ink);
      font: 700 14px/1 Arial, Helvetica, sans-serif;
    }

    button {
      cursor: pointer;
      padding: 8px 11px;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #6d91b5;
      background: #f7fbff;
    }

    button[aria-pressed="true"] {
      background: #1e5f96;
      border-color: #1e5f96;
      color: #ffffff;
    }

    .toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      white-space: nowrap;
    }

    .toggle-label input {
      width: 16px;
      height: 16px;
      accent-color: #1e5f96;
    }

    .speed-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      white-space: nowrap;
    }

    .speed-control input {
      width: 104px;
      accent-color: #1e5f96;
    }

    .speed-control span {
      min-width: 34px;
      text-align: right;
      color: #1e5f96;
      font-weight: 900;
    }

    .scenario-control,
    .pathway-control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 4px 7px;
      border: 1px solid #a9b9c9;
      border-radius: 7px;
      background: #ffffff;
    }

    .scenario-title,
    .pathway-title {
      color: #34495a;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .scenario-switch,
    .pathway-switch {
      display: inline-flex;
      gap: 3px;
    }

    .scenario-switch button,
    .pathway-switch button {
      min-height: 28px;
      padding: 6px 8px;
      font-size: 12px;
    }

    .scenario-note {
      max-width: 320px;
      margin: 0;
      padding: 7px 9px;
      border: 1px solid #c8d8e8;
      border-radius: 7px;
      background: #f6fbff;
      color: #34495a;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    .animation-wrap {
      flex: 1;
      min-height: 540px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 34px rgba(28, 42, 58, 0.1);
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 540px;
    }

    .region-label {
      font-size: 25px;
      font-weight: 900;
      fill: #24313d;
    }

    .sub-label,
    .vessel-label,
    .structure-label {
      font-size: 17px;
      font-weight: 800;
      fill: #364858;
    }

    .small-structure-label {
      font-size: 14px;
      font-weight: 800;
      fill: #3f5263;
    }

    .lumen-bg {
      fill: var(--lumen);
    }

    .interstitial-bg {
      fill: var(--interstitial);
    }

    .basement-line {
      stroke: #7f9c89;
      stroke-width: 3;
      stroke-dasharray: 8 8;
      opacity: 0.8;
    }

    .cell {
      fill: url(#cellGradient);
      stroke: #9c7d57;
      stroke-width: 2.5;
    }

    .cell-boundary {
      stroke: #b28a66;
      stroke-width: 2;
      stroke-dasharray: 7 7;
      opacity: 0.72;
    }

    .nucleus {
      fill: #f3c0dd;
      stroke: #a86493;
      stroke-width: 2;
      opacity: 0.85;
    }

    .microvillus {
      fill: #ffdcb4;
      stroke: #bd8752;
      stroke-width: 1.6;
    }

    .microvillus-base {
      fill: none;
      stroke: #bd8752;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .capillary-wall {
      fill: url(#capillaryGradient);
      stroke: #bb4f62;
      stroke-width: 3;
    }

    .lacteal-wall {
      fill: url(#lactealGradient);
      stroke: #4d9e68;
      stroke-width: 3;
    }

    .rbc {
      fill: #d84a5e;
      stroke: #9f2739;
      stroke-width: 1.5;
      opacity: 0.9;
    }

    .lymph-dot {
      fill: #70cf84;
      stroke: #2d8645;
      stroke-width: 1.3;
      opacity: 0.9;
    }

    .transporter {
      stroke: #25475e;
      stroke-width: 2.5;
      filter: url(#softShadow);
    }

    .apical-port {
      fill: #aee6ff;
    }

    .glucose-port {
      fill: #82cffd;
    }

    .aa-port {
      fill: #c7a2ff;
    }

    .basal-port {
      fill: #b9f0d0;
    }

    .capillary-port {
      fill: #d2f8df;
    }

    .aa-basal-port,
    .capillary-aa-port {
      fill: #dac7ff;
    }

    .fructose-port {
      fill: #ffd2a3;
    }

    .pump-body {
      fill: #fff3b0;
      stroke: #9c6b00;
      stroke-width: 3.5;
      filter: url(#softShadow);
      animation: pumpPulse 1.45s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .pump-label,
    .transporter-label {
      font-size: 13px;
      font-weight: 900;
      fill: #263440;
      text-anchor: middle;
      pointer-events: none;
    }

    .pump-small .pump-label {
      font-size: 9.5px;
    }

    .process-note {
      font-size: 12px;
      font-weight: 900;
      fill: #355064;
      text-anchor: middle;
    }

    .label-pill {
      fill: rgba(255, 255, 255, 0.82);
      stroke: #b6c8d8;
      stroke-width: 1.5;
    }

    .low-na-bracket {
      fill: none;
      stroke: #c79600;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .low-na-bracket-text {
      fill: #5e4b00;
      font-size: 18px;
      font-weight: 900;
      text-anchor: middle;
    }

    .flow-arrow {
      fill: none;
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 10 12;
      opacity: 0.78;
      animation: dashFlow var(--dash-duration) linear infinite, arrowPulse var(--arrow-duration) ease-in-out infinite;
    }

    .na-arrow {
      stroke: #e6a900;
    }

    .glucose-arrow {
      stroke: var(--glucose);
    }

    .aa-arrow {
      stroke: var(--aa);
    }

    .water-arrow {
      stroke: var(--water);
      stroke-width: 3.8;
      opacity: 0.68;
    }

    .fructose-arrow {
      stroke: var(--fructose);
    }

    .lipid-arrow {
      stroke: var(--lipid);
    }

    .post-dock-flow {
      opacity: 0;
      animation: dashFlow var(--dash-duration) linear infinite, postDockLine var(--lipid-sequence-duration) linear infinite;
    }

    .k-arrow {
      stroke: var(--k);
    }

    .cl-arrow {
      stroke: var(--cl);
    }

    .cl-channel {
      fill: #bdeec7;
      stroke: #247e3c;
    }

    .scenario-label {
      fill: #294052;
      font-size: 13px;
      font-weight: 900;
      text-anchor: middle;
    }

    .ort-transporter-glow {
      fill: none;
      stroke: #0c84d6;
      stroke-width: 6;
      opacity: 0.65;
      animation: transporterGlow var(--glow-duration) ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .glow-port {
      animation: transporterGlow var(--glow-duration) ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .aa-port {
      animation-delay: 1.2s;
    }

    .fructose-port.glow-port {
      animation-delay: 0.7s;
    }

    .callout rect {
      fill: rgba(255, 255, 255, 0.92);
      stroke: #b7c9db;
      stroke-width: 1.8;
      rx: 8;
    }

    .callout-title {
      fill: #263440;
      font-size: 15px;
      font-weight: 900;
    }

    .callout-text {
      fill: #3b4d5d;
      font-size: 13.5px;
      font-weight: 700;
    }

    .particle-label {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .particle {
      filter: url(#particleShadow);
    }

    .static-particle {
      opacity: 0.88;
    }

    .moving-particle {
      opacity: 0.96;
    }

    .atp-badge circle {
      fill: #fff8cc;
      stroke: #c49700;
      stroke-width: 2;
      animation: atpPulse var(--atp-duration) ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .atp-badge text {
      fill: #6d5200;
      font-size: 15px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .atp-small text {
      font-size: 9px;
    }

    .micelle {
      fill: #d9f7a5;
      stroke: #4da756;
      stroke-width: 1.5;
    }

    .chylomicron-static ellipse {
      fill: #a6eeb3;
      stroke: #268240;
      stroke-width: 2.5;
      filter: url(#softShadow);
    }

    .chylomicron-static text {
      fill: #164f2a;
      font-size: 12px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .smooth-er {
      fill: none;
      stroke: #9a6a32;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.9;
    }

    .smooth-er-shadow {
      fill: none;
      stroke: rgba(154, 106, 50, 0.18);
      stroke-width: 18;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .lipid-process-label {
      fill: #284052;
      font-size: 14px;
      font-weight: 900;
      text-anchor: middle;
    }

    .lipid-small-label {
      fill: #365061;
      font-size: 12px;
      font-weight: 900;
      text-anchor: middle;
    }

    .bile-salt {
      fill: #d6ce4a;
      stroke: #8b8523;
      stroke-width: 1.2;
    }

    .lacteal-fill {
      fill: #effdef;
      stroke: none;
    }

    .lacteal-segment {
      fill: none;
      stroke: #4d9e68;
      stroke-width: 9;
      stroke-linecap: round;
    }

    .vesicle-ring {
      fill: rgba(122, 213, 140, 0.1);
      stroke: #3f9f56;
      stroke-width: 3;
      stroke-dasharray: 6 5;
    }

    .lipid-chain {
      fill: none;
      stroke: #278747;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .glycerol-backbone {
      stroke: #2a7280;
      stroke-width: 5;
      stroke-linecap: round;
    }

    .steroid-ring {
      fill: #fff1bd;
      stroke: #9a6a32;
      stroke-width: 2.3;
      stroke-linejoin: round;
    }

    .protein-fold {
      fill: none;
      stroke: #7660c9;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .protein-fold-fill {
      fill: #d8ceff;
      stroke: #7660c9;
      stroke-width: 2;
    }

    .lipid-stage-dot {
      fill: rgba(255, 255, 255, 0.7);
      stroke: #c9d7e6;
      stroke-width: 1.5;
    }

    .lipid-bottom-note {
      fill: #314b5d;
      font-size: 13px;
      font-weight: 900;
      text-anchor: middle;
    }

    .add-chain-arrow {
      fill: none;
      stroke: #56c46b;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 6 6;
      marker-end: url(#arrowLipid);
    }

    .lipid-legend rect {
      fill: rgba(255, 255, 255, 0.9);
      stroke: #bdd1c2;
      stroke-width: 1.8;
      rx: 8;
    }

    .lipid-legend-title {
      fill: #284052;
      font-size: 14px;
      font-weight: 900;
    }

    .lipid-legend-text {
      fill: #365061;
      font-size: 12.5px;
      font-weight: 800;
    }

    body:not([data-mode="pct"]) .pct-only,
    body:not([data-mode="intestinal"]) .carb-only,
    body:not([data-mode="lipid"]) .lipid-only,
    body[data-mode="lipid"] .solute-only {
      display: none !important;
    }

    body:not([data-scenario="normal"]) .normal-only,
    body:not([data-scenario="cholera"]) .cholera-only,
    body:not([data-scenario="ort"]) .ort-only,
    body[data-scenario="cholera"] .absorptive-water {
      display: none !important;
    }

    body:not([data-pathway="all"]) .pathway-all-only,
    body:not([data-pathway="glucose"]) .pathway-glucose-only,
    body:not([data-pathway="aa"]) .pathway-aa-only,
    body:not([data-pathway="fructose"]) .pathway-fructose-only,
    body[data-pathway="all"] .pathway-simplified-only,
    body[data-mode="intestinal"][data-pathway="glucose"] .path-aa,
    body[data-mode="intestinal"][data-pathway="glucose"] .path-fructose,
    body[data-mode="intestinal"][data-pathway="aa"] .path-glucose,
    body[data-mode="intestinal"][data-pathway="aa"] .path-fructose,
    body[data-mode="intestinal"][data-pathway="aa"] .glucose-scenario-control,
    body[data-mode="intestinal"][data-pathway="aa"] .cholera-only,
    body[data-mode="intestinal"][data-pathway="aa"] .ort-only,
    body[data-mode="intestinal"][data-pathway="fructose"] .path-glucose,
    body[data-mode="intestinal"][data-pathway="fructose"] .path-aa,
    body[data-mode="intestinal"][data-pathway="fructose"] .na-gradient-visual,
    body[data-mode="intestinal"][data-pathway="fructose"] .glucose-scenario-control,
    body[data-mode="intestinal"][data-pathway="fructose"] .cholera-only,
    body[data-mode="intestinal"][data-pathway="fructose"] .ort-only {
      display: none !important;
    }

    body[data-mode="intestinal"][data-pathway="glucose"] .lane-aa,
    body[data-mode="intestinal"][data-pathway="glucose"] .lane-fructose,
    body[data-mode="intestinal"][data-pathway="aa"] .lane-glucose,
    body[data-mode="intestinal"][data-pathway="aa"] .lane-fructose,
    body[data-mode="intestinal"][data-pathway="fructose"] .lane-glucose,
    body[data-mode="intestinal"][data-pathway="fructose"] .lane-aa {
      opacity: 0.22;
    }

    body[data-mode="intestinal"][data-pathway="all"] .scenario-note,
    body[data-mode="intestinal"][data-pathway="glucose"] .scenario-note {
      display: none !important;
    }

    body.labels-off .explain {
      display: none !important;
    }

    body.is-paused .flow-arrow,
    body.is-paused .pump-body,
    body.is-paused .glow-port,
    body.is-paused .atp-badge circle {
      animation-play-state: paused;
    }

    @keyframes dashFlow {
      to {
        stroke-dashoffset: -44;
      }
    }

    @keyframes arrowPulse {
      0%, 100% {
        opacity: 0.52;
      }
      50% {
        opacity: 0.98;
      }
    }

    @keyframes postDockLine {
      0%, 42% {
        opacity: 0;
      }
      48%, 100% {
        opacity: 0.78;
      }
    }

    @keyframes transporterGlow {
      0%, 46%, 100% {
        filter: url(#softShadow);
        stroke-width: 2.5;
      }
      16%, 26% {
        filter: url(#glow);
        stroke-width: 4;
      }
    }

    @keyframes pumpPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.055);
      }
    }

    .pump-body {
      animation-duration: var(--pump-duration);
    }

    @keyframes atpPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.16);
      }
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .mode-switch {
        width: 100%;
      }

      .mode-switch button {
        flex: 1;
      }

      .scenario-control,
      .pathway-control {
        width: 100%;
        align-items: flex-start;
        flex-direction: column;
      }

      .scenario-switch,
      .pathway-switch {
        width: 100%;
      }

      .scenario-switch button,
      .pathway-switch button {
        flex: 1;
      }

      button,
      .toggle-label {
        font-size: 13px;
      }
    }
  </style>
</head>
<body data-mode="pct" data-scenario="normal" data-pathway="all">
  <main class="app" aria-labelledby="mainTitle">
    <p class="credit">Animation Prompted by Jerred Seveyka for his biology class.</p>

    <header class="topbar">
      <div class="title-block">
        <h1 id="mainTitle">Proximal Convoluted Tubule: Reabsorption from filtrate</h1>
        <p class="subtitle" id="modeSubtitle">Compare epithelial nutrient absorption across kidney and intestine.</p>
      </div>

      <div class="controls" aria-label="Animation controls">
        <div class="mode-switch" role="group" aria-label="Choose epithelial system">
          <button type="button" id="pctMode" aria-pressed="true">PCT absorption</button>
          <button type="button" id="intestinalMode" aria-pressed="false">Intestinal carbohydrate + amino acid absorption</button>
          <button type="button" id="lipidMode" aria-pressed="false">Intestinal lipid absorption</button>
        </div>
        <div class="scenario-control carb-only glucose-scenario-control" aria-label="Intestinal glucose transport scenario">
          <span class="scenario-title">Intestinal glucose transport scenario</span>
          <div class="scenario-switch" role="group">
            <button type="button" id="normalScenario" aria-pressed="true">Normal absorption</button>
            <button type="button" id="choleraScenario" aria-pressed="false">Cholera</button>
            <button type="button" id="ortScenario" aria-pressed="false">Oral rehydration therapy</button>
          </div>
        </div>
        <div class="pathway-control carb-only" aria-label="Show pathway">
          <span class="pathway-title">Show pathway</span>
          <div class="pathway-switch" role="group">
            <button type="button" id="allPathway" aria-pressed="true">All</button>
            <button type="button" id="glucosePathway" aria-pressed="false">Glucose</button>
            <button type="button" id="aaPathway" aria-pressed="false">Amino acid</button>
            <button type="button" id="fructosePathway" aria-pressed="false">Fructose</button>
          </div>
        </div>
        <p class="scenario-note carb-only">Cholera and ORT comparisons use the glucose/Na+ pathway.</p>
        <label class="speed-control">
          Animation speed
          <input type="range" id="animationSpeed" min="0.5" max="3" step="0.25" value="1">
          <span id="speedReadout">1.0x</span>
        </label>
        <button type="button" id="playPause">Pause</button>
        <button type="button" id="resetAnimation">Reset</button>
        <label class="toggle-label">
          <input type="checkbox" id="showLabels" checked>
          Show explanation labels
        </label>
      </div>
    </header>

    <section class="animation-wrap" aria-label="Interactive nutrient absorption animation">
      <svg id="scene" viewBox="0 0 1200 760" role="img" aria-labelledby="svgTitle svgDesc">

            <text class="callout-title" x="16" y="26">Key idea</text>
            <text class="callout-text" x="16" y="52">

              <tspan x="16" dy="22">The Na+/K+ pump creates a</tspan>
              <tspan x="16" dy="18">Na+ gradient that drives uptake</tspan>

              <tspan x="16" dy="18">from the filtrate.</tspan>
            </text>
          </g>

          <g class="callout explain carb-only normal-only pathway-all-only" transform="translate(900 342)">
            <rect width="278" height="204"></rect>
            <text class="callout-title" x="16" y="26">Key idea</text>
            <text class="callout-text" x="16" y="52">
              <tspan x="16" dy="0">Enterocytes absorb digested</tspan>
              <tspan x="16" dy="18">carbohydrates and amino acids.</tspan>
              <tspan x="16" dy="22">Na+ drives glucose and AA</tspan>
              <tspan x="16" dy="18">uptake, while fructose uses</tspan>
              <tspan x="16" dy="18">facilitated diffusion.</tspan>
              <tspan x="16" dy="24">Use Show pathway to isolate one</tspan>
              <tspan x="16" dy="18">transport route at a time.</tspan>
            </text>
          </g>

          <g class="callout explain carb-only normal-only pathway-glucose-only" transform="translate(900 342)">
            <rect width="278" height="156"></rect>
            <text class="callout-title" x="16" y="26">Key idea</text>
            <text class="callout-text" x="16" y="52">
              <tspan x="16" dy="0">The Na+/K+ pump keeps Na+</tspan>
              <tspan x="16" dy="18">low inside the cell.</tspan>
              <tspan x="16" dy="22">That gradient pulls Na+ and</tspan>
              <tspan x="16" dy="18">glucose inward together, and</tspan>
              <tspan x="16" dy="18">water follows toward blood.</tspan>

            <text class="callout-text" x="16" y="52">

              <tspan x="16" dy="18">amino acid uptake.</tspan>
              <tspan x="16" dy="22">Amino acids exit by AA</tspan>
              <tspan x="16" dy="18">transporters and then move</tspan>
              <tspan x="16" dy="18">into the blood capillary.</tspan>
            </text>
          </g>

          <g class="callout explain carb-only normal-only pathway-fructose-only" transform="translate(900 342)">
            <rect width="278" height="156"></rect>
            <text class="callout-title" x="16" y="26">Key idea</text>
            <text class="callout-text" x="16" y="52">
              <tspan x="16" dy="0">Fructose does not use the</tspan>
              <tspan x="16" dy="18">Na+/Glucose co-transporter.</tspan>
              <tspan x="16" dy="22">It uses facilitated diffusion</tspan>
              <tspan x="16" dy="18">into the cell and GLUT to</tspan>
              <tspan x="16" dy="18">exit toward blood.</tspan>
            </text>
          </g>

          <g class="callout explain carb-only cholera-only" transform="translate(900 342)">

            <text class="callout-title" x="16" y="26">Key idea</text>
            <text class="callout-text" x="16" y="52">
              <tspan x="16" dy="0">Cholera increases Cl- secretion</tspan>
              <tspan x="16" dy="18">into the intestinal lumen.</tspan>
              <tspan x="16" dy="22">Na+ and water follow, causing</tspan>
              <tspan x="16" dy="18">excess water to remain in</tspan>
              <tspan x="16" dy="18">the lumen.</tspan>

          <g class="callout explain carb-only ort-only" transform="translate(900 342)">

            <text class="callout-title" x="16" y="26">Key idea</text>
            <text class="callout-text" x="16" y="52">
              <tspan x="16" dy="0">ORT supplies glucose and Na+.</tspan>
              <tspan x="16" dy="22">The Na+/Glucose co-transporter</tspan>
              <tspan x="16" dy="18">remains active, pulling both</tspan>
              <tspan x="16" dy="18">into enterocytes.</tspan>
              <tspan x="16" dy="22">Water follows into the blood.</tspan>
              <tspan x="16" dy="22">ORT does not directly stop</tspan>
              <tspan x="16" dy="18">Cl- secretion.</tspan>

              <tspan x="16" dy="18">absorptive cells can contain multiple</tspan>
              <tspan x="16" dy="18">relevant transporters.</tspan>

            <text class="callout-text" x="16" y="52">
              <tspan x="16" dy="0">Micelles dock at microvilli.</tspan>
              <tspan x="16" dy="22">Fatty acids, monoglycerides,</tspan>
              <tspan x="16" dy="18">and steroids diffuse in.</tspan>
              <tspan x="16" dy="22">The smooth ER rebuilds fats,</tspan>

  <script>
    (() => {
      const SVG_NS = "http://www.w3.org/2000/svg";
      const body = document.body;
      const root = document.documentElement;
      const scene = document.getElementById("scene");
      const pctButton = document.getElementById("pctMode");
      const intestinalButton = document.getElementById("intestinalMode");
      const lipidButton = document.getElementById("lipidMode");
      const normalScenarioButton = document.getElementById("normalScenario");
      const choleraScenarioButton = document.getElementById("choleraScenario");
      const ortScenarioButton = document.getElementById("ortScenario");
      const allPathwayButton = document.getElementById("allPathway");
      const glucosePathwayButton = document.getElementById("glucosePathway");
      const aaPathwayButton = document.getElementById("aaPathway");
      const fructosePathwayButton = document.getElementById("fructosePathway");
      const playPauseButton = document.getElementById("playPause");
      const resetButton = document.getElementById("resetAnimation");
      const showLabels = document.getElementById("showLabels");
      const speedInput = document.getElementById("animationSpeed");
      const speedReadout = document.getElementById("speedReadout");
      const title = document.getElementById("mainTitle");
      const subtitle = document.getElementById("modeSubtitle");
      const staticLayer = document.getElementById("staticParticles");
      const movingLayer = document.getElementById("movingParticles");
      const microvilliLayer = document.getElementById("microvilli");

      const state = {
        mode: "pct",
        scenario: "normal",
        pathway: "all",
        paused: false,
        speed: 1
      };

      const cssDurations = {
        "--dash-duration": 1.55,
        "--arrow-duration": 2.2,
        "--glow-duration": 4.4,
        "--lipid-glow-duration": 5.2,
        "--pump-duration": 1.45,
        "--atp-duration": 1.15,
        "--lipid-sequence-duration": 12
      };

      const modeText = {
        pct: {
          title: "PCT Absorption: Reabsorption from filtrate",
          subtitle: "Tubular filtrate loses nutrients and water to the interstitial fluid and peritubular capillary."
        },
        intestinal: {
          title: "Intestinal Carbohydrate + Amino Acid Absorption",
          subtitle: "Na+ gradients drive glucose and amino-acid uptake; fructose uses facilitated diffusion."
        },
        lipid: {
          title: "Intestinal Lipid Absorption",
          subtitle: "Micelles deliver lipids to enterocytes, which package chylomicrons for lymphatic transport."
        }
      };

      const particles = {
        na: { label: "Na+", shape: "circle", r: 12, fill: "#ffd447", stroke: "#b88400", text: "#3e3100", font: 8.5 },
        glucose: { label: "Glucose", shape: "hex", r: 20, fill: "#4aa7ff", stroke: "#1466ad", text: "#062f55", font: 7.4 },
        aa: { label: "AA", shape: "triangle", r: 18, fill: "#a27be6", stroke: "#5f3aa5", text: "#ffffff", font: 9 },
        water: { label: "H2O", shape: "drop", r: 15, fill: "#9ce4ff", stroke: "#3f9ec4", text: "#07526e", font: 7.5 },
        fructose: { label: "Fructose", shape: "circle", r: 18, fill: "#ffad4d", stroke: "#bd6413", text: "#552500", font: 6.8 },
        lipid: { label: "Lipid", shape: "drop", r: 17, fill: "#67ce76", stroke: "#247d3b", text: "#103d1d", font: 8 },
        k: { label: "K+", shape: "circle", r: 12, fill: "#ff8cbd", stroke: "#b23d75", text: "#4f0e2d", font: 8.5 },
        cl: { label: "Cl-", shape: "circle", r: 13, fill: "#70d185", stroke: "#247e3c", text: "#123f20", font: 8.2 },
        fattyAcid: { label: "Fatty acid", shape: "custom", text: "#103d1d", font: 5.8 },
        monoglyceride: { label: "Monoglyceride", shape: "custom", text: "#073f48", font: 4.9 },
        steroid: { label: "Steroid", shape: "custom", text: "#4f2300", font: 6.6 },
        protein: { label: "Protein", shape: "custom", text: "#443400", font: 7.2 },
        triglyceride: { label: "Triglyceride", shape: "custom", text: "#114b27", font: 9 },
        chylomicron: { label: "Chylomicron", shape: "ellipse", rx: 43, ry: 23, fill: "#a8efb6", stroke: "#2b8744", text: "#114b27", font: 7.6 }
      };

      function svgEl(name, attributes = {}) {
        const element = document.createElementNS(SVG_NS, name);
        Object.entries(attributes).forEach(([key, value]) => {
          element.setAttribute(key, value);
        });
        return element;
      }

      function addBrushBorder(startX, endX, modeClass, spacing = 32) {
        const group = svgEl("g", { class: modeClass });
        group.appendChild(svgEl("path", {
          class: "microvillus-base",
          d: `M${startX} 155 H${endX}`
        }));

        const sparse = spacing > 40;
        const startOffset = sparse ? 10 : 6;
        const endOffset = sparse ? 26 : 20;
        const villusWidth = sparse ? 24 : 22;

        for (let x = startX + startOffset; x <= endX - endOffset; x += spacing) {
          const height = (sparse ? 44 : 46) + ((x / spacing) % 3) * 7;
          const villus = svgEl("rect", {
            class: "microvillus",
            x,
            y: 155 - height,
            width: villusWidth,
            height,
            rx: 10
          });
          group.appendChild(villus);
        }
        microvilliLayer.appendChild(group);
      }

      function addMicrovilli() {
        addBrushBorder(160, 850, "pct-only");
        addBrushBorder(160, 390, "carb-only lane-glucose");
        addBrushBorder(390, 620, "carb-only lane-aa");
        addBrushBorder(620, 850, "carb-only lane-fructose");
        addBrushBorder(225, 840, "lipid-only", 110);
      }

      function addCustomLipidParticle(group, type, label) {
        if (!["fattyAcid", "monoglyceride", "steroid", "protein", "triglyceride"].includes(type)) {
          return false;
        }

        const labelText = svgEl("text", {
          class: "particle-label",
          x: 0,
          y: 24,
          fill: "#164f2a",
          "font-size": type === "monoglyceride" ? 4.8 : 6.2
        });
        labelText.textContent = label;

        if (type === "fattyAcid") {
          group.appendChild(svgEl("path", {
            class: "lipid-chain",
            d: "M-22 2 C-12 -12 -2 -4 8 -16 C18 -28 28 -10 38 -18"
          }));
        } else if (type === "monoglyceride") {
          group.appendChild(svgEl("line", {
            class: "glycerol-backbone",
            x1: -20,
            y1: -20,
            x2: -20,
            y2: 14
          }));
          group.appendChild(svgEl("path", {
            class: "lipid-chain",
            d: "M-20 -6 C-4 -22 12 -8 30 -18"
          }));
        } else if (type === "triglyceride") {
          group.appendChild(svgEl("line", {
            class: "glycerol-backbone",
            x1: -24,
            y1: -22,
            x2: -24,
            y2: 20
          }));
          group.appendChild(svgEl("path", {
            class: "lipid-chain",
            d: "M-24 -14 C-6 -30 12 -16 32 -28"
          }));
          group.appendChild(svgEl("path", {
            class: "lipid-chain",
            d: "M-24 0 C-4 -12 14 -2 36 -12"
          }));
          group.appendChild(svgEl("path", {
            class: "lipid-chain",
            d: "M-24 14 C-4 28 14 16 36 26"
          }));
          labelText.textContent = "TG";
        } else if (type === "steroid") {
          [
            "-34,-6 -23,-22 -4,-22 7,-6 -4,10 -23,10",
            "-4,-22 16,-22 27,-6 16,10 -4,10 7,-6",
            "16,-22 36,-22 47,-6 36,10 16,10 27,-6",
            "36,10 50,4 60,18 49,31 31,25"
          ].forEach((points) => {
            group.appendChild(svgEl("polygon", {
              class: "steroid-ring",
              points
            }));
          });
        } else {
          group.appendChild(svgEl("path", {
            class: "protein-fold",
            d: "M-30 -3 C-20 -24 -4 -20 -7 -3 C-10 14 12 15 14 -2 C16 -22 32 -12 28 10"
          }));

            class: "protein-fold",
            d: "M-18 22 C-6 10 12 12 7 25 C2 38 24 36 30 20"
          }));
          group.appendChild(svgEl("ellipse", {
            class: "protein-fold-fill",
            cx: 0,
            cy: 9,
            rx: 10,
            ry: 7
          }));
        }

        group.appendChild(labelText);
        return true;
      }

      function addParticleShape(group, type, overrideLabel) {
        const config = particles[type];
        const label = overrideLabel || config.label;
        let shape;

        if (addCustomLipidParticle(group, type, label)) {
          return;
        }

        if (config.shape === "circle") {
          shape = svgEl("circle", {
            cx: 0,
            cy: 0,
            r: config.r,
            fill: config.fill,
            stroke: config.stroke,
            "stroke-width": 1.7
          });
        } else if (config.shape === "hex") {
          const r = config.r;
          const points = Array.from({ length: 6 }, (_, index) => {
            const angle = Math.PI / 6 + index * Math.PI / 3;
            return `${Math.cos(angle) * r},${Math.sin(angle) * r}`;
          }).join(" ");
          shape = svgEl("polygon", {
            points,
            fill: config.fill,
            stroke: config.stroke,
            "stroke-width": 1.8
          });
        } else if (config.shape === "triangle") {
          const r = config.r;
          shape = svgEl("polygon", {
            points: `0,${-r} ${r * 0.9},${r * 0.75} ${-r * 0.9},${r * 0.75}`,
            fill: config.fill,
            stroke: config.stroke,
            "stroke-width": 1.8
          });
        } else if (config.shape === "drop") {
          const r = config.r;
          shape = svgEl("path", {
            d: `M0,${-r} C${r * 0.7},${-r * 0.25} ${r * 0.88},${r * 0.48} ${r * 0.25},${r * 0.82} C${-r * 0.42},${r * 1.2} ${-r * 0.95},${r * 0.45} ${-r * 0.75},${-r * 0.08} C${-r * 0.55},${-r * 0.48} ${-r * 0.23},${-r * 0.73} 0,${-r} Z`,
            fill: config.fill,
            stroke: config.stroke,
            "stroke-width": 1.7
          });
        } else {
          shape = svgEl("ellipse", {
            cx: 0,
            cy: 0,
            rx: config.rx,
            ry: config.ry,
            fill: config.fill,
            stroke: config.stroke,
            "stroke-width": 2
          });
        }

        const text = svgEl("text", {
          class: "particle-label",
          x: 0,
          y: config.shape === "drop" ? 3 : 1,
          fill: config.text,
          "font-size": config.font
        });
        text.textContent = label;

        group.appendChild(shape);
        group.appendChild(text);
      }

      function addStaticParticle(type, x, y, modeClass = "", scale = 1) {
        const group = svgEl("g", {
          class: `particle static-particle ${modeClass}`,
          transform: `translate(${x} ${y}) scale(${scale})`
        });
        addParticleShape(group, type);
        staticLayer.appendChild(group);
      }

      function formatSeconds(seconds) {
        return `${Number(seconds).toFixed(3).replace(/\.?0+$/, "")}s`;
      }

      function scaledSeconds(seconds) {
        return formatSeconds(seconds / state.speed);
      }

      function addMovingParticle(type, path, duration, begin, modeClass = "", scale = 1, label) {
        const group = svgEl("g", {
          class: `particle moving-particle ${modeClass}`,
          transform: `scale(${scale})`
        });
        addParticleShape(group, type, label);
        const motion = svgEl("animateMotion", {
          path,
          dur: scaledSeconds(duration),
          begin: scaledSeconds(begin),
          repeatCount: "indefinite"
        });
        motion.dataset.baseDur = String(duration);
        motion.dataset.baseBegin = String(begin);
        group.appendChild(motion);
        movingLayer.appendChild(group);
      }

      function addPumpCycle(x, modeClass, offset = 0, pumpParticleDuration = 2.6) {
        const naPath = `M${x} 438 C${x} 477 ${x} 512 ${x} 550`;
        const naPathTwo = `M${x - 9} 438 C${x - 9} 477 ${x - 9} 512 ${x - 9} 550`;
        const naPathThree = `M${x + 9} 438 C${x + 9} 477 ${x + 9} 512 ${x + 9} 550`;
        const kPath = `M${x + 32} 552 C${x + 22} 512 ${x + 14} 477 ${x + 10} 438`;
        const kPathTwo = `M${x + 18} 552 C${x + 12} 512 ${x + 8} 477 ${x + 5} 438`;
        const step = pumpParticleDuration / 7.6;

        addMovingParticle("na", naPath, pumpParticleDuration, offset, modeClass, 0.8);
        addMovingParticle("na", naPathTwo, pumpParticleDuration, offset + step, modeClass, 0.8);
        addMovingParticle("na", naPathThree, pumpParticleDuration, offset + step * 2, modeClass, 0.8);
        addMovingParticle("k", kPath, pumpParticleDuration, offset + step * 0.45, modeClass, 0.8);
        addMovingParticle("k", kPathTwo, pumpParticleDuration, offset + step * 1.55, modeClass, 0.8);
      }

      function resetAnimation() {
        scene.setCurrentTime(0);
        if (state.paused) {
          scene.pauseAnimations();
        } else {
          scene.unpauseAnimations();
        }
      }

      function setPaused(paused) {
        state.paused = paused;
        body.classList.toggle("is-paused", paused);
        playPauseButton.textContent = paused ? "Play" : "Pause";
        playPauseButton.setAttribute("aria-pressed", String(paused));
        if (paused) {
          scene.pauseAnimations();
        } else {
          scene.unpauseAnimations();
        }
      }

      function setMode(mode) {
        state.mode = mode;
        body.dataset.mode = mode;
        title.textContent = modeText[mode].title;
        subtitle.textContent = modeText[mode].subtitle;
        pctButton.setAttribute("aria-pressed", String(mode === "pct"));
        intestinalButton.setAttribute("aria-pressed", String(mode === "intestinal"));
        lipidButton.setAttribute("aria-pressed", String(mode === "lipid"));
        resetAnimation();
      }

      function setScenario(scenario) {
        state.scenario = scenario;
        body.dataset.scenario = scenario;
        normalScenarioButton.setAttribute("aria-pressed", String(scenario === "normal"));
        choleraScenarioButton.setAttribute("aria-pressed", String(scenario === "cholera"));
        ortScenarioButton.setAttribute("aria-pressed", String(scenario === "ort"));
        resetAnimation();
      }

      function setPathway(pathway) {
        state.pathway = pathway;
        body.dataset.pathway = pathway;
        allPathwayButton.setAttribute("aria-pressed", String(pathway === "all"));
        glucosePathwayButton.setAttribute("aria-pressed", String(pathway === "glucose"));
        aaPathwayButton.setAttribute("aria-pressed", String(pathway === "aa"));
        fructosePathwayButton.setAttribute("aria-pressed", String(pathway === "fructose"));

        if ((pathway === "aa" || pathway === "fructose") && state.scenario !== "normal") {
          setScenario("normal");
          return;
        }

        resetAnimation();
      }

      function setLabelVisibility() {
        body.classList.toggle("labels-off", !showLabels.checked);
      }

      function updateSpeed() {
        state.speed = Number(speedInput.value);
        speedReadout.textContent = `${state.speed.toFixed(1)}x`;
        Object.entries(cssDurations).forEach(([name, base]) => {
          root.style.setProperty(name, scaledSeconds(base));
        });

        scene.querySelectorAll("[data-base-dur]").forEach((animation) => {
          const baseDur = Number(animation.dataset.baseDur);
          const baseBegin = Number(animation.dataset.baseBegin || 0);
          animation.setAttribute("dur", scaledSeconds(baseDur));
          animation.setAttribute("begin", scaledSeconds(baseBegin));
        });

        if (state.paused) {
          scene.pauseAnimations();
        }
      }

      pctButton.addEventListener("click", () => setMode("pct"));
      intestinalButton.addEventListener("click", () => setMode("intestinal"));
      lipidButton.addEventListener("click", () => setMode("lipid"));
      normalScenarioButton.addEventListener("click", () => setScenario("normal"));
      choleraScenarioButton.addEventListener("click", () => setScenario("cholera"));
      ortScenarioButton.addEventListener("click", () => setScenario("ort"));
      allPathwayButton.addEventListener("click", () => setPathway("all"));
      glucosePathwayButton.addEventListener("click", () => setPathway("glucose"));
      aaPathwayButton.addEventListener("click", () => setPathway("aa"));
      fructosePathwayButton.addEventListener("click", () => setPathway("fructose"));
      playPauseButton.addEventListener("click", () => setPaused(!state.paused));
      resetButton.addEventListener("click", resetAnimation);
      showLabels.addEventListener("change", setLabelVisibility);
      speedInput.addEventListener("input", updateSpeed);

      addMicrovilli();
      buildStaticParticles();
      buildMovingParticles();
      updateSpeed();
      setLabelVisibility();
      setPathway("all");
      setScenario("normal");
      setMode("pct");
    })();
