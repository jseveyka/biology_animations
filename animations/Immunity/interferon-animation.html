<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interferon and the Antiviral State</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2733;
      --muted: #5d6f80;
      --panel: #ffffff;
      --line: #c7d4dc;
      --bg: #f3f7f6;
      --left-fill: #e0f5ee;
      --left-stroke: #3b8d7d;
      --right-fill: #e8eefc;
      --right-stroke: #516fb0;
      --virus: #d24b63;
      --virus-edge: #84243b;
      --rna: #7137a8;
      --viral-rna: #a23a83;
      --host-rna: #27839a;
      --signal-mrna: #d6413f;
      --dsrna-a: #7137a8;
      --dsrna-b: #008c90;
      --ifn: #f4c64a;
      --ifn-edge: #90650b;
      --protein: #68b88b;
      --protein-active: #ffd23f;
      --protein-active-edge: #b88707;
      --shadow: 0 14px 30px rgba(31, 49, 63, .13);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #fbfdfd 0%, var(--bg) 58%, #eaf1f0 100%);
    }

    .page {
      width: min(1420px, 100%);
      margin: 0 auto;
      padding: 14px 12px 28px;
    }

    .attribution {
      margin: 0 0 6px;
      text-align: center;
      color: #395467;
      font-size: .98rem;
      font-weight: 750;
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      color: #173247;
      font-size: 2.25rem;
      line-height: 1.08;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 0 auto 12px;
      max-width: 1280px;
    }

    .controls button {
      min-height: 42px;
      border: 1px solid #8aa0b1;
      border-radius: 8px;
      padding: 8px 12px;
      background: #fff;
      color: #20384a;
      font-weight: 760;
      line-height: 1.12;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(31, 49, 63, .08);
      transition: background-color 140ms ease, border-color 140ms ease, transform 140ms ease;
      white-space: normal;
    }

    .controls button:hover,
    .controls button:focus-visible {
      border-color: #366b90;
      outline: 3px solid rgba(54, 107, 144, .22);
      outline-offset: 2px;
      transform: translateY(-1px);
    }

    .controls button.primary {
      border-color: #1e6b70;
      background: #1e6b70;
      color: #fff;
    }

    .controls button.active,
    .controls button[aria-pressed="true"]:not(.primary) {
      border-color: #bd6a16;
      background: #fff2df;
      color: #754409;
    }

    .controls button.primary[aria-pressed="true"] {
      border-color: #174f54;
      background: #174f54;
    }

    .status-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 360px);
      gap: 12px;
      align-items: stretch;
      max-width: 1320px;
      margin: 0 auto 12px;
    }

    .explanation,
    .status-pill,
    .stage-shell {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: var(--shadow);
    }

    .explanation {
      min-height: 74px;
      padding: 12px 15px;
      font-size: 1.02rem;
      line-height: 1.42;
    }

    .explanation strong {
      display: block;
      margin-bottom: 3px;
      color: #173247;
      font-size: 1.04rem;
    }

    .status-pill {
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 12px 14px;
      color: #405c70;
      font-weight: 740;
    }

    .status-pill span:first-child {
      color: #173247;
      font-size: 1.02rem;
    }

    .stage-shell {
      max-width: 1320px;
      margin: 0 auto;
      overflow: hidden;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      background: #f8fbfb;
    }

    text {
      letter-spacing: 0;
    }

    .cell-body {
      stroke-width: 4;
      filter: drop-shadow(0 8px 13px rgba(31, 49, 63, .1));
    }

    .left-cell {
      fill: var(--left-fill);
      stroke: var(--left-stroke);
    }

    .right-cell {
      fill: var(--right-fill);
      stroke: var(--right-stroke);
    }

    .cell-label {
      fill: #173247;
      font-size: 24px;
      font-weight: 850;
      text-anchor: middle;
    }

    .label,
    .small-label,
    .process-label,
    .callout-label {
      fill: #243b4e;
      font-weight: 780;
    }

    .label {
      font-size: 19px;
    }

    .small-label {
      font-size: 16px;
    }

    .process-label {
      font-size: 18px;
    }

    .fine-label {
      fill: #4e6575;
      font-size: 14px;
      font-weight: 710;
    }

    .callout-label {
      font-size: 18px;
    }

    .nucleus {
      fill: #f5eaff;
      stroke: #8050a0;
      stroke-width: 3;
    }

    .dna {
      fill: none;
      stroke: #8050a0;
      stroke-width: 3;
      stroke-linecap: round;
    }

    .arrow,
    .label-arrow {
      fill: none;
      stroke: #49687c;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowHead);
    }

    .receptor-arrow {
      stroke: #111111;
      marker-end: url(#blackArrowHead);
    }

    .signal-arrow {
      fill: none;
      stroke: #d28522;
      stroke-width: 3;
      stroke-dasharray: 8 9;
      stroke-linecap: round;
      marker-end: url(#orangeArrowHead);
    }

    .virus-spike {
      stroke: var(--virus-edge);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .virus-core {
      fill: var(--virus);
      stroke: var(--virus-edge);
      stroke-width: 2.4;
    }

    .capsid-rna {
      fill: none;
      stroke: #4b2584;
      stroke-width: 3.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .capsid-piece {
      fill: #f7c5d0;
      stroke: var(--virus-edge);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .rna,
    .signal-mrna,
    .viral-rna,
    .host-rna,
    .dsrna {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .rna {
      stroke: var(--rna);
    }

    .signal-mrna {
      stroke: var(--signal-mrna);
    }

    .viral-rna {
      stroke: var(--viral-rna);
    }

    .host-rna {
      stroke: var(--host-rna);
    }

    .dsrna-a {
      stroke: var(--dsrna-a);
    }

    .dsrna-b {
      stroke: var(--dsrna-b);
    }

    .sensor {
      fill: #fff7dc;
      stroke: #c78314;
      stroke-width: 2.5;
    }

    .sensor-pulse {
      fill: none;
      stroke: #d48718;
      stroke-width: 3;
      opacity: .72;
    }

    .ifn-square rect {
      fill: var(--ifn);
      stroke: var(--ifn-edge);
      stroke-width: 2;
      rx: 0;
      ry: 0;
    }

    .receptor {
      fill: #405e9a;
      stroke: #274474;
      stroke-width: 2.3;
    }

    .receptor-pocket {
      fill: #f8fbfb;
      stroke: #223d69;
      stroke-width: 2.1;
    }

    .ribosome {
      fill: #f4d2b2;
      stroke: #ad6534;
      stroke-width: 2.2;
    }

    .protein-shape {
      fill: var(--protein);
      stroke: #2f7c52;
      stroke-width: 2;
    }

    .inactive .protein-shape {
      fill: #a7d8bd;
      stroke: #4c8562;
    }

    .active .protein-shape {
      fill: var(--protein-active);
      stroke: var(--protein-active-edge);
      stroke-width: 2.2;
    }

    .damage-crack {
      fill: none;
      stroke: #8a3f4f;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .incomplete-virus {
      opacity: .46;
    }

    .incomplete-virus .virus-core {
      fill: #ef9caf;
    }

    .stage-layer {
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .scene.step-1 .step1-only,
    .scene.step-2 .after-step1,
    .scene.step-2 .step2-only,
    .scene.step-3 .after-step2,
    .scene.step-3 .step3-only,
    .scene.step-4 .after-step3,
    .scene.step-4 .step4-only,
    .scene.step-5 .step5-only {
      opacity: 1;
    }

    .scene.step-3 .after-step2 {
      opacity: .72;
    }

    .scene.step-4 .after-step3 {
      opacity: .86;
    }

    .scene.labels-hidden .scene-label,
    .scene.labels-hidden .label-arrow {
      opacity: 0 !important;
    }

    .draw-path,
    .hidden-at-start,
    .cap-left,
    .cap-right,
    .fragment,
    .active-protein,
    .active-label,
    .late-damage,
    .late-reduced,
    .host-strand-final,
    .viral-strand-final {
      opacity: 0;
    }

    .entry-motion,
    .entry-intact,
    .cap-left,
    .cap-right,
    .ifn-motion,
    .binding-motion,
    .protein-pop,
    .primed-inactive-final,
    .active-protein,
    .fragment,
    .later-virus-motion,
    .later-intact,
    .late-damage,
    .late-reduced {
      transform-box: fill-box;
      transform-origin: center;
    }

    .scene.animate.step-1 .entry-motion {
      animation: enterLeftVirus 1600ms ease-out both;
    }

    .scene.animate.step-1 .entry-intact {
      animation: fadeOut 360ms 1500ms ease-out forwards;
    }

    .scene.animate.step-1 .cap-left {
      animation: openCapLeft 850ms 1450ms ease-out both;
    }

    .scene.animate.step-1 .cap-right {
      animation: openCapRight 850ms 1450ms ease-out both;
    }

    .scene.animate.step-1 .released-left-rna {
      animation: drawLine 1100ms 2050ms ease-out both;
    }

    .scene.animate.step-2 .copied-dsrna {
      animation: drawLine 1200ms 650ms ease-out both;
    }

    .scene.animate.step-2 .sensor-pulse {
      animation: sensorPulse 1100ms 1450ms ease-out both;
    }

    .scene.animate.step-2 .ifn-made-1 {
      animation: ifnRelease1 1900ms 1900ms ease-in-out both;
    }

    .scene.animate.step-2 .ifn-made-2 {
      animation: ifnRelease2 1800ms 2050ms ease-in-out both;
    }

    .scene.animate.step-2 .ifn-made-3 {
      animation: ifnRelease3 1950ms 2200ms ease-in-out both;
    }

    .scene.animate.step-3 .diffuse-1 {
      animation: diffuseOne 2300ms ease-in-out both;
    }

    .scene.animate.step-3 .diffuse-2 {
      animation: diffuseTwo 2450ms 120ms ease-in-out both;
    }

    .scene.animate.step-3 .diffuse-3 {
      animation: diffuseThree 2350ms 240ms ease-in-out both;
    }

    .scene.animate.step-3 .binding-motion {
      animation: bindInterferon 1700ms 1450ms ease-in-out both;
    }

    .scene.animate.step-4 .signal-arrow {
      animation: signalDash 950ms ease-in-out infinite;
    }

    .scene.animate.step-4 .transcribed-mrna {
      animation: drawLine 1150ms 700ms ease-out both;
    }

    .scene.animate.step-4 .exported-mrna {
      animation: drawLine 1200ms 1450ms ease-out both;
    }

    .scene.animate.step-4 .protein-pop {
      animation: proteinAppear 750ms 2700ms ease-out both;
    }

    .scene.animate.step-5 .later-virus-motion {
      animation: enterRightVirus 1450ms ease-out both;
    }

    .scene.animate.step-5 .later-intact {
      animation: fadeOut 320ms 1350ms ease-out forwards;
    }

    .scene.animate.step-5 .later-cap-left {
      animation: openCapLeft 760ms 1300ms ease-out both;
    }

    .scene.animate.step-5 .later-cap-right {
      animation: openCapRight 760ms 1300ms ease-out both;
    }

    .scene.animate.step-5 .released-right-rna {
      animation: drawLine 900ms 1850ms ease-out both;
    }

    .scene.animate.step-5 .viral-strand-final {
      animation: finalStrandReveal 500ms 1900ms ease-out both, rnaBreak 1650ms 4000ms ease-out forwards;
    }

    .scene.animate.step-5 .host-strand-final {
      animation: finalStrandReveal 500ms 1050ms ease-out both, rnaBreak 1650ms 4100ms ease-out forwards;
    }

    .scene.animate.step-5 .protein-to-viral-a {
      animation: proteinToViralA 2650ms 2350ms ease-in-out both;
    }

    .scene.animate.step-5 .protein-to-viral-b {
      animation: proteinToViralB 2650ms 2450ms ease-in-out both;
    }

    .scene.animate.step-5 .protein-to-host-a {
      animation: proteinToHostA 2650ms 2550ms ease-in-out both;
    }

    .scene.animate.step-5 .protein-to-host-b {
      animation: proteinToHostB 2650ms 2650ms ease-in-out both;
    }

    .scene.animate.step-5 .primed-inactive-final {
      animation: inactiveActivate 950ms 2100ms ease-out forwards;
    }

    .scene.animate.step-5 .active-label {
      animation: fadeIn 450ms 2700ms ease-out both;
    }

    .scene.animate.step-5 .fragment {
      animation: fragmentScatter 1250ms 4700ms ease-out both;
    }

    .scene.animate.step-5 .late-damage {
      animation: fadeIn 700ms 5700ms ease-out both;
    }

    .scene.animate.step-5 .late-reduced {
      animation: fadeIn 700ms 6350ms ease-out both;
    }

    @keyframes enterLeftVirus {
      from { transform: translate(-95px, -66px) scale(.88); opacity: .2; }
      to { transform: translate(0, 0) scale(1); opacity: 1; }
    }

    @keyframes enterRightVirus {
      from { transform: translate(112px, -54px) scale(.88); opacity: .2; }
      to { transform: translate(0, 0) scale(1); opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes openCapLeft {
      from { transform: translate(0, 0) rotate(0); opacity: 0; }
      20% { opacity: 1; }
      to { transform: translate(-17px, -8px) rotate(-20deg); opacity: 1; }
    }

    @keyframes openCapRight {
      from { transform: translate(0, 0) rotate(0); opacity: 0; }
      20% { opacity: 1; }
      to { transform: translate(17px, 8px) rotate(20deg); opacity: 1; }
    }

    @keyframes drawLine {
      from { stroke-dasharray: 0 360; opacity: 0; }
      to { stroke-dasharray: 360 0; opacity: 1; }
    }

    @keyframes sensorPulse {
      from { r: 20; opacity: .8; }
      to { r: 56; opacity: 0; }
    }

    @keyframes ifnRelease1 {
      from { transform: translate(-82px, 64px); opacity: 0; }
      22% { opacity: 1; }
      to { transform: translate(0, 0); opacity: 1; }
    }

    @keyframes ifnRelease2 {
      from { transform: translate(-100px, 24px); opacity: 0; }
      22% { opacity: 1; }
      to { transform: translate(0, 0); opacity: 1; }
    }

    @keyframes ifnRelease3 {
      from { transform: translate(-86px, -38px); opacity: 0; }
      22% { opacity: 1; }
      to { transform: translate(0, 0); opacity: 1; }
    }

    @keyframes diffuseOne {
      from { transform: translate(-162px, 18px); opacity: 0; }
      18% { opacity: 1; }
      to { transform: translate(0, 0); opacity: 1; }
    }

    @keyframes diffuseTwo {
      from { transform: translate(-178px, -28px); opacity: 0; }
      18% { opacity: 1; }
      to { transform: translate(0, 0); opacity: 1; }
    }

    @keyframes diffuseThree {
      from { transform: translate(-150px, 58px); opacity: 0; }
      18% { opacity: 1; }
      to { transform: translate(0, 0); opacity: 1; }
    }

    @keyframes bindInterferon {
      from { transform: translate(-110px, -6px); opacity: 1; }
      76% { transform: translate(0, 0); opacity: 1; }
      to { transform: translate(0, 0); opacity: 1; }
    }

    @keyframes signalDash {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -34; }
    }

    @keyframes proteinAppear {
      from { transform: scale(.55); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes inactiveActivate {
      0%, 42% { transform: scale(1); opacity: 1; }
      72% { transform: scale(1.16); opacity: .75; }
      100% { transform: scale(1.16); opacity: 0; }
    }

    @keyframes finalStrandReveal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes proteinToViralA {
      0% { transform: translate(0, 0) scale(.92); opacity: 0; }
      12%, 30% { transform: translate(0, 0) scale(1); opacity: 1; }
      64%, 100% { transform: translate(18px, -174px) scale(1.04); opacity: 1; }
    }

    @keyframes proteinToViralB {
      0% { transform: translate(0, 0) scale(.92); opacity: 0; }
      12%, 30% { transform: translate(0, 0) scale(1); opacity: 1; }
      64%, 100% { transform: translate(18px, -174px) scale(1.04); opacity: 1; }
    }

    @keyframes proteinToHostA {
      0% { transform: translate(0, 0) scale(.92); opacity: 0; }
      12%, 30% { transform: translate(0, 0) scale(1); opacity: 1; }
      64%, 100% { transform: translate(-48px, -72px) scale(1.04); opacity: 1; }
    }

    @keyframes proteinToHostB {
      0% { transform: translate(0, 0) scale(.92); opacity: 0; }
      12%, 30% { transform: translate(0, 0) scale(1); opacity: 1; }
      64%, 100% { transform: translate(-12px, -70px) scale(1.04); opacity: 1; }
    }

    @keyframes rnaBreak {
      0%, 36% { opacity: 1; stroke-dasharray: 360 0; }
      62% { opacity: .72; stroke-dasharray: 34 14; }
      100% { opacity: .12; stroke-dasharray: 8 18; }
    }

    @keyframes fragmentScatter {
      from { transform: translate(0, 0) scale(.68); opacity: 0; }
      28% { opacity: 1; }
      to { transform: translate(var(--dx), var(--dy)) scale(1); opacity: .9; }
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 1.9rem;
      }

      .status-row {
        grid-template-columns: 1fr;
      }

      .controls button {
        flex: 1 1 220px;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding-inline: 8px;
      }

      h1 {
        font-size: 1.55rem;
      }

      .controls button {
        flex-basis: 100%;
      }

      .explanation {
        min-height: 96px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="attribution">Animation Prompted by Jerred Seveyka for his biology class.</p>
    <h1>Interferon and the Antiviral State</h1>

    <nav class="controls" aria-label="Animation controls">
      <button id="playFull" class="primary" type="button" aria-pressed="false">Play full sequence</button>
      <button class="step-button" type="button" data-step="1">Step 1: virus enters</button>
      <button class="step-button" type="button" data-step="2">Step 2: dsRNA triggers interferon</button>
      <button class="step-button" type="button" data-step="3">Step 3: interferon binds receptor</button>
      <button class="step-button" type="button" data-step="4">Step 4: antiviral proteins made</button>
      <button class="step-button" type="button" data-step="5">Step 5: later infection</button>
      <button id="reset" type="button">Reset</button>
      <button id="labelToggle" type="button" aria-pressed="false">Labels on/off</button>
    </nav>

    <section class="status-row" aria-live="polite">
      <div id="explanation" class="explanation"></div>
      <div class="status-pill">
        <span id="stageStatus">Ready</span>
        <span>Interferon-induced antiviral state</span>
      </div>
    </section>

    <section class="stage-shell" aria-label="Interferon animation scene">
      <svg id="scene" class="scene step-0" viewBox="0 0 1280 760" role="img" aria-labelledby="sceneTitle sceneDesc">
        <title id="sceneTitle">Interferon and the antiviral state</title>
        <desc id="sceneDesc">Two neighboring body cells show how a first infected cell releases interferon and how a primed neighboring cell later cuts up viral RNA and host mRNA.</desc>

        <defs>
          <marker id="arrowHead" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#49687c"></path>
          </marker>
          <marker id="orangeArrowHead" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#d28522"></path>
          </marker>
          <marker id="blackArrowHead" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#111111"></path>
          </marker>
          <linearGradient id="leftMembrane" x1="0" x2="1">
            <stop offset="0%" stop-color="#c2eadf"></stop>
            <stop offset="100%" stop-color="#f2fbf8"></stop>
          </linearGradient>
          <linearGradient id="rightMembrane" x1="0" x2="1">
            <stop offset="0%" stop-color="#f4f7ff"></stop>
            <stop offset="100%" stop-color="#dce6ff"></stop>
          </linearGradient>
        </defs>

        <rect x="28" y="32" width="1224" height="692" rx="28" fill="#f2f8f7" stroke="#d5e1e6"></rect>
        <path d="M640 132 L640 626" stroke="#d2dde4" stroke-width="3" stroke-dasharray="8 13"></path>

        <text x="322" y="102" class="cell-label scene-label">Virus-infected body cell.</text>
        <text x="958" y="102" class="cell-label scene-label">Neighboring body cell.</text>

        <g id="leftCell">
          <rect class="cell-body left-cell" x="74" y="140" width="520" height="500" rx="44"></rect>
          <rect x="100" y="166" width="468" height="448" rx="34" fill="url(#leftMembrane)" opacity=".7"></rect>
          <ellipse cx="222" cy="546" rx="78" ry="50" fill="#eef8ee" stroke="#6b9b70" stroke-width="2.4" opacity=".75"></ellipse>
          <text x="222" y="552" class="fine-label scene-label" text-anchor="middle">host nucleus</text>
        </g>

  <script>
    (() => {
      const scene = document.querySelector("#scene");
      const explanation = document.querySelector("#explanation");
      const stageStatus = document.querySelector("#stageStatus");
      const playFull = document.querySelector("#playFull");
      const resetButton = document.querySelector("#reset");
      const labelToggle = document.querySelector("#labelToggle");
      const stepButtons = Array.from(document.querySelectorAll(".step-button"));
      const stepClasses = ["step-0", "step-1", "step-2", "step-3", "step-4", "step-5"];
      const timers = [];

      const content = {
        0: {
          title: "Ready",
          body: "Choose a step or play the full sequence to show how interferon creates an antiviral state in a neighboring cell."
        },
        1: {
          title: "Step 1: virus enters",
          body: "A virus enters the body cell, uncoats, and releases its single-stranded RNA."
        },
        2: {
          title: "Step 2: dsRNA triggers interferon",
          body: "During viral replication, viral RNA is copied into double-stranded RNA. The dsRNA stimulates the infected cell to release interferon. Pattern recognition receptors that trigger interferon release may also react to viral single-stranded RNA and unmethylated viral DNA."
        },
        3: {
          title: "Step 3: interferon binds receptor",
          body: "Interferon diffuses to a neighboring cell and binds to a matching interferon receptor."
        },
        4: {
          title: "Step 4: antiviral proteins made",
          body: "The receiving cell expresses antiviral genes. Transcription and translation produce inactive antiviral proteins."
        },
        5: {
          title: "Step 5: later infection",
          body: "Later, a virus infects the primed cell and uncoats. The inactive antiviral proteins become active and cut up viral RNA and host mRNA. This damages the host cell but reduces viral production."
        }
      };

      const sequenceDurations = {
        1: 4500,
        2: 5000,
        3: 4700,
        4: 5600,
        5: 7800
      };

      function clearTimers() {
        while (timers.length) {
          window.clearTimeout(timers.pop());
        }
        playFull.setAttribute("aria-pressed", "false");
      }

      function updateStepButtons(step) {
        stepButtons.forEach((button) => {
          const isActive = Number(button.dataset.step) === step;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });
      }

      function showStep(step, options = {}) {
        if (!options.fromSequence) {
          clearTimers();
        }

        scene.classList.remove(...stepClasses, "animate");
        scene.classList.add(`step-${step}`);
        void scene.getBoundingClientRect();
        scene.classList.add("animate");

        const copy = content[step];
        explanation.innerHTML = `<strong>${copy.title}</strong>${copy.body}`;
        stageStatus.textContent = step === 0 ? "Ready" : `Showing step ${step} of 5`;
        updateStepButtons(step);
      }

      function playSequence() {
        clearTimers();
        playFull.setAttribute("aria-pressed", "true");
        showStep(1, { fromSequence: true });

        let elapsed = sequenceDurations[1];
        [2, 3, 4, 5].forEach((step) => {
          timers.push(window.setTimeout(() => showStep(step, { fromSequence: true }), elapsed));
          elapsed += sequenceDurations[step];
        });

        timers.push(window.setTimeout(() => {
          playFull.setAttribute("aria-pressed", "false");
        }, elapsed));
      }

      playFull.addEventListener("click", playSequence);
      resetButton.addEventListener("click", () => showStep(0));
      labelToggle.addEventListener("click", () => {
        const hidden = scene.classList.toggle("labels-hidden");
        labelToggle.setAttribute("aria-pressed", String(hidden));
      });

      stepButtons.forEach((button) => {
        button.addEventListener("click", () => showStep(Number(button.dataset.step)));
      });

      showStep(0);
    })();
  </script>
