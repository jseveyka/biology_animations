<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spermatogenesis: Regulation of Sperm Production</title>
  <style>
    :root {
      --ink: #1b2a34;
      --muted: #526271;
      --panel: #fffdf6;
      --sky: #eaf6ff;
      --hypo: #ff786b;
      --pituitary: #8d73d9;
      --fsh: #e052a0;
      --lh: #2d75d6;
      --testosterone: #f5a623;
      --inhibin: #18a99a;
      --abp: #5bbd72;
      --tubule: #ffd78a;
      --tubule-wall: #f4975b;
      --sertoli: #77c98d;
      --interstitial: #ffd05a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      color: var(--ink);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 16% 8%, rgba(255, 210, 138, 0.28), transparent 24%),
        linear-gradient(135deg, #e8f6ff 0%, #fff8e7 52%, #f0fff6 100%);
    }

    .app {
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 8px;
      height: 100vh;
      padding: 10px;
    }

    .credit-line {
      color: #425463;
      font-size: clamp(12px, 1.1vw, 15px);
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 36px;
    }

    h1 {
      margin: 0;
      font-size: clamp(18px, 2.15vw, 28px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .stage-readout {
      min-width: 220px;
      color: var(--muted);
      font-size: clamp(13px, 1.2vw, 16px);
      font-weight: 700;
      text-align: right;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      padding: 8px 10px;
      border: 1px solid rgba(46, 78, 92, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 6px 18px rgba(32, 74, 94, 0.08);
    }

    .button-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    button {
      min-width: 72px;
      min-height: 34px;
      border: 0;
      border-radius: 7px;
      color: #102331;
      background: #d8edf8;
      font: 800 14px/1 "Segoe UI", Arial, sans-serif;
      cursor: pointer;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.08), 0 2px 8px rgba(23, 54, 72, 0.12);
    }

    button:hover,
    button:focus-visible {
      outline: 3px solid rgba(45, 117, 214, 0.3);
      background: #c7e6f5;
    }

    button.primary {
      color: white;
      background: #2573bd;
    }

    button.primary:hover,
    button.primary:focus-visible {
      background: #1f65a7;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #263947;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .control input[type="range"] {
      width: min(170px, 20vw);
      accent-color: #2573bd;
    }

    .control input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #2573bd;
    }

    .panel {
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(28, 71, 90, 0.2);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 38px rgba(32, 74, 94, 0.16);
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    text {
      fill: var(--ink);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-weight: 800;
      letter-spacing: 0;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.78);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .small-text {
      font-size: 15px;
    }

    .medium-text {
      font-size: 18px;
    }

    .large-text {
      font-size: 22px;
    }

    .tiny-text {
      font-size: 12px;
      font-weight: 900;
    }

    .label-box {
      fill: rgba(255, 255, 255, 0.88);
      stroke: rgba(34, 64, 80, 0.22);
      stroke-width: 1.5;
    }

    .organ-outline {
      stroke: rgba(39, 56, 69, 0.28);
      stroke-width: 3;
    }

    .glow-soft {
      filter: url(#softGlow);
    }

    .glow-strong {
      filter: url(#strongGlow);
    }

    .pulse-ring {
      fill: none;
      stroke-width: 5;
      opacity: 0.55;
    }

    .hidden {
      display: none;
    }

    .hide-labels .toggle-label {
      display: none;
    }

    @media (max-height: 720px) {
      .app {
        gap: 6px;
        padding: 7px;
      }

      .toolbar {
        padding: 6px 8px;
      }

      button {
        min-height: 30px;
        min-width: 64px;
        font-size: 13px;
      }

      .stage-readout {
        font-size: 13px;
      }
    }

    @media (max-width: 760px) {
      .titlebar {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .stage-readout {
        min-width: 0;
        text-align: left;
      }

      .control input[type="range"] {
        width: 130px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="credit-line">Animation Prompted by Jerred Seveyka for his biology class</div>

    <div class="titlebar">
      <h1>Spermatogenesis: Hormonal Regulation</h1>
      <div class="stage-readout" id="stageReadout" aria-live="polite">Ready</div>
    </div>

    <div class="toolbar" aria-label="Animation controls">
      <div class="button-group">
        <button class="primary" id="playBtn" type="button">Play</button>
        <button id="pauseBtn" type="button">Pause</button>
        <button id="stepBtn" type="button">Step</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>

      <label class="control" for="speedSlider">
        Speed
        <input id="speedSlider" type="range" min="0.5" max="2.5" value="1" step="0.1">
        <span id="speedValue">1.0x</span>
      </label>

      <label class="control" for="labelToggle">
        <input id="labelToggle" type="checkbox" checked>
        Show labels
      </label>

      <label class="control" for="feedbackToggle">
        <input id="feedbackToggle" type="checkbox" checked>
        Show feedback arrows
      </label>

      <label class="control" for="summaryToggle">
        <input id="summaryToggle" type="checkbox" checked>
        Show summary
      </label>
    </div>

    <main class="panel">
      <svg id="diagram" viewBox="0 0 1200 760" role="img" aria-labelledby="diagramTitle diagramDesc">
        <title id="diagramTitle">Hypothalamic-pituitary-testis axis regulation of sperm production</title>
        <desc id="diagramDesc">An interactive 2D animation of FSH, LH, testosterone, androgen-binding protein, inhibin, and feedback regulation during sperm production.</desc>
        <defs>
          <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
            <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 1 0 0 0.62  0 0 1 0 0.18  0 0 0 0.7 0" result="glow"></feColorMatrix>
            <feMerge>
              <feMergeNode in="glow"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
            <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 1 0 0 0.72  0 0 1 0 0.25  0 0 0 0.9 0" result="glow"></feColorMatrix>
            <feMerge>
              <feMergeNode in="glow"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>

          <marker id="arrow-neutral" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M 0 0 L 14 7 L 0 14 Z" fill="#51606e"></path>
          </marker>
          <marker id="arrow-fsh" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M 0 0 L 14 7 L 0 14 Z" fill="#e052a0"></path>
          </marker>
          <marker id="arrow-lh" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M 0 0 L 14 7 L 0 14 Z" fill="#2d75d6"></path>
          </marker>
          <marker id="arrow-testosterone" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M 0 0 L 14 7 L 0 14 Z" fill="#f5a623"></path>
          </marker>
          <marker id="arrow-inhibin" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M 0 0 L 14 7 L 0 14 Z" fill="#18a99a"></path>
          </marker>
          <clipPath id="tubuleClip">
            <circle cx="500" cy="535" r="213"></circle>
          </clipPath>
        </defs>

        <rect x="0" y="0" width="1200" height="760" fill="#fffdf6"></rect>
        <path d="M 0 255 C 260 226 404 278 618 246 C 832 214 968 251 1200 222 L 1200 760 L 0 760 Z" fill="#eef9f7"></path>
        <path d="M 0 0 L 1200 0 L 1200 256 C 954 278 822 222 626 258 C 392 301 248 222 0 265 Z" fill="#eaf6ff"></path>

        <g id="staticLayer"></g>
        <g id="organLayer"></g>
        <g id="cellLayer"></g>
        <g id="effectLayer"></g>
        <g id="hormoneLayer"></g>
        <g id="feedbackLayer"></g>
        <g id="labelLayer"></g>
        <g id="summaryLayer"></g>
        <g id="measureLayer" opacity="0"></g>
      </svg>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      const NS = "http://www.w3.org/2000/svg";
      const STAGE_MS = 3300;
      const svg = document.getElementById("diagram");
      const layers = {
        static: document.getElementById("staticLayer"),
        organ: document.getElementById("organLayer"),
        cell: document.getElementById("cellLayer"),
        effect: document.getElementById("effectLayer"),
        hormone: document.getElementById("hormoneLayer"),
        feedback: document.getElementById("feedbackLayer"),
        label: document.getElementById("labelLayer"),
        summary: document.getElementById("summaryLayer"),
        measure: document.getElementById("measureLayer")
      };

      const colors = {
        neutral: "#51606e",
        fsh: "#e052a0",
        lh: "#2d75d6",
        testosterone: "#f5a623",
        inhibin: "#18a99a",
        abp: "#5bbd72",
        sperm: "#4b6172"
      };

      const paths = {
        hypothalamus: "M 600 116 C 604 132 602 144 600 158",
        fshA: "M 570 188 C 500 275 438 377 408 467",
        lh: "M 636 190 C 720 280 801 402 846 512",
        testosteroneToTubule: "M 828 548 C 770 540 690 536 590 552",
        inhibinFeedback: "M 438 477 C 306 386 350 242 566 178",
        testosteroneFeedbackHypo: "M 846 508 C 1028 397 1058 164 661 99",
        testosteroneFeedbackPit: "M 832 538 C 1010 450 1000 248 666 171"
      };

      const stageInfo = [
        "Ready: press Play or Step",
        "1 of 8: Hypothalamus activation",
        "2 of 8: Pituitary releases FSH and LH",
        "3 of 8: FSH stimulates sustenacular cells",
        "4 of 8: LH stimulates interstitial cell",
        "5 of 8: ABP holds testosterone near developing sperm cells",
        "6 of 8: Inhibin feedback reduces FSH release",
        "7 of 8: Testosterone feedback reduces upstream drive",
        "8 of 8: Balanced ongoing sperm production"
      ];

      const state = {
        stage: 0,
        progress: 1,
        playing: false,
        speed: 1,
        lastTime: 0,
        raf: 0,
        now: 0,
        pathCache: new Map()
      };

      const controls = {
        play: document.getElementById("playBtn"),
        pause: document.getElementById("pauseBtn"),
        step: document.getElementById("stepBtn"),
        reset: document.getElementById("resetBtn"),
        speed: document.getElementById("speedSlider"),
        speedValue: document.getElementById("speedValue"),
        labels: document.getElementById("labelToggle"),
        feedback: document.getElementById("feedbackToggle"),
        summary: document.getElementById("summaryToggle"),
        readout: document.getElementById("stageReadout")
      };

      function el(tag, attrs, parent) {
        const node = document.createElementNS(NS, tag);
        if (attrs) {
          Object.entries(attrs).forEach(([key, value]) => {
            if (value !== null && value !== undefined) {
              node.setAttribute(key, String(value));
            }
          });
        }
        if (parent) parent.appendChild(node);
        return node;
      }

      function htmlEl(tag, attrs, parent) {
        const node = document.createElement(tag);
        if (attrs) {
          Object.entries(attrs).forEach(([key, value]) => {
            if (key === "text") node.textContent = value;
            else node.setAttribute(key, String(value));
          });
        }
        if (parent) parent.appendChild(node);
        return node;
      }

      function clearLayer(layer) {
        while (layer.firstChild) layer.removeChild(layer.firstChild);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * clamp(t, 0, 1);
      }

      function pulse(strength, frequency, offset) {
        return 0.5 + 0.5 * Math.sin((state.now * 0.006 * frequency) + offset) * strength;
      }

      function pointOnCircle(cx, cy, angleDeg, r) {
        const a = angleDeg * Math.PI / 180;
        return { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r };
      }

      function createLabel(parent, x, y, text, options) {
        const opts = Object.assign({
          size: "small-text",
          anchor: "middle",
          box: true,
          width: null,
          className: "toggle-label",
          fill: "rgba(255,255,255,0.9)"
        }, options || {});

        if (opts.box) {
          const width = opts.width || Math.max(66, text.length * (opts.size === "large-text" ? 12 : 8.2));
          const height = opts.size === "large-text" ? 34 : 27;
          el("rect", {
            x: x - width / 2,
            y: y - height + 7,
            width,
            height,
            rx: 7,
            fill: opts.fill,
            stroke: "rgba(34,64,80,0.22)",
            "stroke-width": 1.5,
            class: opts.className
          }, parent);
        }

        const t = el("text", {
          x,
          y,
          "text-anchor": opts.anchor,
          class: `${opts.size} ${opts.className}`
        }, parent);
        t.textContent = text;
        return t;
      }

      function createMultilineLabel(parent, x, y, lines, options) {
        const opts = Object.assign({
          width: 270,
          lineHeight: 18,
          className: "toggle-label",
          fill: "rgba(255,255,255,0.92)",
          border: "rgba(34,64,80,0.22)"
        }, options || {});
        const height = 18 + lines.length * opts.lineHeight;
        el("rect", {
          x,
          y,
          width: opts.width,
          height,
          rx: 8,
          fill: opts.fill,
          stroke: opts.border,
          "stroke-width": 1.5,
          class: opts.className
        }, parent);
        const text = el("text", {
          x: x + 12,
          y: y + 22,
          "text-anchor": "start",
          class: `small-text ${opts.className}`
        }, parent);
        lines.forEach((line, i) => {
          const span = el("tspan", { x: x + 12, dy: i === 0 ? 0 : opts.lineHeight }, text);
          span.textContent = line;
        });
      }

      function pathNode(d) {
        if (state.pathCache.has(d)) return state.pathCache.get(d);
        const p = el("path", { d }, layers.measure);
        state.pathCache.set(d, p);
        return p;
      }

      function pathPoint(d, fraction) {
        const p = pathNode(d);
        const length = p.getTotalLength();
        return p.getPointAtLength(length * clamp(fraction, 0, 1));
      }

      function markerFor(colorKey) {
        if (colorKey === "fsh") return "url(#arrow-fsh)";
        if (colorKey === "lh") return "url(#arrow-lh)";
        if (colorKey === "testosterone") return "url(#arrow-testosterone)";
        if (colorKey === "inhibin") return "url(#arrow-inhibin)";
        return "url(#arrow-neutral)";
      }

      function drawPathArrow(parent, d, options) {
        const opts = Object.assign({
          colorKey: "neutral",
          color: colors.neutral,
          width: 5,
          opacity: 1,
          grow: 1,
          dash: "",
          label: "",
          labelAt: 0.5,
          labelDx: 0,
          labelDy: -12,
          labelWidth: null
        }, options || {});
        const path = el("path", {
          d,
          fill: "none",
          stroke: opts.color,
          "stroke-width": opts.width,
          "stroke-linecap": "round",
          "stroke-linejoin": "round",
          "marker-end": markerFor(opts.colorKey),
          opacity: opts.opacity
        }, parent);

        if (opts.grow < 1) {
          const length = pathNode(d).getTotalLength();
          path.setAttribute("stroke-dasharray", `${length} ${length}`);
          path.setAttribute("stroke-dashoffset", length * (1 - clamp(opts.grow, 0, 1)));
        } else if (opts.dash) {
          path.setAttribute("stroke-dasharray", opts.dash);
        }

        if (opts.label) {
          const pos = pathPoint(d, opts.labelAt);
          createLabel(parent, pos.x + opts.labelDx, pos.y + opts.labelDy, opts.label, {
            size: "small-text",
            width: opts.labelWidth,
            fill: "rgba(255,255,255,0.9)"
          });
        }
      }

      function drawMovingParticles(parent, d, options) {
        const opts = Object.assign({
          count: 5,
          color: colors.neutral,
          label: "",
          radius: 7,
          progress: 1,
          opacity: 1,
          phase: 0,
          textColor: "#102331",
          stroke: "white"
        }, options || {});
        const visibleProgress = clamp(opts.progress, 0, 1);
        const cycle = (state.now * 0.00022 * state.speed + opts.phase) % 1;
        for (let i = 0; i < opts.count; i += 1) {
          const f = (((i / opts.count) + cycle) % 1) * visibleProgress;
          if (f > visibleProgress || visibleProgress <= 0.01) continue;
          const pos = pathPoint(d, f);
          const group = el("g", { opacity: opts.opacity }, parent);
          el("circle", {
            cx: pos.x,
            cy: pos.y,
            r: opts.radius,
            fill: opts.color,
            stroke: opts.stroke,
            "stroke-width": 2
          }, group);
          if (opts.label) {
            const t = el("text", {
              x: pos.x,
              y: pos.y + 4,
              "text-anchor": "middle",
              class: "tiny-text"
            }, group);
            t.style.fill = opts.textColor;
            t.style.stroke = "rgba(255,255,255,0.55)";
            t.textContent = opts.label;
          }
        }
      }

      function drawHypothalamusAndPituitary() {
        clearLayer(layers.organ);
        const group = el("g", { id: "brainControlRegion" }, layers.organ);

        el("path", {
          d: "M 502 98 C 471 85 466 45 502 35 C 520 5 570 18 580 45 C 612 22 659 35 664 75 C 706 80 718 130 684 151 C 647 176 583 154 551 152 C 527 151 514 126 502 98 Z",
          fill: "#ffd6cf",
          stroke: "#cf756b",
          "stroke-width": 3,
          opacity: 0.92
        }, group);

        const hypo = el("g", { id: "hypothalamusGroup" }, group);
        el("ellipse", {
          id: "hypothalamusShape",
          cx: 596,
          cy: 99,
          rx: 62,
          ry: 30,
          fill: "var(--hypo)",
          class: "organ-outline"
        }, hypo);
        createLabel(hypo, 596, 101, "Hypothalamus", {
          size: "medium-text",
          width: 160,
          className: "toggle-label"
        });

        el("path", {
          d: "M 596 128 C 597 139 597 149 596 159",
          fill: "none",
          stroke: "#775e88",
          "stroke-width": 7,
          "stroke-linecap": "round"
        }, group);

        const pit = el("g", { id: "pituitaryGroup" }, group);
        el("ellipse", {
          id: "pituitaryShape",
          cx: 596,
          cy: 174,
          rx: 76,
          ry: 33,
          fill: "var(--pituitary)",
          class: "organ-outline"
        }, pit);
        createLabel(pit, 596, 179, "Anterior pituitary", {
          size: "medium-text",
          width: 194,
          className: "toggle-label"
        });
      }

      function drawSeminiferousTubule() {
        clearLayer(layers.cell);
        const group = el("g", { id: "testisRegion" }, layers.cell);

        el("ellipse", {
          cx: 675,
          cy: 575,
          rx: 420,
          ry: 152,
          fill: "#f7f3dd",
          opacity: 0.7
        }, group);
        const tubule = el("g", { id: "seminiferousTubuleGroup" }, group);
        el("circle", {
          cx: 500,
          cy: 535,
          r: 225,
          fill: "#ffedbb",
          stroke: "var(--tubule-wall)",
          "stroke-width": 14
        }, tubule);
        el("circle", {
          cx: 500,
          cy: 535,
          r: 201,
          fill: "#fff0ca",
          stroke: "#f7c379",
          "stroke-width": 2
        }, tubule);
        el("circle", {
          cx: 500,
          cy: 535,
          r: 78,
          fill: "#bde8f5",
          stroke: "#5aaeca",
          "stroke-width": 4
        }, tubule);

        createLabel(tubule, 342, 334, "Seminiferous tubule", {
          size: "large-text",
          width: 238
        });
        createLabel(tubule, 500, 538, "Lumen", {
          size: "medium-text",
          width: 86,
          fill: "rgba(255,255,255,0.72)"
        });

        const sertoli = el("g", { id: "sertoliCellsGroup", "clip-path": "url(#tubuleClip)" }, tubule);
        [225, 330].forEach((angle, index) => {
          drawSustenacularCell(sertoli, angle, index);
        });

        const spermBase = el("g", { id: "baseSpermCells", "clip-path": "url(#tubuleClip)" }, tubule);
        drawBaseSpermCells(spermBase);

        createLabel(tubule, 616, 510, "Mature sperm cells", {
          size: "small-text",
          width: 172,
          fill: "rgba(255,255,255,0.78)"
        });

        const interstitial = el("g", { id: "interstitialCellGroup" }, group);
        el("ellipse", {
          cx: 865,
          cy: 552,
          rx: 58,
          ry: 47,
          fill: "var(--interstitial)",
          stroke: "#c78128",
          "stroke-width": 4
        }, interstitial);
        el("circle", {
          cx: 853,
          cy: 543,
          r: 14,
          fill: "#f49d46",
          opacity: 0.8
        }, interstitial);
        el("circle", {
          cx: 880,
          cy: 565,
          r: 10,
          fill: "#f49d46",
          opacity: 0.72
        }, interstitial);
        createMultilineLabel(interstitial, 940, 522, ["Interstitial cell", "(Leydig cell)"], {
          width: 196,
          lineHeight: 19,

      function advanceAnimationStage(manual) {
        if (state.stage < 8) {
          state.stage += 1;
          state.progress = manual ? 1 : 0;
        } else if (manual) {
          state.progress = 1;
        }
        render();
      }

      function resetAnimation() {
        state.playing = false;
        state.stage = 0;
        state.progress = 1;
        state.lastTime = 0;
        if (state.raf) cancelAnimationFrame(state.raf);
        state.raf = 0;
        controls.play.disabled = false;
        render();
      }

      function pauseAnimation() {
        state.playing = false;
        controls.play.disabled = false;
        if (state.raf) cancelAnimationFrame(state.raf);
        state.raf = 0;
        render();
      }

      function playAnimation() {
        if (state.stage >= 8 && state.progress >= 1) {
          state.stage = 0;
          state.progress = 1;
        }
        if (state.stage === 0) {
          state.stage = 1;
          state.progress = 0;
        }
        state.playing = true;
        controls.play.disabled = true;
        state.lastTime = performance.now();
        state.raf = requestAnimationFrame(tick);
      }

      function tick(now) {
        if (!state.playing) return;
        const dt = now - state.lastTime;
        state.lastTime = now;
        state.progress += (dt * state.speed) / STAGE_MS;

        if (state.progress >= 1) {
          if (state.stage >= 8) {
            state.progress = 1;
            pauseAnimation();
            return;
          }
          state.stage += 1;
          state.progress = 0;
        }

        render(now);
        state.raf = requestAnimationFrame(tick);
      }

      function bindControls() {
        controls.play.addEventListener("click", playAnimation);
        controls.pause.addEventListener("click", pauseAnimation);
        controls.reset.addEventListener("click", resetAnimation);
        controls.step.addEventListener("click", () => {
          pauseAnimation();
          advanceAnimationStage(true);
        });
        controls.speed.addEventListener("input", () => {
          state.speed = Number(controls.speed.value);
          controls.speedValue.textContent = `${state.speed.toFixed(1)}x`;
        });
        [controls.labels, controls.feedback, controls.summary].forEach((toggle) => {
          ["change", "input", "click"].forEach((eventName) => {
            toggle.addEventListener(eventName, render);
          });
        });
      }

      function init() {
        drawLegend();
        drawHypothalamusAndPituitary();
        drawSeminiferousTubule();
        bindControls();
        resetAnimation();
      }

      window.advanceAnimationStage = advanceAnimationStage;
      window.resetAnimation = resetAnimation;
      window.drawHypothalamusAndPituitary = drawHypothalamusAndPituitary;
      window.drawSeminiferousTubule = drawSeminiferousTubule;
      window.drawHormoneArrows = drawHormoneArrows;
      window.drawFeedbackArrows = drawFeedbackArrows;

      init();
    }());
  </script>
</body>
</html>
