<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carbon Dioxide Transport: Internal and External Respiration</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #53627a;
      --paper: #fbfcff;
      --panel: #ffffff;
      --line: #d6deea;
      --plasma: #ffe3ec;
      --rbc: #d73a3d;
      --rbc-dark: #a11e28;
      --tissue: #dff3d7;
      --interstitial: #e6f6ff;
      --endothelium: #c8f0ec;
      --alveolus: #e9f8ff;
      --o2: #1f7aff;
      --co2: #252a34;
      --h2o: #9edcff;
      --h2co3: #7c3ac4;
      --hco3: #8b5cf6;
      --hplus: #f5c542;
      --chloride: #24a15e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }

    .credit-line {
      padding: 6px 14px 5px;
      background: #eef5ff;
      border-bottom: 1px solid var(--line);
      color: #244c9a;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.98);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 14px rgba(35, 46, 72, 0.08);
      z-index: 5;
    }

    .scene-buttons,
    .transport-controls,
    .step-controls,
    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls button {
      border: 1px solid #b9c5d6;
      background: #f8fbff;
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
    }

    .controls button:hover {
      background: #eef5ff;
    }

    .controls button.active {
      color: #ffffff;
      background: #244c9a;
      border-color: #244c9a;
    }

    .controls button:focus-visible,
    .controls input:focus-visible {
      outline: 3px solid rgba(31, 122, 255, 0.35);
      outline-offset: 2px;
    }

    .speed-control {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .speed-control input {
      width: 110px;
      accent-color: #244c9a;
    }

    .stage-wrap {
      position: relative;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(245, 248, 255, 0.94)),
        repeating-linear-gradient(0deg, rgba(36, 76, 154, 0.05) 0 1px, transparent 1px 44px),
        repeating-linear-gradient(90deg, rgba(36, 76, 154, 0.05) 0 1px, transparent 1px 44px);
    }

    #diagram {
      display: block;
      width: 100%;
      height: 100%;
    }

    .caption-box {
      min-height: 64px;
      display: flex;
      align-items: center;
      padding: 10px 18px 12px;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid var(--line);
      color: var(--ink);
      font-size: clamp(16px, 1.7vw, 20px);
      font-weight: 800;
      line-height: 1.25;
      z-index: 5;
    }

    .step-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      margin-right: 12px;
      border-radius: 999px;
      padding: 7px 10px;
      background: #e8f0ff;
      color: #244c9a;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .svg-label {
      font-size: 21px;
      font-weight: 900;
      fill: var(--ink);
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.92);
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .svg-small-label {
      font-size: 16px;
      font-weight: 900;
      fill: var(--ink);
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .svg-tiny-label {
      font-size: 13px;
      font-weight: 900;
      fill: var(--ink);
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.88);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .enzyme-label {
      font-size: 16px;
      font-weight: 950;
      fill: var(--ink);
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .molecule-text {
      font-size: 13px;
      font-weight: 950;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .arrow {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#softShadow);
    }

    .arrow.faint {
      opacity: 0.2;
      stroke-width: 5;
    }

    .arrow.active {
      opacity: 0.96;
      stroke-width: 8;
    }

    .reaction-card {
      fill: rgba(255, 255, 255, 0.9);
      stroke: rgba(88, 99, 126, 0.24);
      stroke-width: 1.5;
    }

    @media (max-width: 760px) {
      .controls {
        gap: 7px;
        padding: 8px;
      }

      .controls button {
        font-size: 13px;
        padding: 8px 9px;
      }

      .speed-control {
        display: none;
      }

      .caption-box {
        min-height: 58px;
        padding: 8px 12px;
      }

      .step-pill {
        min-width: 64px;
        margin-right: 8px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="credit-line">Animation Prompted by Jerred Seveyka for his biology class</div>
    <header class="controls" aria-label="Animation controls">
      <div class="scene-buttons" aria-label="Choose respiration scene">
        <button id="internalButton" class="active" type="button">Internal respiration: tissues</button>
        <button id="externalButton" type="button">External respiration: alveolus</button>
      </div>
      <div class="transport-controls">
        <button id="playPauseButton" type="button">Pause</button>
        <button id="resetButton" type="button">Reset</button>
      </div>
      <div class="step-controls" aria-label="Step navigation controls">
        <button id="previousStepButton" type="button">◀ Previous step</button>
        <button id="repeatStepButton" type="button">↻ Repeat step</button>
        <button id="nextStepButton" type="button">Next step ▶</button>
      </div>
      <label class="speed-control" for="speedSlider">
        Speed
        <input id="speedSlider" type="range" min="0.5" max="1.75" value="1" step="0.05">
      </label>
    </header>

    <main class="stage-wrap" aria-label="Carbon dioxide and oxygen transport animation">
      <svg id="diagram" role="img" aria-labelledby="svgTitle svgDesc" viewBox="0 0 1200 680" preserveAspectRatio="xMidYMid meet">
        <title id="svgTitle">Carbon dioxide transport during internal and external respiration</title>
        <desc id="svgDesc">An educational diagram with animated molecule movement through tissues, plasma, red blood cell, and alveolus.</desc>
      </svg>
    </main>

    <section id="captionBox" class="caption-box" aria-live="polite"></section>
  </div>

  <script>
    // Scene setup
    const diagram = document.getElementById("diagram");
    const captionBox = document.getElementById("captionBox");
    const internalButton = document.getElementById("internalButton");
    const externalButton = document.getElementById("externalButton");
    const playPauseButton = document.getElementById("playPauseButton");
    const resetButton = document.getElementById("resetButton");
    const previousStepButton = document.getElementById("previousStepButton");
    const repeatStepButton = document.getElementById("repeatStepButton");
    const nextStepButton = document.getElementById("nextStepButton");
    const speedSlider = document.getElementById("speedSlider");

    const colors = {
      o2: "#1f7aff",
      co2: "#252a34",
      h2o: "#9edcff",
      h2co3: "#7c3ac4",
      hco3: "#8b5cf6",
      hplus: "#f5c542",
      chloride: "#24a15e",
      plasma: "#ffe3ec",
      rbc: "#d73a3d",
      rbcDark: "#a11e28",
      tissue: "#dff3d7",
      interstitial: "#e6f6ff",
      endothelium: "#c8f0ec",
      alveolus: "#e9f8ff",
      hb: "#7e243f",
      hbLight: "#a83a5a",
      enzyme: "#d9c8ff",
      antiporter: "#ffe5a3"
    };

    const stepDuration = 4200;
    let currentScene = "internal";
    let elapsedMilliseconds = 0;
    let previousTimestamp = null;
    let playing = true;
    let lastCaptionKey = "";

    const sceneConfig = {
      internal: {
        plasma: { x: 360, y: 82, width: 800, height: 514 },
        interstitial: { x: 205, y: 118, width: 112, height: 426 },
        endothelium: { x: 324, y: 110, width: 32, height: 442 },
        rbc: { cx: 785, cy: 344, rx: 248, ry: 152 },
        hemoglobin: { cx: 875, cy: 278 },
        enzyme: { cx: 670, cy: 404, rx: 78, ry: 38 },
        antiporter: { x: 994, y: 299, width: 38, height: 94, labelX: 1040, labelY: 286, side: "left" }
      },
      external: {
        plasma: { x: 28, y: 82, width: 806, height: 514 },
        membrane: { x: 842, y: 110, width: 32, height: 442 },
        alveolus: { cx: 1032, cy: 330, rx: 146, ry: 198 },
        rbc: { cx: 450, cy: 344, rx: 248, ry: 152 },
        hemoglobin: { cx: 350, cy: 278 },
        enzyme: { cx: 610, cy: 414, rx: 78, ry: 38 },
        antiporter: { x: 214, y: 299, width: 38, height: 94, labelX: 206, labelY: 286, labelAnchor: "end", side: "left" }
      }
    };

    const internalSteps = [
      {
        caption: "Cells produce CO2. CO2 diffuses from cells through interstitial fluid, across the endothelium, and into the blood plasma."
      },
      {
        caption: "A small amount of CO2 reacts with H2O in plasma to form H2CO3, which separates into H+ and HCO3−."
      },
      {
        caption: "Some CO2 enters the RBC and binds the globin portion of hemoglobin, forming carbaminohemoglobin."
      },
      {
        caption: "Most CO2 enters the RBC, where carbonic anhydrase rapidly converts CO2 and H2O to H2CO3, then H+ and HCO3−."
      },
      {
        caption: "H+ binds hemoglobin. HCO3− exits the RBC while Cl− enters through the Cl−/HCO3− antiporter: the chloride shift."
      },
      {
        caption: "H+ and CO2 lower hemoglobin's O2 affinity, so O2 unloads from hemoglobin and diffuses to tissue cells."
      }
    ];

    const externalSteps = [
      {
        caption: "O2 diffuses from the alveolus across the respiratory membrane, enters the RBC, and loads onto hemoglobin."
      },
      {
        caption: "O2 binding promotes release of H+ and CO2 from the globin portion of hemoglobin."
      },
      {
        caption: "HCO3− enters the RBC while Cl− exits through the antiporter: the reverse chloride shift."
      },
      {
        caption: "Inside the RBC, H+ combines with HCO3− to form H2CO3; carbonic anhydrase converts it back to CO2 and H2O."
      },
      {
        caption: "CO2 diffuses from the RBC into plasma, crosses the respiratory membrane, enters the alveolus, and is exhaled."
      }
    ];

    function initializeSvg() {
      diagram.innerHTML = `
        <defs>
          <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1b2a45" flood-opacity="0.18"></feDropShadow>
          </filter>
          <filter id="activeGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <marker id="arrowBlue" markerWidth="3" markerHeight="3" viewBox="0 0 3 3" refX="2.85" refY="1.5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L3,1.5 L0,3 Z" fill="${colors.o2}"></path>
          </marker>
          <marker id="arrowDark" markerWidth="3" markerHeight="3" viewBox="0 0 3 3" refX="2.85" refY="1.5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L3,1.5 L0,3 Z" fill="${colors.co2}"></path>
          </marker>
          <marker id="arrowViolet" markerWidth="3" markerHeight="3" viewBox="0 0 3 3" refX="2.85" refY="1.5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L3,1.5 L0,3 Z" fill="${colors.hco3}"></path>
          </marker>
          <marker id="arrowGreen" markerWidth="3" markerHeight="3" viewBox="0 0 3 3" refX="2.85" refY="1.5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L3,1.5 L0,3 Z" fill="${colors.chloride}"></path>
          </marker>
          <marker id="arrowGold" markerWidth="3" markerHeight="3" viewBox="0 0 3 3" refX="2.85" refY="1.5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L3,1.5 L0,3 Z" fill="${colors.hplus}"></path>
          </marker>
        </defs>
        <rect x="0" y="0" width="1200" height="680" fill="rgba(255,255,255,0)"></rect>
        <g id="staticLayer"></g>
        <g id="animationLayer"></g>
      `;
    }

    function drawStaticScene() {
      const staticLayer = document.getElementById("staticLayer");
      staticLayer.innerHTML = currentScene === "internal" ? internalStaticMarkup() : externalStaticMarkup();
      internalButton.classList.toggle("active", currentScene === "internal");
      externalButton.classList.toggle("active", currentScene === "external");
    }

    function internalStaticMarkup() {
      const config = sceneConfig.internal;
      return `
        <rect x="18" y="58" width="1164" height="566" rx="28" fill="rgba(255,255,255,0.58)" stroke="#d7dfec" stroke-width="2"></rect>

        <rect x="24" y="118" width="170" height="426" rx="24" fill="${colors.tissue}" stroke="#9fce90" stroke-width="2"></rect>
        <text x="110" y="96" class="svg-label" text-anchor="middle">cells</text>
        ${drawTissueCells()}

        <rect x="${config.interstitial.x}" y="${config.interstitial.y}" width="${config.interstitial.width}" height="${config.interstitial.height}" rx="18" fill="${colors.interstitial}" stroke="#9ccfea" stroke-width="2"></rect>
        <text x="${config.interstitial.x + 55}" y="96" class="svg-label" text-anchor="middle">Interstitial fluid</text>

        ${drawEndothelium(config.endothelium, "capillary endothelium", false)}

        <rect x="${config.plasma.x}" y="${config.plasma.y}" width="${config.plasma.width}" height="${config.plasma.height}" rx="28" fill="${colors.plasma}" stroke="#f3a9bd" stroke-width="2"></rect>
        <text x="${config.plasma.x + 92}" y="118" class="svg-label">Blood plasma</text>

        ${drawRbc(config)}
        ${textLabel(config.endothelium.x + config.endothelium.width / 2, config.endothelium.y + config.endothelium.height + 24, ["capillary", "endothelium"], "svg-small-label")}
      `;
    }

    function externalStaticMarkup() {
      const config = sceneConfig.external;
      return `
        <rect x="18" y="58" width="1164" height="566" rx="28" fill="rgba(255,255,255,0.58)" stroke="#d7dfec" stroke-width="2"></rect>

        <rect x="${config.plasma.x}" y="${config.plasma.y}" width="${config.plasma.width}" height="${config.plasma.height}" rx="28" fill="${colors.plasma}" stroke="#f3a9bd" stroke-width="2"></rect>
        <text x="${config.plasma.x + 92}" y="118" class="svg-label">Blood plasma</text>

        ${drawRbc(config)}

        ${drawEndothelium(config.membrane, "respiratory membrane")}

        <path d="M${config.alveolus.cx - config.alveolus.rx},${config.alveolus.cy - 146}
                 C${config.alveolus.cx - 118},${config.alveolus.cy - 246} ${config.alveolus.cx + 118},${config.alveolus.cy - 246} ${config.alveolus.cx + config.alveolus.rx},${config.alveolus.cy - 146}
                 L${config.alveolus.cx + config.alveolus.rx},${config.alveolus.cy + 150}
                 C${config.alveolus.cx + 102},${config.alveolus.cy + 238} ${config.alveolus.cx - 102},${config.alveolus.cy + 238} ${config.alveolus.cx - config.alveolus.rx},${config.alveolus.cy + 150}
                 Z"
              fill="${colors.alveolus}" stroke="#82c6e4" stroke-width="3"></path>
        <path d="M${config.alveolus.cx + 88},${config.alveolus.cy - 166}
                 C${config.alveolus.cx + 154},${config.alveolus.cy - 218} ${config.alveolus.cx + 181},${config.alveolus.cy - 172} ${config.alveolus.cx + 140},${config.alveolus.cy - 116}"
              fill="none" stroke="#82c6e4" stroke-width="18" stroke-linecap="round"></path>
        <text x="${config.alveolus.cx}" y="96" class="svg-label" text-anchor="middle">Alveolus</text>
        ${drawAlveolarGas(config)}
      `;
    }

    function drawTissueCells() {
      const cells = [
        { x: 86, y: 198, rx: 52, ry: 42 },
        { x: 125, y: 298, rx: 58, ry: 46 },
        { x: 78, y: 405, rx: 50, ry: 42 },
        { x: 142, y: 486, rx: 44, ry: 36 }
      ];
      return cells.map((cell, index) => `
        <g>
          <ellipse cx="${cell.x}" cy="${cell.y}" rx="${cell.rx}" ry="${cell.ry}" fill="#ccefc1" stroke="#79b56b" stroke-width="2"></ellipse>
          <ellipse cx="${cell.x + (index % 2 ? -8 : 9)}" cy="${cell.y - 2}" rx="16" ry="12" fill="#9fd59b" opacity="0.86"></ellipse>
        </g>
      `).join("");
    }

    function drawEndothelium(bounds, label, showLabel = true) {
      const cellHeight = bounds.height / 4;
      const cells = [0, 1, 2, 3].map(index => `
        <rect x="${bounds.x + 2}" y="${bounds.y + index * cellHeight + 5}" width="${bounds.width - 4}" height="${cellHeight - 10}" rx="13"
              fill="${colors.endothelium}" stroke="#69b9b0" stroke-width="1.5"></rect>
        <ellipse cx="${bounds.x + bounds.width / 2}" cy="${bounds.y + index * cellHeight + cellHeight / 2}" rx="7" ry="14" fill="#7ed4cc" opacity="0.95"></ellipse>
      `).join("");
      const labelLines = label === "respiratory membrane" ? ["respiratory", "membrane"] : ["capillary", "endothelium"];
      return `
        <g>
          <rect x="${bounds.x}" y="${bounds.y}" width="${bounds.width}" height="${bounds.height}" rx="16"
                fill="#e5fbf8" stroke="#69b9b0" stroke-width="2"></rect>
          ${cells}
          ${showLabel ? textLabel(bounds.x + bounds.width / 2, bounds.y + bounds.height + 24, labelLines, "svg-small-label") : ""}
        </g>
      `;
    }

    function drawRbc(config) {
      return `
        <g id="rbcStatic">
          <ellipse cx="${config.rbc.cx}" cy="${config.rbc.cy}" rx="${config.rbc.rx}" ry="${config.rbc.ry}"
                   fill="${colors.rbc}" stroke="${colors.rbcDark}" stroke-width="5"></ellipse>
          <ellipse cx="${config.rbc.cx}" cy="${config.rbc.cy}" rx="${config.rbc.rx - 42}" ry="${config.rbc.ry - 36}"
                   fill="rgba(255, 142, 135, 0.33)" stroke="rgba(255,255,255,0.25)" stroke-width="3"></ellipse>
          ${drawHemoglobin(config.hemoglobin)}
          ${drawCarbonicAnhydrase(config.enzyme)}
          ${drawAntiporter(config.antiporter)}
        </g>
      `;
    }

    function hemoglobinSites(hemoglobin) {
      return [
        { x: hemoglobin.cx - 34, y: hemoglobin.cy - 28 },
        { x: hemoglobin.cx + 34, y: hemoglobin.cy - 28 },
        { x: hemoglobin.cx - 34, y: hemoglobin.cy + 30 },
        { x: hemoglobin.cx + 34, y: hemoglobin.cy + 30 }
      ];
    }

    function drawHemoglobin(hemoglobin) {
      const sites = hemoglobinSites(hemoglobin);
      const lobes = sites.map(site => `
        <circle cx="${site.x}" cy="${site.y}" r="27" fill="${colors.hbLight}" stroke="${colors.hb}" stroke-width="3"></circle>
        <circle cx="${site.x}" cy="${site.y}" r="12" fill="#fff8e5" stroke="#edb73a" stroke-width="3"></circle>
      `).join("");
      return `
        <g id="hemoglobinStructure">
          <ellipse cx="${hemoglobin.cx}" cy="${hemoglobin.cy + 2}" rx="55" ry="47" fill="${colors.hb}" opacity="0.9"></ellipse>
          ${lobes}
          <text x="${hemoglobin.cx}" y="${hemoglobin.cy - 3}" text-anchor="middle" class="svg-tiny-label" fill="#ffffff" stroke="none">hemoglobin</text>
        </g>
      `;
    }

    function drawCarbonicAnhydrase(enzyme) {
      return `
        <g id="carbonicAnhydraseStructure">
          <path d="M${enzyme.cx - enzyme.rx},${enzyme.cy}
                   C${enzyme.cx - 72},${enzyme.cy - 46} ${enzyme.cx - 16},${enzyme.cy - 54} ${enzyme.cx + 22},${enzyme.cy - 32}
                   C${enzyme.cx + 74},${enzyme.cy - 44} ${enzyme.cx + enzyme.rx},${enzyme.cy - 10} ${enzyme.cx + 70},${enzyme.cy + 27}
                   C${enzyme.cx + 32},${enzyme.cy + 62} ${enzyme.cx - 40},${enzyme.cy + 58} ${enzyme.cx - 72},${enzyme.cy + 28}
                   C${enzyme.cx - 94},${enzyme.cy + 10} ${enzyme.cx - 92},${enzyme.cy - 16} ${enzyme.cx - enzyme.rx},${enzyme.cy} Z"
                fill="${colors.enzyme}" stroke="#8e73df" stroke-width="3"></path>
          <text x="${enzyme.cx}" y="${enzyme.cy - 8}" text-anchor="middle" class="enzyme-label">carbonic</text>
          <text x="${enzyme.cx}" y="${enzyme.cy + 14}" text-anchor="middle" class="enzyme-label">anhydrase</text>
        </g>
      `;
    }

    function drawAntiporter(porter) {
      const arrowDirection = porter.side === "left" ? "M14 26 L28 26 M22 18 L30 26 L22 34 M30 68 L14 68 M20 60 L12 68 L20 76" : "M26 26 L12 26 M18 18 L10 26 L18 34 M10 68 L26 68 M20 60 L28 68 L20 76";
      const labelAnchor = porter.labelAnchor || (porter.side === "left" ? "start" : "end");
      return `
        <g id="antiporterStructure">
          <rect x="${porter.x}" y="${porter.y}" width="${porter.width}" height="${porter.height}" rx="13"
                fill="${colors.antiporter}" stroke="#ba7f18" stroke-width="3"></rect>
          <path d="${arrowDirection}" transform="translate(${porter.x}, ${porter.y})"
                fill="none" stroke="#6f4a08" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
          <text x="${porter.labelX}" y="${porter.labelY}" text-anchor="${labelAnchor}" class="svg-tiny-label">${svgChemInline("Cl−/HCO3− antiporter")}</text>
        </g>
      `;
    }

    function drawAlveolarGas(config) {
      const oxygenPositions = [
        [954, 192], [1014, 176], [1088, 210], [940, 282],
        [1018, 288], [1118, 318], [968, 394], [1046, 410],
        [1110, 472], [994, 510]
      ];
      const carbonDioxidePositions = [[1080, 258], [952, 468], [1130, 402]];
      return `
        <g opacity="0.96">
          ${oxygenPositions.map(([x, y]) => moleculeMarkup("O2", x, y, 0.92)).join("")}
          ${carbonDioxidePositions.map(([x, y]) => moleculeMarkup("CO2", x, y, 0.82)).join("")}
        </g>
      `;
    }

    // Molecule drawing
    function escapeSvgText(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function svgChemToken(token) {
      const normalized = token.replace("-", "−");
      if (normalized === "O2") return `O<tspan baseline-shift="sub" font-size="75%">2</tspan>`;
      if (normalized === "CO2") return `CO<tspan baseline-shift="sub" font-size="75%">2</tspan>`;
      if (normalized === "H2O") return `H<tspan baseline-shift="sub" font-size="75%">2</tspan>O`;
      if (normalized === "H2CO3") return `H<tspan baseline-shift="sub" font-size="75%">2</tspan>CO<tspan baseline-shift="sub" font-size="75%">3</tspan>`;
      if (normalized === "HCO3−") return `HCO<tspan baseline-shift="sub" font-size="75%">3</tspan><tspan baseline-shift="super" font-size="75%">−</tspan>`;
      if (normalized === "Cl−") return `Cl<tspan baseline-shift="super" font-size="75%">−</tspan>`;
      if (normalized === "H+") return `H<tspan baseline-shift="super" font-size="75%">+</tspan>`;
      return escapeSvgText(token);
    }

    function svgChemInline(text) {
      const source = String(text);
      const tokenPattern = /(HCO3−|HCO3-|H2CO3|H2O|CO2|O2|Cl−|Cl-|H\+)/g;
      let cursor = 0;
      let markup = "";
      for (const match of source.matchAll(tokenPattern)) {
        markup += escapeSvgText(source.slice(cursor, match.index));
        markup += svgChemToken(match[0]);
        cursor = match.index + match[0].length;
      }
      return markup + escapeSvgText(source.slice(cursor));
    }

    function htmlChemToken(token) {
      const normalized = token.replace("-", "−");
      if (normalized === "O2") return `O<sub>2</sub>`;
      if (normalized === "CO2") return `CO<sub>2</sub>`;
      if (normalized === "H2O") return `H<sub>2</sub>O`;
      if (normalized === "H2CO3") return `H<sub>2</sub>CO<sub>3</sub>`;
      if (normalized === "HCO3−") return `HCO<sub>3</sub><sup>−</sup>`;
      if (normalized === "Cl−") return `Cl<sup>−</sup>`;
      if (normalized === "H+") return `H<sup>+</sup>`;
      return token;
    }

    function formatChemHtml(text) {
      return String(text).replace(/HCO3−|HCO3-|H2CO3|H2O|CO2|O2|Cl−|Cl-|H\+/g, htmlChemToken);
    }

    function moleculeMarkup(label, x, y, opacity = 1, scale = 1) {
      const style = moleculeStyle(label);
      const rx = style.rx * scale;
      const ry = style.ry * scale;
      const fontSize = Math.max(10, style.fontSize * scale);
      const labelMarkup = svgChemInline(label);
      return `
        <g opacity="${opacity}">
          <ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="${rx.toFixed(1)}" ry="${ry.toFixed(1)}"
                   fill="${style.fill}" stroke="${style.stroke}" stroke-width="${(1.5 * scale).toFixed(1)}"></ellipse>
          <text x="${x.toFixed(1)}" y="${y.toFixed(1)}" class="molecule-text" font-size="${fontSize.toFixed(1)}" fill="${style.text}">${labelMarkup}</text>
        </g>
      `;
    }

    function moleculeStyle(label) {
      const base = { rx: 19, ry: 19, text: "#ffffff", stroke: "rgba(0,0,0,0.18)", fontSize: 13 };
      if (label === "O2") return { ...base, fill: colors.o2 };
      if (label === "CO2") return { ...base, fill: colors.co2, rx: 22, ry: 20 };
      if (label === "H2O") return { ...base, fill: colors.h2o, text: "#123348", rx: 22, ry: 16 };
      if (label === "H2CO3") return { ...base, fill: colors.h2co3, rx: 34, ry: 18, fontSize: 12 };
      if (label === "HCO3−") return { ...base, fill: colors.hco3, rx: 33, ry: 18, fontSize: 12 };
      if (label === "H+") return { ...base, fill: colors.hplus, text: "#332600", rx: 17, ry: 17 };
      if (label === "Cl−") return { ...base, fill: colors.chloride, rx: 18, ry: 18 };
      return { ...base, fill: "#8792a7" };
    }

    function arrowMarkup(pathData, colorKey, intensity = "active", dashed = false) {
      const colorMap = {
        o2: colors.o2,
        co2: colors.co2,
        hco3: colors.hco3,
        chloride: colors.chloride,
        hplus: colors.hplus
      };
      const markerMap = {
        o2: "arrowBlue",
        co2: "arrowDark",
        hco3: "arrowViolet",
        chloride: "arrowGreen",
        hplus: "arrowGold"
      };
      const dash = dashed ? 'stroke-dasharray="12 10"' : "";
      return `<path class="arrow ${intensity}" d="${pathData}" stroke="${colorMap[colorKey]}" marker-end="url(#${markerMap[colorKey]})" ${dash}></path>`;
    }

    function textLabel(x, y, lines, className = "svg-small-label", anchor = "middle") {
      const textLines = Array.isArray(lines) ? lines : [lines];
      const tspans = textLines.map((line, index) => `<tspan x="${x}" dy="${index === 0 ? 0 : 19}">${svgChemInline(line)}</tspan>`).join("");
      return `<text x="${x}" y="${y}" class="${className}" text-anchor="${anchor}">${tspans}</text>`;
    }

    function reactionCard(x, y, width, height, lines) {
      return `
        <g>
          <rect x="${x}" y="${y}" width="${width}" height="${height}" rx="12" class="reaction-card"></rect>
          ${textLabel(x + width / 2, y + 25, lines, "svg-small-label")}
        </g>
      `;
    }

    function highlightEllipse(cx, cy, rx, ry, color = "#ffffff", opacity = 0.55) {
      return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="none" stroke="${color}" stroke-width="10" opacity="${opacity}" filter="url(#activeGlow)"></ellipse>`;
    }

    function highlightRect(x, y, width, height, color = "#ffffff", opacity = 0.55) {
      return `<rect x="${x}" y="${y}" width="${width}" height="${height}" rx="15" fill="none" stroke="${color}" stroke-width="9" opacity="${opacity}" filter="url(#activeGlow)"></rect>`;
    }

    function clamp(value, min = 0, max = 1) {
      return Math.min(max, Math.max(min, value));
    }

    function easeInOut(value) {
      const t = clamp(value);
      return t * t * (3 - 2 * t);
    }

    function stagedProgress(progress) {
      return easeInOut(clamp((progress - 0.14) / 0.72));
    }

    function staggeredProgress(progress, index, count, start = 0.08, end = 0.9) {
      const offset = index * 0.07;
      const adjustedEnd = Math.max(start + offset + 0.1, end);
      return easeInOut(clamp((progress - start - offset) / (adjustedEnd - start - offset)));
    }

    function interpolate(start, end, progress) {
      return {
        x: start.x + (end.x - start.x) * progress,
        y: start.y + (end.y - start.y) * progress
      };
    }

    function pointOnPolyline(points, progress) {
      const segmentCount = points.length - 1;
      if (segmentCount <= 0) return points[0];
      const scaled = clamp(progress) * segmentCount;
      const index = Math.min(segmentCount - 1, Math.floor(scaled));
      const localProgress = scaled - index;
      return interpolate(points[index], points[index + 1], localProgress);
    }

    function driftingPoint(x, y, phase, amplitude = 4) {
      const time = elapsedMilliseconds / 950;
      return {
        x: x + Math.sin(time + phase) * amplitude,
        y: y + Math.cos(time * 0.72 + phase) * amplitude * 0.65
      };
    }

    function drawDriftingMolecules(label, points, opacity = 0.72, scale = 0.76) {
      return points.map((point, index) => {
        const drifted = driftingPoint(point.x, point.y, point.phase ?? index * 1.7, point.amplitude ?? 4);
        return moleculeMarkup(label, drifted.x, drifted.y, opacity, scale);
      }).join("");
    }

    function drawSceneBackgroundMolecules(stepIndex, progress) {
      if (currentScene === "internal") {
        const dissolvedCo2 = [
          { x: 430, y: 190, phase: 0.2 },
          { x: 494, y: 246, phase: 1.4 },
          { x: 1088, y: 244, phase: 2.6 },
          { x: 1102, y: 504, phase: 3.8 }
        ];
        const plasmaBicarbonateMade = [
          { x: 452, y: 476, phase: 0.8 },
          { x: 548, y: 520, phase: 2.2 }
        ];
        const shiftedBicarbonate = [
          { x: 1060, y: 350, phase: 1.1 },
          { x: 1110, y: 420, phase: 2.7 },
          { x: 1040, y: 498, phase: 4.3 }
        ];
        let markup = drawDriftingMolecules("CO2", dissolvedCo2, 0.66, 0.72);
        if (stepIndex > 1 || (stepIndex === 1 && progress > 0.66)) {
          markup += drawDriftingMolecules("HCO3−", plasmaBicarbonateMade, 0.76, 0.72);
        }
        if (stepIndex > 4 || (stepIndex === 4 && progress > 0.58)) {
          markup += drawDriftingMolecules("HCO3−", shiftedBicarbonate, 0.82, 0.74);
        }
        return markup;
      }

      const externalDissolvedCo2 = [
        { x: 92, y: 196, phase: 0.5 },
        { x: 120, y: 508, phase: 2.1 },
        { x: 742, y: 206, phase: 3.4 },
        { x: 760, y: 498, phase: 4.9 }
      ];
      return drawDriftingMolecules("CO2", externalDissolvedCo2, 0.66, 0.72);
    }

    function drawMovingMolecules(label, paths, progress, scale = 1) {
      return paths.map((path, index) => {
        const t = staggeredProgress(progress, index, paths.length);
        const point = pointOnPolyline(path, t);
        const opacity = clamp((progress - 0.04 - index * 0.04) / 0.18) * (1 - clamp((progress - 0.94) / 0.06) * 0.25);
        return moleculeMarkup(label, point.x, point.y, opacity, scale);
      }).join("");
    }

    function drawBoundOxygenAtSites(config, visibleSites = [0, 1, 2, 3]) {
      const sites = hemoglobinSites(config.hemoglobin);
      return visibleSites.map(index => moleculeMarkup("O2", sites[index].x, sites[index].y, 1, 0.86)).join("");
    }

    function drawBoundGlobinLigands(config, options) {
      const hb = config.hemoglobin;
      let markup = "";
      if (options.co2) markup += moleculeMarkup("CO2", hb.cx - 5, hb.cy + 58, 1, 0.85);
      if (options.hplus) markup += moleculeMarkup("H+", hb.cx + 5, hb.cy - 58, 1, 0.9);
      return markup;
    }

    function renderFrame() {
      const steps = currentScene === "internal" ? internalSteps : externalSteps;
      const stepIndex = Math.floor(elapsedMilliseconds / stepDuration) % steps.length;
      const progress = (elapsedMilliseconds % stepDuration) / stepDuration;
      const captionKey = `${currentScene}-${stepIndex}`;

      if (captionKey !== lastCaptionKey) {
        captionBox.innerHTML = `<span class="step-pill">Step ${stepIndex + 1}/${steps.length}</span><span>${formatChemHtml(steps[stepIndex].caption)}</span>`;
        lastCaptionKey = captionKey;
      }

      const stepMarkup = currentScene === "internal"
        ? renderInternalStep(stepIndex, progress)
        : renderExternalStep(stepIndex, progress);
      document.getElementById("animationLayer").innerHTML = drawSceneBackgroundMolecules(stepIndex, progress) + stepMarkup;
    }

    // Internal respiration animation
    function renderInternalStep(stepIndex, progress) {
      const config = sceneConfig.internal;
      const stepRenderers = [
        internalStepTissueCo2,
        internalStepPlasmaReaction,
        internalStepCarbamino,
        internalStepRbcBicarbonate,
        internalStepChlorideShift,
        internalStepOxygenUnload
      ];
      return stepRenderers[stepIndex](config, progress);
    }

    function internalHemoglobinState(config, stepIndex, progress) {
      if (stepIndex === 5) {
        const sites = hemoglobinSites(config.hemoglobin);
        const targets = [
          [{ x: sites[0].x, y: sites[0].y }, { x: 620, y: 288 }, { x: 414, y: 284 }, { x: 300, y: 296 }, { x: 146, y: 226 }],
          [{ x: sites[1].x, y: sites[1].y }, { x: 640, y: 322 }, { x: 420, y: 340 }, { x: 292, y: 350 }, { x: 82, y: 312 }],
          [{ x: sites[2].x, y: sites[2].y }, { x: 616, y: 392 }, { x: 412, y: 424 }, { x: 288, y: 420 }, { x: 82, y: 420 }],
          [{ x: sites[3].x, y: sites[3].y }, { x: 642, y: 432 }, { x: 420, y: 470 }, { x: 282, y: 486 }, { x: 148, y: 494 }]
        ];
        return targets.map((path, index) => {
          const t = staggeredProgress(progress, index, targets.length, 0.18, 0.92);
          if (t < 0.03) return moleculeMarkup("O2", sites[index].x, sites[index].y, 1, 0.86);
          const point = pointOnPolyline(path, t);
          return moleculeMarkup("O2", point.x, point.y, 1, 0.86);
        }).join("") + drawBoundGlobinLigands(config, { co2: true, hplus: true });
      }

      let ligands = "";
      if (stepIndex === 2) ligands = drawBoundGlobinLigands(config, { co2: progress > 0.66, hplus: false });
      if (stepIndex === 4) ligands = drawBoundGlobinLigands(config, { co2: true, hplus: progress > 0.48 });
      return drawBoundOxygenAtSites(config) + ligands;
    }

    function internalStepTissueCo2(config, progress) {
      const paths = [
        [{ x: 72, y: 202 }, { x: 152, y: 230 }, { x: 242, y: 252 }, { x: 338, y: 272 }, { x: 442, y: 286 }],
        [{ x: 128, y: 296 }, { x: 184, y: 302 }, { x: 252, y: 312 }, { x: 340, y: 314 }, { x: 462, y: 326 }],
        [{ x: 76, y: 405 }, { x: 160, y: 398 }, { x: 248, y: 390 }, { x: 338, y: 374 }, { x: 452, y: 366 }],
        [{ x: 145, y: 486 }, { x: 198, y: 456 }, { x: 260, y: 430 }, { x: 338, y: 414 }, { x: 486, y: 404 }]
      ];
      return `
        ${internalHemoglobinState(config, 0, progress)}
        ${arrowMarkup("M82,302 C196,292 292,296 356,312 C390,318 420,322 464,326", "co2")}
        ${drawMovingMolecules("CO2", paths, progress)}
        ${textLabel(258, 582, ["CO2 moves toward blood"], "svg-small-label")}
      `;
    }

    function internalStepPlasmaReaction(config, progress) {
      const t = stagedProgress(progress);
      const co2Start = { x: 438, y: 428 };
      const h2oStart = { x: 520, y: 488 };
      const reactionCenter = { x: 506, y: 456 };
      let reactionMolecules = "";

      if (t < 0.38) {
        reactionMolecules += moleculeMarkup("CO2", interpolate(co2Start, reactionCenter, t / 0.38).x, interpolate(co2Start, reactionCenter, t / 0.38).y, 1);
        reactionMolecules += moleculeMarkup("H2O", interpolate(h2oStart, reactionCenter, t / 0.38).x, interpolate(h2oStart, reactionCenter, t / 0.38).y, 1);
      } else if (t < 0.68) {
        reactionMolecules += moleculeMarkup("H2CO3", reactionCenter.x, reactionCenter.y, 1, 1.04);
      } else {
        reactionMolecules += moleculeMarkup("H+", 480, 438, 1, 1);
        reactionMolecules += moleculeMarkup("HCO3−", 536, 472, 1, 1);
      }

      return `
        ${internalHemoglobinState(config, 1, progress)}
        ${reactionCard(386, 508, 278, 70, ["small amount in plasma", "CO2 + H2O → H2CO3 → H+ + HCO3−"])}
        ${arrowMarkup("M436,428 C460,444 476,452 502,456", "co2", "active", true)}
        ${reactionMolecules}
      `;
    }

    function internalStepCarbamino(config, progress) {
      const hb = config.hemoglobin;
      const paths = [
        [{ x: 468, y: 318 }, { x: 548, y: 318 }, { x: 628, y: 326 }, { x: hb.cx - 5, y: hb.cy + 58 }],
        [{ x: 512, y: 384 }, { x: 588, y: 382 }, { x: 666, y: 372 }, { x: hb.cx - 5, y: hb.cy + 58 }]
      ];
      const t = stagedProgress(progress);
      const showBound = t > 0.82;
      return `
        ${highlightEllipse(hb.cx, hb.cy + 4, 94, 76, colors.h2co3, 0.38)}
        ${internalHemoglobinState(config, 2, progress)}
        ${arrowMarkup(`M456,338 C544,324 620,326 ${hb.cx - 4},${hb.cy + 52}`, "co2")}
        ${drawMovingMolecules("CO2", paths, progress, 0.92)}
        ${showBound ? moleculeMarkup("CO2", hb.cx - 5, hb.cy + 58, 1, 0.9) : ""}
        ${reactionCard(640, 508, 330, 62, ["CO2 binds globin", "= carbaminohemoglobin"])}
      `;
    }

    function internalStepRbcBicarbonate(config, progress) {
      const enzyme = config.enzyme;
      const t = stagedProgress(progress);
      const co2Paths = [
        [{ x: 498, y: 258 }, { x: 548, y: 292 }, { x: 610, y: 360 }, { x: enzyme.cx - 28, y: enzyme.cy }],
        [{ x: 502, y: 418 }, { x: 556, y: 412 }, { x: 612, y: 408 }, { x: enzyme.cx - 30, y: enzyme.cy + 8 }],
        [{ x: 540, y: 342 }, { x: 584, y: 350 }, { x: 628, y: 384 }, { x: enzyme.cx - 34, y: enzyme.cy - 6 }]
      ];
      const waterPath = [[{ x: 744, y: 454 }, { x: 704, y: 438 }, { x: enzyme.cx - 20, y: enzyme.cy + 12 }]];
      let products = "";
      if (t > 0.46 && t < 0.7) {
        products += moleculeMarkup("H2CO3", enzyme.cx + 22, enzyme.cy - 44, 1, 1.08);
      }
      if (t >= 0.68) {
        products += moleculeMarkup("H+", enzyme.cx - 20, enzyme.cy - 58, 1, 1.02);
        products += moleculeMarkup("HCO3−", enzyme.cx + 40, enzyme.cy - 60, 1, 1.02);
      }
      return `
        ${highlightEllipse(enzyme.cx, enzyme.cy, 102, 58, colors.h2co3, 0.55)}
        ${internalHemoglobinState(config, 3, progress)}
        ${arrowMarkup(`M506,338 C552,350 604,374 ${enzyme.cx - 40},${enzyme.cy}`, "co2")}
        ${drawMovingMolecules("CO2", co2Paths, progress, 0.88)}
        ${drawMovingMolecules("H2O", waterPath, progress, 0.82)}
        ${products}
        ${reactionCard(664, 160, 392, 78, ["Most CO2 converted inside RBC", "CO2 + H2O → H2CO3 → H+ + HCO3−"])}
      `;
    }

    function internalStepChlorideShift(config, progress) {
      const hb = config.hemoglobin;
      const porter = config.antiporter;
      const t = stagedProgress(progress);
      const hPoint = pointOnPolyline([{ x: config.enzyme.cx - 20, y: config.enzyme.cy - 54 }, { x: hb.cx + 5, y: hb.cy - 58 }], t);
      const hco3Point = pointOnPolyline([{ x: config.enzyme.cx + 42, y: config.enzyme.cy - 42 }, { x: porter.x + 28, y: 350 }, { x: 1120, y: 394 }], t);
      const clPoint = pointOnPolyline([{ x: 1120, y: 322 }, { x: porter.x + 32, y: 328 }, { x: 880, y: 352 }], t);
      return `
        ${highlightEllipse(hb.cx, hb.cy + 4, 94, 76, colors.hplus, 0.42)}
        ${highlightRect(porter.x - 8, porter.y - 8, porter.width + 16, porter.height + 16, colors.chloride, 0.56)}
        ${internalHemoglobinState(config, 4, progress)}
        ${arrowMarkup(`M${config.enzyme.cx - 16},${config.enzyme.cy - 54} C720,314 810,242 ${hb.cx + 5},${hb.cy - 58}`, "hplus")}
        ${arrowMarkup(`M${config.enzyme.cx + 42},${config.enzyme.cy - 42} C790,356 916,350 ${porter.x + 28},350 C1048,356 1084,374 1120,394`, "hco3")}
        ${arrowMarkup(`M1120,322 C1080,318 1052,320 ${porter.x + 32},328 C954,332 916,342 880,352`, "chloride")}
        ${moleculeMarkup("H+", hPoint.x, hPoint.y, 1, 0.98)}
        ${moleculeMarkup("HCO3−", hco3Point.x, hco3Point.y, 1, 0.98)}
        ${moleculeMarkup("Cl−", clPoint.x, clPoint.y, 1, 0.98)}
        ${reactionCard(424, 500, 248, 58, ["chloride shift", "HCO3− out, Cl− in"])}
      `;
    }

    function internalStepOxygenUnload(config, progress) {
      const hb = config.hemoglobin;
      return `
        ${highlightEllipse(hb.cx, hb.cy + 4, 98, 80, colors.o2, 0.52)}
        ${arrowMarkup("M760,310 C642,258 492,250 352,310 C274,346 194,376 108,402", "o2")}
        ${internalHemoglobinState(config, 5, progress)}
        ${reactionCard(452, 512, 504, 62, ["H+ and CO2 lower hemoglobin's O2 affinity", "O2 unloads and diffuses to tissues"])}
      `;
    }

    // External respiration animation
    function renderExternalStep(stepIndex, progress) {
      const config = sceneConfig.external;
      const stepRenderers = [
        externalStepOxygenLoad,
        externalStepReleaseFromHemoglobin,
        externalStepReverseChlorideShift,
        externalStepCarbonicAnhydraseReverse,
        externalStepCo2Exhaled
      ];
      return stepRenderers[stepIndex](config, progress);
    }

    function externalHemoglobinState(config, stepIndex, progress) {
      const hb = config.hemoglobin;
      const sites = hemoglobinSites(hb);
      if (stepIndex === 0) {
        const movingPaths = [
          [{ x: 1058, y: 245 }, { x: 906, y: 274 }, { x: 760, y: 304 }, { x: 590, y: 314 }, { x: sites[1].x, y: sites[1].y }],
          [{ x: 1118, y: 318 }, { x: 950, y: 328 }, { x: 780, y: 342 }, { x: 612, y: 366 }, { x: sites[2].x, y: sites[2].y }],
          [{ x: 996, y: 506 }, { x: 918, y: 470 }, { x: 780, y: 428 }, { x: 610, y: 398 }, { x: sites[3].x, y: sites[3].y }]
        ];
        const movingOxygen = movingPaths.map((path, index) => {
          const t = staggeredProgress(progress, index, movingPaths.length, 0.12, 0.88);
          if (t >= 0.99) return moleculeMarkup("O2", sites[index + 1].x, sites[index + 1].y, 1, 0.86);
          const point = pointOnPolyline(path, t);
          return moleculeMarkup("O2", point.x, point.y, 1, 0.86);
        }).join("");
        return drawBoundOxygenAtSites(config, [0]) + movingOxygen + drawBoundGlobinLigands(config, { co2: true, hplus: true });
      }

      const releaseLigands = stepIndex === 1 && progress < 0.62;
      return drawBoundOxygenAtSites(config) + (releaseLigands ? drawBoundGlobinLigands(config, { co2: true, hplus: true }) : "");
    }

    function externalStepOxygenLoad(config, progress) {
      const hb = config.hemoglobin;
      return `
        ${highlightEllipse(hb.cx, hb.cy + 4, 98, 80, colors.o2, 0.5)}
        ${arrowMarkup("M1090,265 C984,280 886,300 790,314 C676,332 584,330 506,320", "o2")}
        ${externalHemoglobinState(config, 0, progress)}
        ${reactionCard(582, 512, 328, 58, ["O2 loads onto hemoglobin", "partially empty sites fill"])}
      `;
    }

    function externalStepReleaseFromHemoglobin(config, progress) {
      const hb = config.hemoglobin;
      const t = stagedProgress(progress);
      const hPoint = pointOnPolyline([{ x: hb.cx + 5, y: hb.cy - 58 }, { x: 520, y: 296 }, { x: config.enzyme.cx - 16, y: config.enzyme.cy - 58 }], t);
      const co2Point = pointOnPolyline([{ x: hb.cx - 5, y: hb.cy + 58 }, { x: 548, y: 380 }, { x: config.enzyme.cx + 24, y: config.enzyme.cy - 36 }], t);
      return `
        ${highlightEllipse(hb.cx, hb.cy + 4, 98, 80, colors.o2, 0.5)}
        ${externalHemoglobinState(config, 1, progress)}
        ${arrowMarkup(`M${hb.cx + 7},${hb.cy - 54} C516,294 560,338 ${config.enzyme.cx - 16},${config.enzyme.cy - 58}`, "hplus")}
        ${arrowMarkup(`M${hb.cx - 7},${hb.cy + 54} C514,386 558,392 ${config.enzyme.cx + 24},${config.enzyme.cy - 36}`, "co2")}
        ${moleculeMarkup("H+", hPoint.x, hPoint.y, 1, 0.98)}
        ${moleculeMarkup("CO2", co2Point.x, co2Point.y, 1, 0.9)}
        ${reactionCard(260, 512, 454, 58, ["O2 binding promotes CO2 and H+ release", "released from globin, not heme sites"])}
      `;
    }

    function externalStepReverseChlorideShift(config, progress) {
      const porter = config.antiporter;
      const t = stagedProgress(progress);
      const hco3Point = pointOnPolyline([{ x: 86, y: 352 }, { x: porter.x + 28, y: 343 }, { x: config.enzyme.cx - 42, y: config.enzyme.cy - 42 }], t);
      const clPoint = pointOnPolyline([{ x: 318, y: 390 }, { x: porter.x + 8, y: 380 }, { x: 92, y: 430 }], t);
      return `
        ${highlightRect(porter.x - 8, porter.y - 8, porter.width + 16, porter.height + 16, colors.hco3, 0.56)}
        ${externalHemoglobinState(config, 2, progress)}
        ${arrowMarkup(`M86,352 C134,350 178,346 ${porter.x + 28},343 C350,350 500,382 ${config.enzyme.cx - 42},${config.enzyme.cy - 42}`, "hco3")}
        ${arrowMarkup(`M318,390 C278,386 246,382 ${porter.x + 8},380 C178,402 136,416 92,430`, "chloride")}
        ${moleculeMarkup("HCO3−", hco3Point.x, hco3Point.y, 1, 0.98)}
        ${moleculeMarkup("Cl−", clPoint.x, clPoint.y, 1, 0.98)}
        ${reactionCard(616, 504, 278, 58, ["reverse chloride shift", "HCO3− in, Cl− out"])}
      `;
    }

    function externalStepCarbonicAnhydraseReverse(config, progress) {
      const enzyme = config.enzyme;
      const t = stagedProgress(progress);
      const hStart = { x: enzyme.cx - 66, y: enzyme.cy - 70 };
      const hco3Start = { x: enzyme.cx + 74, y: enzyme.cy - 60 };
      const center = { x: enzyme.cx + 4, y: enzyme.cy - 8 };
      let reactionMolecules = "";

      if (t < 0.34) {
        const hPoint = interpolate(hStart, center, t / 0.34);
        const hco3Point = interpolate(hco3Start, center, t / 0.34);
        reactionMolecules += moleculeMarkup("H+", hPoint.x, hPoint.y, 1, 1);
        reactionMolecules += moleculeMarkup("HCO3−", hco3Point.x, hco3Point.y, 1, 1);
      } else if (t < 0.62) {
        reactionMolecules += moleculeMarkup("H2CO3", center.x, center.y, 1, 1.1);
      } else {
        reactionMolecules += moleculeMarkup("CO2", enzyme.cx + 58, enzyme.cy - 28, 1, 1);
        reactionMolecules += moleculeMarkup("H2O", enzyme.cx + 52, enzyme.cy + 28, 1, 0.95);
      }

      return `
        ${highlightEllipse(enzyme.cx, enzyme.cy, 104, 60, colors.h2co3, 0.57)}
        ${externalHemoglobinState(config, 3, progress)}
        ${arrowMarkup(`M${hStart.x},${hStart.y} C${enzyme.cx - 42},${enzyme.cy - 52} ${enzyme.cx - 20},${enzyme.cy - 28} ${center.x},${center.y}`, "hplus", "active", true)}
        ${arrowMarkup(`M${hco3Start.x},${hco3Start.y} C${enzyme.cx + 52},${enzyme.cy - 50} ${enzyme.cx + 26},${enzyme.cy - 26} ${center.x},${center.y}`, "hco3", "active", true)}
        ${reactionMolecules}
        ${reactionCard(330, 148, 426, 78, ["carbonic anhydrase reforms CO2", "H+ + HCO3− → H2CO3 → CO2 + H2O"])}
      `;
    }

    function externalStepCo2Exhaled(config, progress) {
      const enzyme = config.enzyme;
      const paths = [
        [{ x: enzyme.cx + 56, y: enzyme.cy - 28 }, { x: 706, y: 394 }, { x: 840, y: 412 }, { x: 946, y: 434 }, { x: 1112, y: 480 }],
        [{ x: enzyme.cx + 36, y: enzyme.cy + 6 }, { x: 704, y: 428 }, { x: 842, y: 450 }, { x: 982, y: 468 }, { x: 1154, y: 420 }],
        [{ x: 540, y: 398 }, { x: 680, y: 402 }, { x: 842, y: 420 }, { x: 980, y: 384 }, { x: 1094, y: 300 }]
      ];
      const exhaleT = stagedProgress(progress);
      return `
        ${externalHemoglobinState(config, 4, progress)}
        ${arrowMarkup("M598,398 C706,412 806,426 888,430 C976,436 1036,452 1108,492", "co2")}
        ${arrowMarkup("M1090,284 C1160,244 1176,196 1138,148", "co2", "active")}
        ${drawMovingMolecules("CO2", paths, progress, 0.92)}
        ${moleculeMarkup("CO2", 1118 + exhaleT * 28, 160 - exhaleT * 42, clamp((progress - 0.24) / 0.28), 0.92)}
        ${textLabel(1090, 132, "exhaled CO2", "svg-small-label")}
        ${reactionCard(660, 512, 316, 58, ["CO2 leaves blood", "RBC → plasma → alveolus"])}
      `;
    }

    // Controls
    function activeSteps() {
      return currentScene === "internal" ? internalSteps : externalSteps;
    }

    function currentStepIndex() {
      return Math.floor(elapsedMilliseconds / stepDuration) % activeSteps().length;
    }

    function setPlaying(nextPlaying) {
      playing = nextPlaying;
      previousTimestamp = null;
      playPauseButton.textContent = playing ? "Pause" : "Play";
    }

    function goToStep(requestedIndex) {
      const steps = activeSteps();
      const wrappedIndex = (requestedIndex + steps.length) % steps.length;
      elapsedMilliseconds = wrappedIndex * stepDuration;
      previousTimestamp = null;
      lastCaptionKey = "";
      setPlaying(false);
      renderFrame();
    }

    function previousStep() {
      goToStep(currentStepIndex() - 1);
    }

    function repeatStep() {
      goToStep(currentStepIndex());
    }

    function nextStep() {
      goToStep(currentStepIndex() + 1);
    }

    function setScene(nextScene) {
      if (currentScene === nextScene) return;
      currentScene = nextScene;
      resetAnimation(false);
      drawStaticScene();
      renderFrame();
    }

    internalButton.addEventListener("click", () => setScene("internal"));
    externalButton.addEventListener("click", () => setScene("external"));

    playPauseButton.addEventListener("click", () => {
      setPlaying(!playing);
    });

    resetButton.addEventListener("click", () => {
      resetAnimation(true);
    });

    previousStepButton.addEventListener("click", previousStep);
    repeatStepButton.addEventListener("click", repeatStep);
    nextStepButton.addEventListener("click", nextStep);

    speedSlider.addEventListener("input", () => {
      previousTimestamp = null;
    });

    // Reset logic
    function resetAnimation(renderImmediately) {
      elapsedMilliseconds = 0;
      previousTimestamp = null;
      lastCaptionKey = "";
      if (renderImmediately) renderFrame();
    }

    function tick(timestamp) {
      if (previousTimestamp === null) previousTimestamp = timestamp;
      const delta = timestamp - previousTimestamp;
      previousTimestamp = timestamp;

      if (playing) {
        const speed = Number(speedSlider.value);
        const steps = currentScene === "internal" ? internalSteps : externalSteps;
        elapsedMilliseconds = (elapsedMilliseconds + delta * speed) % (steps.length * stepDuration);
      }

      renderFrame();
      requestAnimationFrame(tick);
    }

    initializeSvg();
    drawStaticScene();
    resetAnimation(true);
    requestAnimationFrame(tick);
  </script>
</body>
</html>
