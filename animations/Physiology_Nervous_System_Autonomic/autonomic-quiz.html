<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autonomic Efferent Quiz</title>
  <style>
    :root {
      --bg: #f6f8f7;
      --surface: #ffffff;
      --surface-alt: #f1f6f4;
      --ink: #182322;
      --muted: #526260;
      --line: #cfd9d5;
      --primary: #0f5b62;
      --primary-dark: #0a3f45;
      --accent: #a7471d;
      --correct: #1f7a4c;
      --correct-bg: #e8f5ee;
      --incorrect: #b42318;
      --incorrect-bg: #fff0ec;
      --focus: #d9842b;
      --target-width: clamp(13rem, 30vw, 21rem);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    button,
    select {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      min-height: 2.75rem;
      padding: 0.65rem 0.95rem;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:focus-visible,
    select:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .app-shell {
      margin: 0 auto;
      max-width: 1180px;
      min-height: 100vh;
      padding: 1rem;
    }

    .app-header,
    .control-panel,
    .instruction-panel,
    .quiz-area {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .app-header {
      align-items: center;
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      padding: 1rem;
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0;
      margin: 0 0 0.2rem;
      text-transform: uppercase;
    }

    .top-attribution {
      color: var(--muted);
      font-size: 0.78rem;
      margin: 0 0 0.15rem;
    }

    h1 {
      color: var(--primary-dark);
      font-size: clamp(1.3rem, 2.6vw, 1.85rem);
      line-height: 1.15;
      margin: 0;
    }

    .task-text {
      color: var(--muted);
      margin: 0.35rem 0 0;
      max-width: 58rem;
    }

    .quiz-toggle {
      background: var(--primary);
      color: #ffffff;
      flex: 0 0 auto;
      min-width: 13rem;
    }

    .quiz-toggle:hover {
      background: var(--primary-dark);
    }

    .control-panel {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem 1rem;
      justify-content: space-between;
      margin-top: 0.85rem;
      padding: 0.85rem;
    }

    .mode-tabs {
      display: flex;
      flex-wrap: wrap;
      flex: 1 1 31rem;
      gap: 0.55rem;
    }

    .mode-button {
      background: #eef3f1;
      border-color: #b7c9c4;
      color: var(--primary-dark);
    }

    .mode-button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .instruction-panel {
      margin-top: 0.85rem;
      padding: 0.95rem;
    }

    .instruction-panel h2 {
      color: var(--primary-dark);
      font-size: 1.1rem;
      line-height: 1.25;
      margin: 0 0 0.3rem;
    }

    .instruction-panel p {
      color: var(--muted);
      margin: 0;
    }

    .mode-actions {
      display: flex;
      flex-wrap: wrap;
      flex: 0 1 auto;
      gap: 0.55rem;
      justify-content: flex-end;
    }

    .score-display {
      color: var(--muted);
      flex: 1 0 100%;
      font-size: 0.88rem;
      min-height: 1.25rem;
      text-align: right;
    }

    .score-display:empty {
      display: none;
    }

    .primary-action {
      background: var(--primary);
      color: #ffffff;
    }

    .primary-action:hover {
      background: var(--primary-dark);
    }

    .secondary-action {
      background: #ffffff;
      border-color: #a9bbb6;
      color: var(--primary-dark);
    }

    .secondary-action:hover {
      background: #eef3f1;
    }

    .quiz-area {
      margin-top: 0.85rem;
      overflow: hidden;
    }

    .table-wrap {
      max-height: min(68vh, 44rem);
      overflow: auto;
      position: relative;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 920px;
      table-layout: fixed;
      width: 100%;
    }

    thead th {
      background: var(--primary-dark);
      color: #ffffff;
      font-size: 0.92rem;
      position: sticky;
      text-align: left;
      top: 0;
      vertical-align: bottom;
      z-index: 5;
    }

    thead th:first-child {
      left: 0;
      min-width: var(--target-width);
      width: var(--target-width);
      z-index: 8;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 0.75rem;
      vertical-align: top;
    }

    tbody th.row-target {
      background: var(--surface);
      color: var(--primary-dark);
      font-weight: 800;
      left: 0;
      min-width: var(--target-width);
      overflow-wrap: anywhere;
      position: sticky;
      width: var(--target-width);
      z-index: 3;
    }

    tbody tr:nth-child(even) td,
    tbody tr:nth-child(even) th.row-target {
      background: var(--surface-alt);
    }

    tbody tr:last-child td,
    tbody tr:last-child th {
      border-bottom: 0;
    }

    .target-name {
      display: block;
      max-width: 100%;
    }

    .row-tools {
      align-items: flex-start;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.65rem;
    }

    .row-check {
      background: #ffffff;
      border-color: #97aca7;
      color: var(--primary-dark);
      min-height: 2.35rem;
      padding: 0.45rem 0.7rem;
    }

    .row-check:hover {
      background: #edf4f2;
    }

    .row-summary,
    .answer-feedback,
    .random-summary {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .row-summary {
      color: var(--muted);
    }

    .answer-cell {
      min-width: 12rem;
    }

    .answer-select {
      background: #ffffff;
      border: 1px solid #9fb2ad;
      border-radius: 8px;
      color: var(--ink);
      min-height: 2.65rem;
      padding: 0.5rem 0.65rem;
      width: 100%;
    }

    .answer-cell.is-correct {
      background: var(--correct-bg) !important;
    }

    .answer-cell.is-correct .answer-select {
      border-color: var(--correct);
    }

    .answer-cell.is-incorrect {
      background: var(--incorrect-bg) !important;
    }

    .answer-cell.is-incorrect .answer-select {
      border-color: var(--incorrect);
    }

    .answer-feedback {
      margin-top: 0.45rem;
    }

    .answer-cell.is-correct .answer-feedback,
    .row-summary.is-correct,
    .random-summary.is-correct {
      color: var(--correct);
    }

    .answer-cell.is-incorrect .answer-feedback,
    .row-summary.is-incorrect,
    .random-summary.is-incorrect {
      color: var(--incorrect);
    }

    .study-value {
      color: var(--ink);
      font-weight: 700;
    }

    .visually-hidden {
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      height: 1px;
      overflow: hidden;
      position: absolute;
      white-space: nowrap;
      width: 1px;
    }

    .empty-state {
      color: var(--muted);
      margin: 0;
      padding: 1rem;
    }

    @media (max-width: 760px) {
      .app-shell {
        padding: 0.7rem;
      }

      .app-header {
        align-items: stretch;
        flex-direction: column;
      }

      .quiz-toggle {
        min-width: 0;
        width: 100%;
      }

      .mode-button,
      .mode-actions button {
        flex: 1 1 12rem;
      }

      .mode-actions,
      .score-display {
        justify-content: stretch;
        text-align: left;
        width: 100%;
      }

      table {
        min-width: 850px;
      }

      th,
      td {
        padding: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-block">
        <p class="top-attribution">Animation Prompted by Jerred Seveyka for his biology class.</p>
        <p class="eyebrow">Autonomic Nervous System</p>
        <h1 id="quizTitle">Efferent Receptor Quiz</h1>
        <p class="task-text" id="quizTask">Choose the major receptor type used for each efferent pathway to the target.</p>
      </div>
      <button class="quiz-toggle" id="quizToggle" type="button">Switch to effects quiz</button>
    </header>

    <section class="control-panel" aria-label="Quiz controls">
      <div class="mode-tabs" role="tablist" aria-label="Quiz mode">
        <button class="mode-button is-active" type="button" role="tab" aria-selected="true" data-mode="study">Study mode</button>
        <button class="mode-button" type="button" role="tab" aria-selected="false" data-mode="random">Random target quiz</button>
        <button class="mode-button" type="button" role="tab" aria-selected="false" data-mode="full">Full table quiz</button>
      </div>
      <div class="mode-actions" id="modeActions"></div>
      <div class="score-display" id="scoreDisplay" aria-live="polite"></div>
    </section>

    <section class="instruction-panel" aria-live="polite">
      <h2 id="modeTitle">Study mode</h2>
      <p id="modeInstructions">Study mode shows the complete answer key for the current quiz.</p>
    </section>

    <main class="quiz-area" id="quizArea"></main>
  </div>

  <script>
    const QUIZZES = {
      receptor: {
        title: 'Efferent Receptor Quiz',
        shortLabel: 'Receptor quiz',
        switchLabel: 'Switch to effects quiz',
        task: 'Choose the major receptor type used for each efferent pathway to the target.',
        columns: [
          'Target',
          'Somatic Receptors',
          'Sympathetic Main Receptor Type',
          'Parasympathetic Receptor Type'
        ],
        options: ['none', 'alpha', 'beta 1', 'beta 2', 'muscarinic', 'nicotinic'],
        rows: [
          { target: 'Skeletal Muscle', answers: ['nicotinic', 'none', 'none'] },
          { target: 'Blood vessels to gut', answers: ['none', 'alpha', 'none'] },
          { target: 'Coronary arteries', answers: ['none', 'beta 2', 'none'] },
          { target: 'Eccrine Sweat glands', answers: ['none', 'muscarinic', 'none'] },
          { target: 'Cardiac muscle', answers: ['none', 'beta 1', 'muscarinic'] },
          { target: 'Pupil (Iris) Constrictors', answers: ['none', 'none', 'muscarinic'] },
          { target: 'Adrenal medulla', answers: ['none', 'nicotinic', 'none'] },
          { target: 'Voluntary Digestive Sphincters', answers: ['nicotinic', 'none', 'none'] },
          { target: 'Involuntary Digestive Sphincters', answers: ['none', 'alpha', 'muscarinic'] },
          { target: 'Digestive tract smooth muscle', answers: ['none', 'beta 2', 'muscarinic'] },
          { target: 'Digestive glands', answers: ['none', 'beta 2', 'muscarinic'] },
          { target: 'Bronchioles', answers: ['none', 'beta 2', 'muscarinic'] },
          { target: 'Ejaculator Muscles', answers: ['none', 'alpha', 'none'] },
          { target: 'Erectile tissue (increases production of vasodilator Nitric Oxide)', answers: ['none', 'none', 'muscarinic'] },
          { target: 'Bladder smooth muscle', answers: ['none', 'beta 2', 'muscarinic'] },
          { target: 'Urethral voluntary sphincters', answers: ['nicotinic', 'none', 'none'] },
          { target: 'Urethral involuntary sphincters', answers: ['none', 'alpha', 'muscarinic'] },
          { target: 'Blood Vessels of the skin', answers: ['none', 'alpha', 'none'] },
          { target: 'Apocrine Sweat glands', answers: ['none', 'alpha', 'none'] },
          { target: 'Cardiac Pacemaker Cells', answers: ['none', 'beta 1', 'muscarinic'] },
          { target: 'Pupil (Iris) Dilators', answers: ['none', 'alpha', 'none'] }
        ]
      },
      effects: {
        title: 'Efferent Stimulation Effects Quiz',
        shortLabel: 'Effects quiz',
        switchLabel: 'Switch to receptor quiz',
        task: 'Choose the response produced by somatic, sympathetic, or parasympathetic stimulation of each target.',
        columns: [
          'Target',
          'Response to Somatic Stimulation',
          'Response to Sympathetic Stimulation',
          'Response to Parasympathetic Stimulation'
        ],
        options: ['none', 'contract more', 'relax', 'inhibited', 'depolarize faster', 'depolarize slower', 'secrete'],
        rows: [
          { target: 'Skeletal Muscles', answers: ['contract more', 'none', 'none'] },
          { target: 'Blood vessels to gut', answers: ['none', 'contract more', 'none'] },
          { target: 'Coronary arteries', answers: ['none', 'relax', 'none'] },
          { target: 'Eccrine Sweat glands', answers: ['none', 'secrete', 'none'] },
          { target: 'Cardiac muscle', answers: ['none', 'contract more', 'inhibited'] },
          { target: 'Pupil (Iris) Constrictors', answers: ['none', 'none', 'contract more'] },
          { target: 'Adrenal medulla', answers: ['none', 'secrete', 'none'] },
          { target: 'Voluntary Digestive Sphincters', answers: ['contract more', 'none', 'none'] },
          { target: 'Involuntary Digestive Sphincters', answers: ['none', 'contract more', 'relax'] },
          { target: 'Digestive tract smooth muscle', answers: ['none', 'relax', 'contract more'] },
          { target: 'Digestive glands', answers: ['none', 'inhibited', 'secrete'] },
          { target: 'Bronchioles', answers: ['none', 'relax', 'contract more'] },
          { target: 'Ejaculator Muscles', answers: ['none', 'contract more', 'none'] },
          { target: 'Erectile tissue Nitric Oxide Secretion', answers: ['none', 'none', 'secrete'] },
          { target: 'Bladder smooth muscle', answers: ['none', 'relax', 'contract more'] },
          { target: 'Urethral voluntary sphincters', answers: ['contract more', 'none', 'none'] },
          { target: 'Urethral involuntary sphincters', answers: ['none', 'contract more', 'relax'] },
          { target: 'Blood Vessels of the skin', answers: ['none', 'contract more', 'none'] },
          { target: 'Apocrine Sweat glands', answers: ['none', 'secrete', 'none'] },
          { target: 'Cardiac Pacemaker Cells', answers: ['none', 'depolarize faster', 'depolarize slower'] },
          { target: 'Pupil (Iris) Dilators', answers: ['none', 'contract more', 'none'] }
        ]
      }
    };

    const MODE_LABELS = {
      study: 'Study mode',
      random: 'Random target quiz',
      full: 'Full table quiz'
    };

    const MODE_INSTRUCTIONS = {
      study: 'Study mode shows the complete answer key for the current quiz.',
      random: 'Random target quiz mode shows one target at a time. Choose answers for the three efferent columns, check your work, then pick a new target.',
      full: 'Full table quiz mode lets each row be checked independently. Complete as many rows as you want, then check single rows or the whole table.'
    };

    const state = {
      quizType: 'receptor',
      mode: 'study',
      randomIndex: null,
      randomResult: null,
      fullResults: new Map()
    };

    const els = {
      quizTitle: document.getElementById('quizTitle'),
      quizTask: document.getElementById('quizTask'),
      quizToggle: document.getElementById('quizToggle'),
      scoreDisplay: document.getElementById('scoreDisplay'),
      modeTitle: document.getElementById('modeTitle'),
      modeInstructions: document.getElementById('modeInstructions'),
      modeActions: document.getElementById('modeActions'),
      quizArea: document.getElementById('quizArea'),
      modeButtons: Array.from(document.querySelectorAll('[data-mode]'))
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeAnswer(value) {
      return String(value).trim().toLowerCase();
    }

    function currentQuiz() {
      return QUIZZES[state.quizType];
    }

    function randomRowIndex() {
      const rows = currentQuiz().rows;
      if (rows.length <= 1) {
        return 0;
      }

      let nextIndex = state.randomIndex;
      while (nextIndex === state.randomIndex) {
        nextIndex = Math.floor(Math.random() * rows.length);
      }
      return nextIndex;
    }

    function resetFeedback() {
      state.randomResult = null;
      state.fullResults = new Map();
    }

    function setMode(mode) {
      state.mode = mode;
      resetFeedback();
      if (mode === 'random') {
        state.randomIndex = randomRowIndex();
      } else {
        state.randomIndex = null;
      }
      render();
    }

    function switchQuizType() {
      state.quizType = state.quizType === 'receptor' ? 'effects' : 'receptor';
      state.mode = 'study';
      state.randomIndex = null;
      resetFeedback();
      render();
    }

    function resetCurrentMode() {
      resetFeedback();
      if (state.mode === 'random' && state.randomIndex === null) {
        state.randomIndex = randomRowIndex();
      }
      render();
    }

    function newRandomTarget() {
      state.randomIndex = randomRowIndex();
      state.randomResult = null;
      render();
    }

    function selectMarkup(context, rowIndex, colIndex, target, columnLabel) {
      const quiz = currentQuiz();
      const id = `${context}-${state.quizType}-${rowIndex}-${colIndex}`;
      const label = `${target}: ${columnLabel}`;
      const optionMarkup = quiz.options
        .map(option => `<option value="${escapeHtml(option)}">${escapeHtml(option)}</option>`)
        .join('');

      return `
        <label class="visually-hidden" for="${id}">${escapeHtml(label)}</label>
        <select class="answer-select" id="${id}" data-context="${context}" data-row="${rowIndex}" data-col="${colIndex}" aria-label="${escapeHtml(label)}">
          <option value="">Select...</option>
          ${optionMarkup}
        </select>
        <span class="answer-feedback" id="${id}-feedback" aria-live="polite"></span>
      `;
    }

    function tableHeadMarkup(columns) {
      return `
        <thead>
          <tr>
            ${columns.map(column => `<th scope="col">${escapeHtml(column)}</th>`).join('')}
          </tr>
        </thead>
      `;
    }

    function renderStudyTable() {
      const quiz = currentQuiz();
      const rows = quiz.rows.map(row => `
        <tr>
          <th class="row-target" scope="row"><span class="target-name">${escapeHtml(row.target)}</span></th>
          ${row.answers.map(answer => `<td><span class="study-value">${escapeHtml(answer)}</span></td>`).join('')}
        </tr>
      `).join('');

      els.quizArea.innerHTML = `
        <div class="table-wrap">
          <table aria-label="${escapeHtml(quiz.title)} study table">
            ${tableHeadMarkup(quiz.columns)}
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderRandomTable() {
      const quiz = currentQuiz();
      if (state.randomIndex === null) {
        state.randomIndex = randomRowIndex();
      }

      const row = quiz.rows[state.randomIndex];
      const answerCells = row.answers.map((answer, colIndex) => `
        <td class="answer-cell" data-cell="random-${colIndex}" data-answer="${escapeHtml(answer)}">
          ${selectMarkup('random', state.randomIndex, colIndex, row.target, quiz.columns[colIndex + 1])}
        </td>
      `).join('');

      els.quizArea.innerHTML = `
        <div class="table-wrap">
          <table aria-label="${escapeHtml(quiz.title)} random target table">
            ${tableHeadMarkup(quiz.columns)}
            <tbody>
              <tr>
                <th class="row-target" scope="row">
                  <span class="target-name">${escapeHtml(row.target)}</span>
                  <span class="random-summary" id="randomSummary" aria-live="polite"></span>
                </th>
                ${answerCells}
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFullTable() {
      const quiz = currentQuiz();
      const rows = quiz.rows.map((row, rowIndex) => {
        const answerCells = row.answers.map((answer, colIndex) => `
          <td class="answer-cell" data-cell="full-${rowIndex}-${colIndex}" data-answer="${escapeHtml(answer)}">
            ${selectMarkup('full', rowIndex, colIndex, row.target, quiz.columns[colIndex + 1])}
          </td>
        `).join('');

        return `
          <tr>
            <th class="row-target" scope="row">
              <span class="target-name">${escapeHtml(row.target)}</span>
              <span class="row-tools">
                <button class="row-check" type="button" data-check-row="${rowIndex}" aria-label="Check answers for ${escapeHtml(row.target)}">Check row</button>
                <span class="row-summary" id="row-summary-${rowIndex}" aria-live="polite"></span>
              </span>
            </th>
            ${answerCells}
          </tr>
        `;
      }).join('');

      els.quizArea.innerHTML = `
        <div class="table-wrap">
          <table aria-label="${escapeHtml(quiz.title)} full table quiz">
            ${tableHeadMarkup(quiz.columns)}
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderActions() {
      if (state.mode === 'study') {
        els.modeActions.innerHTML = `
          <button class="secondary-action" type="button" data-action="reset">Reset</button>
        `;
        return;
      }

      if (state.mode === 'random') {
        els.modeActions.innerHTML = `
          <button class="primary-action" type="button" data-action="check-random">Check answer</button>
          <button class="secondary-action" type="button" data-action="new-random">New random target</button>
          <button class="secondary-action" type="button" data-action="reset">Reset</button>
        `;
        return;
      }

      els.modeActions.innerHTML = `
        <button class="primary-action" type="button" data-action="check-all">Check all</button>
        <button class="secondary-action" type="button" data-action="reset">Reset</button>
      `;
    }

    function updateScoreDisplay() {
      const quiz = currentQuiz();

      if (state.mode === 'study') {
        els.scoreDisplay.textContent = '';
        return;
      }

      if (state.mode === 'random') {
        if (!state.randomResult) {
          els.scoreDisplay.textContent = 'Current target: not checked';
          return;
        }
        els.scoreDisplay.textContent = `Current target: ${state.randomResult.correctCount} of 3 correct`;
        return;
      }

      let correctCells = 0;
      state.fullResults.forEach(result => {
        correctCells += result.correctCount;
      });
      const checkedRows = state.fullResults.size;
      const possibleCells = checkedRows * 3;
      els.scoreDisplay.textContent = `Rows checked: ${checkedRows} of ${quiz.rows.length} | Correct answers: ${correctCells} of ${possibleCells}`;
    }

    function render() {
      const quiz = currentQuiz();
      els.quizTitle.textContent = quiz.title;
      els.quizTask.textContent = quiz.task;
      els.quizToggle.textContent = quiz.switchLabel;
      els.modeTitle.textContent = MODE_LABELS[state.mode];
      els.modeInstructions.textContent = MODE_INSTRUCTIONS[state.mode];

      els.modeButtons.forEach(button => {
        const active = button.dataset.mode === state.mode;
        button.classList.toggle('is-active', active);
        button.setAttribute('aria-selected', String(active));
      });

      renderActions();

      if (state.mode === 'study') {
        renderStudyTable();
      } else if (state.mode === 'random') {
        renderRandomTable();
      } else {
        renderFullTable();
      }

      updateScoreDisplay();
    }

    function readSelectValue(context, rowIndex, colIndex) {
      const select = document.querySelector(`[data-context="${context}"][data-row="${rowIndex}"][data-col="${colIndex}"]`);
      return select ? select.value : '';
    }

    function markCell(cell, isCorrect, correctAnswer) {
      const feedback = cell.querySelector('.answer-feedback');
      cell.classList.toggle('is-correct', isCorrect);
      cell.classList.toggle('is-incorrect', !isCorrect);
      feedback.textContent = isCorrect ? 'Correct' : `Correct answer: ${correctAnswer}`;
    }

    function clearCell(cell) {
      const feedback = cell.querySelector('.answer-feedback');
      cell.classList.remove('is-correct', 'is-incorrect');
      if (feedback) {
        feedback.textContent = '';
      }
    }

    function checkRandomAnswer() {
      if (state.mode !== 'random' || state.randomIndex === null) {
        return;
      }

      const quiz = currentQuiz();
      const row = quiz.rows[state.randomIndex];
      let correctCount = 0;

      row.answers.forEach((correctAnswer, colIndex) => {
        const cell = document.querySelector(`[data-cell="random-${colIndex}"]`);
        const selected = readSelectValue('random', state.randomIndex, colIndex);
        const isCorrect = normalizeAnswer(selected) === normalizeAnswer(correctAnswer);
        if (isCorrect) {
          correctCount += 1;
        }
        markCell(cell, isCorrect, correctAnswer);
      });

      state.randomResult = { correctCount };
      const summary = document.getElementById('randomSummary');
      summary.textContent = correctCount === 3 ? 'All correct' : `${correctCount} of 3 correct`;
      summary.classList.toggle('is-correct', correctCount === 3);
      summary.classList.toggle('is-incorrect', correctCount !== 3);
      updateScoreDisplay();
    }

    function checkFullRow(rowIndex) {
      const quiz = currentQuiz();
      const row = quiz.rows[rowIndex];
      let correctCount = 0;

      row.answers.forEach((correctAnswer, colIndex) => {
        const cell = document.querySelector(`[data-cell="full-${rowIndex}-${colIndex}"]`);
        const selected = readSelectValue('full', rowIndex, colIndex);
        const isCorrect = normalizeAnswer(selected) === normalizeAnswer(correctAnswer);
        if (isCorrect) {
          correctCount += 1;
        }
        markCell(cell, isCorrect, correctAnswer);
      });

      state.fullResults.set(rowIndex, { correctCount });
      const summary = document.getElementById(`row-summary-${rowIndex}`);
      summary.textContent = correctCount === 3 ? 'All correct' : `${correctCount} of 3 correct`;
      summary.classList.toggle('is-correct', correctCount === 3);
      summary.classList.toggle('is-incorrect', correctCount !== 3);
      updateScoreDisplay();
    }

    function checkAllRows() {
      currentQuiz().rows.forEach((row, rowIndex) => {
        checkFullRow(rowIndex);
      });
    }

    function clearChangedAnswer(select) {
      const context = select.dataset.context;
      const rowIndex = Number(select.dataset.row);
      const colIndex = Number(select.dataset.col);

      if (context === 'random') {
        const cell = document.querySelector(`[data-cell="random-${colIndex}"]`);
        clearCell(cell);
        state.randomResult = null;
        const summary = document.getElementById('randomSummary');
        if (summary) {
          summary.textContent = '';
          summary.classList.remove('is-correct', 'is-incorrect');
        }
        updateScoreDisplay();
        return;
      }

      const cell = document.querySelector(`[data-cell="full-${rowIndex}-${colIndex}"]`);
      clearCell(cell);
      state.fullResults.delete(rowIndex);
      const summary = document.getElementById(`row-summary-${rowIndex}`);
      if (summary) {
        summary.textContent = 'Changed. Check row again.';
        summary.classList.remove('is-correct', 'is-incorrect');
      }
      updateScoreDisplay();
    }

    els.quizToggle.addEventListener('click', switchQuizType);

    els.modeButtons.forEach(button => {
      button.addEventListener('click', () => setMode(button.dataset.mode));
    });

    els.modeActions.addEventListener('click', event => {
      const action = event.target.closest('[data-action]')?.dataset.action;
      if (!action) {
        return;
      }

      if (action === 'reset') {
        resetCurrentMode();
      } else if (action === 'new-random') {
        newRandomTarget();
      } else if (action === 'check-random') {
        checkRandomAnswer();
      } else if (action === 'check-all') {
        checkAllRows();
      }
    });

    els.quizArea.addEventListener('click', event => {
      const rowButton = event.target.closest('[data-check-row]');
      if (rowButton) {
        checkFullRow(Number(rowButton.dataset.checkRow));
      }
    });

    els.quizArea.addEventListener('change', event => {
      if (event.target.matches('.answer-select')) {
        clearChangedAnswer(event.target);
      }
    });

    render();
  </script>
</body>
</html>
