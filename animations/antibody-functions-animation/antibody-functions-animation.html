<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antibody Functions</title>
  <style>
.animation-credit {
  width: 100%;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  padding: 8px 0;
  background: #f3f4f6;
  color: #111827;
  border-bottom: 1px solid #d1d5db;
  box-sizing: border-box;
}
    :root {
      --bg: #f3f7f8;
      --panel: #ffffff;
      --ink: #1f2d35;
      --muted: #52636d;
      --line: #c9d8de;
      --blue: #2f80ed;
      --blue-soft: #dcecff;
      --green: #43a047;
      --teal: #168c8c;
      --orange: #f4a340;
      --red: #d84b4b;
      --purple: #7b61c8;
      --antibody: #2f6f9f;
      --fab: #1f88d8;
      --fc: #264f73;
      --shadow: 0 10px 28px rgba(22, 39, 48, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      width: min(1180px, calc(100vw - 24px));
      height: 100vh;
      margin: 0 auto;
      padding: 12px 0 10px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 9px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.45rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 0.8fr 2fr auto;
      gap: 10px;
      align-items: stretch;
    }

    fieldset {
      min-width: 0;
      margin: 0;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    legend {
      padding: 0 4px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .button-row,
    .function-grid,
    .action-buttons {
      display: grid;
      gap: 7px;
    }

    .button-row {
      grid-template-columns: 1fr 1fr;
    }

    .function-grid {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9fcfd;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 120ms ease;
    }

    button:hover:not(:disabled) {
      border-color: #7aa7c7;
      background: #eef8ff;
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button[aria-pressed="true"] {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: #184b85;
    }

    button:disabled {
      color: #7e8c93;
      background: #edf1f3;
      cursor: not-allowed;
    }

    .function-choice {
      position: relative;
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 4px;
    }

    .function-choice button {
      width: 100%;
      height: 100%;
      padding: 6px;
      line-height: 1.12;
      font-size: 0.88rem;
    }

    .nk-note {
      display: none;
      margin: 0;
      color: #6a5b2d;
      font-size: 0.72rem;
      line-height: 1.2;
    }

    .nk-note.visible {
      display: block;
    }

    .action-buttons {
      align-content: end;
      grid-template-columns: 1fr;
      min-width: 150px;
    }

    .play {
      background: #eaf7ef;
      border-color: #a7d7b5;
      color: #256c38;
    }

    .reset {
      background: #fff7e8;
      border-color: #e4c889;
      color: #7a560d;
    }

    .stage-shell {
      position: relative;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    #scene {
      display: block;
      width: 100%;
      height: 100%;
    }

    .step-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      max-width: min(560px, calc(100% - 24px));
      padding: 8px 11px;
      border: 1px solid #bcd3dc;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      color: #214150;
      font-weight: 700;
      font-size: 0.94rem;
      pointer-events: none;
    }

    .caption {
      min-height: 58px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-size: 0.98rem;
      line-height: 1.32;
    }

    .caption strong {
      color: #12384d;
    }

    .svg-label {
      fill: #28414d;
      font-size: 17px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .svg-small-label {
      fill: #42525a;
      font-size: 13px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .antibody {
      fill: none;
      stroke: var(--antibody);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .antibody-tip {
      fill: var(--fab);
      stroke: #ffffff;
      stroke-width: 2;
    }

    .fc-dot {
      fill: var(--fc);
      stroke: #ffffff;
      stroke-width: 2;
    }

    .failed-path {
      fill: none;
      stroke: #6d7d84;
      stroke-width: 3;
      stroke-dasharray: 8 8;
    }

    @media (max-width: 920px) {
      .app {
        width: calc(100vw - 14px);
        padding-top: 8px;
        gap: 7px;
      }

      .subtitle {
        display: none;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .function-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .action-buttons {
        grid-template-columns: 1fr 1fr;
      }

      button {
        min-height: 34px;
      }
    }
  </style>
</head>
<body>
<div class="animation-credit">
  Animation Prompted by Jerred Seveyka for his biology class
</div>
  <main class="app" aria-labelledby="pageTitle">
    <header>
      <div>
        <h1 id="pageTitle">Antibody Functions</h1>
        <p class="subtitle">Select a target and an antibody function, then play the stepwise animation.</p>
      </div>
    </header>

    <section class="controls" aria-label="Animation controls">
      <fieldset>
        <legend>Target type</legend>
        <div class="button-row" role="group" aria-label="Target type">
          <button type="button" class="target-btn" data-target="bacterium" aria-pressed="true">Bacterium</button>
          <button type="button" class="target-btn" data-target="virus" aria-pressed="false">Virus</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Antibody function</legend>
        <div class="function-grid" role="group" aria-label="Antibody function">
          <div class="function-choice">
            <button type="button" class="function-btn" data-function="neutralization" aria-pressed="true">Neutralization</button>
          </div>
          <div class="function-choice">
            <button type="button" class="function-btn" data-function="opsonization" aria-pressed="false">Opsonization</button>
          </div>
          <div class="function-choice">
            <button type="button" class="function-btn" data-function="agglutination" aria-pressed="false">Agglutination</button>
          </div>
          <div class="function-choice">
            <button type="button" class="function-btn" data-function="complement" aria-pressed="false">Complement fixation</button>
          </div>
          <div class="function-choice">
            <button type="button" class="function-btn" data-function="mast" aria-pressed="false">Mast cell sensitization</button>
          </div>
          <div class="function-choice">
            <button type="button" class="function-btn" id="nkButton" data-function="nk" aria-pressed="false">Activation of natural killer cells</button>
            <p class="nk-note visible" id="nkNote">NK-cell antibody-dependent killing is shown here only for virus-infected host cells.</p>
          </div>
        </div>
      </fieldset>

      <div class="action-buttons" aria-label="Playback controls">
        <button type="button" class="play" id="playButton">Play animation</button>
        <button type="button" class="reset" id="resetButton">Reset</button>
      </div>
    </section>

    <section class="stage-shell" aria-label="Animation area">
      <svg id="scene" viewBox="0 0 980 500" role="img" aria-labelledby="sceneTitle sceneDesc">
        <title id="sceneTitle">Antibody function animation</title>
        <desc id="sceneDesc">A stepwise cartoon diagram showing how antibodies bind antigens and recruit immune effectors.</desc>
        <g id="sceneLayer"></g>
      </svg>
      <div class="step-badge" id="stepText">Ready</div>
    </section>

    <section class="caption" id="captionText" aria-live="polite"></section>
  </main>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";

    const scene = document.getElementById("scene");
    const sceneLayer = document.getElementById("sceneLayer");
    const captionText = document.getElementById("captionText");
    const stepText = document.getElementById("stepText");
    const targetButtons = [...document.querySelectorAll(".target-btn")];
    const functionButtons = [...document.querySelectorAll(".function-btn")];
    const nkButton = document.getElementById("nkButton");
    const nkNote = document.getElementById("nkNote");
    const playButton = document.getElementById("playButton");
    const resetButton = document.getElementById("resetButton");

    const captions = {
      neutralization: "<strong>Neutralization:</strong> antibodies bind surface antigens and block the microbe from attaching to host cells.",
      opsonization: "<strong>Opsonization:</strong> antibodies coat the microbe, and phagocytes bind the Fc regions to consume it.",
      agglutination: "<strong>Agglutination:</strong> antibodies cross-link microbes together, forming clumps that are easier to clear.",
      complement: "<strong>Complement fixation:</strong> IgG antibodies bound to a microbe activate complement, leading to membrane attack complex formation and membrane damage.",
      mast: "<strong>Mast cell sensitization:</strong> IgE binds by its Fc region to mast cells, leaving Fab tips exposed as antigen receptors.",
      nk: "<strong>NK-cell activation:</strong> antibodies bind viral antigens on an infected cell. NK cells bind the Fc regions, release perforin to form pores, and granzyme enters to trigger apoptosis."
    };

    const state = {
      target: "bacterium",
      functionName: "neutralization",
      progress: 0,
      raf: null,
      playing: false
    };

    function createSvgElement(tag, attrs = {}, parent = sceneLayer) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [name, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) {
          node.setAttribute(name, value);
        }
      }
      parent.appendChild(node);
      return node;
    }

    function clearScene() {
      while (sceneLayer.lastChild) {
        sceneLayer.removeChild(sceneLayer.lastChild);
      }
    }

    function clamp(value, min = 0, max = 1) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function segment(progress, start, end) {
      return clamp((progress - start) / (end - start));
    }

    function ease(t) {
      const x = clamp(t);
      return x * x * (3 - 2 * x);
    }

    function pointFromAngle(cx, cy, radius, deg) {
      const rad = deg * Math.PI / 180;
      return {
        x: cx + Math.cos(rad) * radius,
        y: cy + Math.sin(rad) * radius,
        outwardDeg: deg
      };
    }

    function polarVector(deg, length) {
      const rad = deg * Math.PI / 180;
      return { x: Math.cos(rad) * length, y: Math.sin(rad) * length };
    }

    function drawText(text, x, y, className = "svg-label", anchor = "middle", parent = sceneLayer) {
      const node = createSvgElement("text", {
        x,
        y,
        class: className,
        "text-anchor": anchor
      }, parent);
      node.textContent = text;
      return node;
    }

    function drawArrowLine(x1, y1, x2, y2, color = "#52636d", width = 3, dash = "") {
      const line = createSvgElement("line", {
        x1,
        y1,
        x2,
        y2,
        stroke: color,
        "stroke-width": width,
        "stroke-linecap": "round",
        "stroke-dasharray": dash
      });
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const head = [
        [x2, y2],
        [x2 - Math.cos(angle - 0.45) * 13, y2 - Math.sin(angle - 0.45) * 13],
        [x2 - Math.cos(angle + 0.45) * 13, y2 - Math.sin(angle + 0.45) * 13]
      ];
      createSvgElement("polygon", {
        points: head.map(p => p.join(",")).join(" "),
        fill: color
      });
      return line;
    }

    function drawBlockedSymbol(x, y, scale = 1) {
      createSvgElement("circle", {
        cx: x,
        cy: y,
        r: 23 * scale,
        fill: "rgba(255,255,255,0.86)",
        stroke: "#d84b4b",
        "stroke-width": 5 * scale
      });
      createSvgElement("line", {
        x1: x - 15 * scale,
        y1: y + 15 * scale,
        x2: x + 15 * scale,
        y2: y - 15 * scale,
        stroke: "#d84b4b",
        "stroke-width": 5 * scale,
        "stroke-linecap": "round"
      });
    }

    function drawHostCellWithReceptor() {
      createSvgElement("circle", {
        cx: 900,
        cy: 255,
        r: 172,
        fill: "#e7f3ff",
        stroke: "#6ba9db",
        "stroke-width": 4
      });
      createSvgElement("circle", {
        cx: 910,
        cy: 255,
        r: 58,
        fill: "#c9e4f9",
        stroke: "#87bedf",
        "stroke-width": 2
      });
      const receptor = createSvgElement("g", {});
      createSvgElement("path", {
        d: "M 724 226 C 744 236, 744 270, 724 280",
        fill: "none",
        stroke: "#335f7c",
        "stroke-width": 8,
        "stroke-linecap": "round"
      }, receptor);
      createSvgElement("path", {
        d: "M 714 235 C 728 242, 728 264, 714 272",
        fill: "none",
        stroke: "#335f7c",
        "stroke-width": 4,
        "stroke-linecap": "round"
      }, receptor);
      drawText("host cell", 873, 92, "svg-small-label");
      drawText("receptor", 716, 307, "svg-small-label");
    }

    function bacteriumSites() {
      return [
        { x: -66, y: 0, outwardDeg: 180 },
        { x: -48, y: -36, outwardDeg: -120 },
        { x: 0, y: -43, outwardDeg: -90 },
        { x: 48, y: -36, outwardDeg: -60 },
        { x: 74, y: 0, outwardDeg: 0 },
        { x: 42, y: 37, outwardDeg: 55 },
        { x: -42, y: 37, outwardDeg: 125 }
      ];
    }

    function virusSites() {
      const angles = [-150, -105, -60, -20, 25, 70, 120, 170];
      return angles.map(deg => {
        const base = pointFromAngle(0, 0, 48, deg);
        return { x: base.x, y: base.y, outwardDeg: deg };
      });
    }

    function transformedMicrobeSites(type, cx, cy, scale = 1) {
      const data = type === "bacterium" ? bacteriumSites() : virusSites();
      return data.map(site => {
        const v = polarVector(site.outwardDeg, 17);
        return {
          x: cx + (site.x + v.x) * scale,
          y: cy + (site.y + v.y) * scale,
          outwardDeg: site.outwardDeg
        };
      });
    }

    function drawBacterium(x, y, scale = 1, options = {}) {
      const g = createSvgElement("g", {
        transform: `translate(${x} ${y}) scale(${scale})`,
        opacity: options.opacity ?? 1
      });
      createSvgElement("rect", {
        x: -78,
        y: -40,
        width: 156,
        height: 80,
        rx: 40,
        fill: "#8fd46f",
        stroke: "#2f8735",
        "stroke-width": 4
      }, g);
      createSvgElement("path", {
        d: "M -45 -18 C -20 -30, 14 -18, 45 -24 M -52 14 C -20 27, 23 16, 52 25",
        fill: "none",
        stroke: "#5dae53",
        "stroke-width": 5,
        "stroke-linecap": "round",
        opacity: 0.65
      }, g);
      bacteriumSites().forEach(site => {
        const v = polarVector(site.outwardDeg, 18);
        createSvgElement("line", {
          x1: site.x,
          y1: site.y,
          x2: site.x + v.x,
          y2: site.y + v.y,
          stroke: "#257233",
          "stroke-width": 4,
          "stroke-linecap": "round"
        }, g);
        createSvgElement("circle", {
          cx: site.x + v.x,
          cy: site.y + v.y,
          r: 7,
          fill: "#ffd166",
          stroke: "#8a6b13",
          "stroke-width": 2
        }, g);
      });
      if (options.label !== false) {
        drawText("bacterium", x, y + 76 * scale, "svg-small-label");
      }
      return transformedMicrobeSites("bacterium", x, y, scale);
    }

    function drawVirus(x, y, scale = 1, options = {}) {
      const g = createSvgElement("g", {
        transform: `translate(${x} ${y}) scale(${scale})`,
        opacity: options.opacity ?? 1
      });
      virusSites().forEach(site => {
        const v = polarVector(site.outwardDeg, 21);
        createSvgElement("line", {
          x1: site.x,
          y1: site.y,
          x2: site.x + v.x,
          y2: site.y + v.y,
          stroke: "#25679f",
          "stroke-width": 5,
          "stroke-linecap": "round"
        }, g);
        createSvgElement("circle", {
          cx: site.x + v.x,
          cy: site.y + v.y,
          r: 7,
          fill: "#ffb74d",
          stroke: "#9b5d08",
          "stroke-width": 2
        }, g);
      });
      createSvgElement("circle", {
        cx: 0,
        cy: 0,
        r: 50,
        fill: "#82c3ff",
        stroke: "#2d78b5",
        "stroke-width": 4
      }, g);
      createSvgElement("path", {
        d: "M -22 -2 C -5 -20, 14 -20, 24 -3 C 14 13, -7 17, -22 -2 Z",
        fill: "#b6dcff",
        stroke: "#5a98ca",
        "stroke-width": 2
      }, g);
      if (options.label !== false) {
        drawText("virus", x, y + 82 * scale, "svg-small-label");
      }
      return transformedMicrobeSites("virus", x, y, scale);
    }

    function drawMicrobe(type, x, y, scale = 1, options = {}) {
      return type === "bacterium"
        ? drawBacterium(x, y, scale, options)
        : drawVirus(x, y, scale, options);
    }

    function antibodyGeometry(fabX, fabY, outwardDeg, scale = 1) {
      const rotationDeg = outwardDeg - 90;
      const rotation = rotationDeg * Math.PI / 180;
      const cos = Math.cos(rotation);
      const sin = Math.sin(rotation);
      const transform = (lx, ly) => ({
        x: fabX + scale * (lx * cos - ly * sin),
        y: fabY + scale * (lx * sin + ly * cos)
      });
      return {
        fabMid: transform(0, 0),
        fabLeft: transform(-9, 0),
        fabRight: transform(9, 0),
        hinge: transform(0, 20),
        fcEnd: transform(0, 50),
        rotationDeg
      };
    }

    function drawAntibodyAtSurface(fabX, fabY, outwardDeg, scale = 1, options = {}) {
      const geom = antibodyGeometry(fabX, fabY, outwardDeg, scale);
      const g = createSvgElement("g", {
        transform: `translate(${fabX} ${fabY}) rotate(${geom.rotationDeg}) scale(${scale})`,
        opacity: options.opacity ?? 1
      });
      createSvgElement("path", {
        d: "M -9 0 L 0 20 L 9 0 M 0 20 L 0 50",
        class: "antibody"
      }, g);
      createSvgElement("circle", { cx: -9, cy: 0, r: 5.5, class: "antibody-tip" }, g);
      createSvgElement("circle", { cx: 9, cy: 0, r: 5.5, class: "antibody-tip" }, g);
      createSvgElement("circle", { cx: 0, cy: 50, r: 5, class: "fc-dot" }, g);
      if (options.showLabels) {
        drawText("Fab tips bind antigen", geom.fabMid.x + 9, geom.fabMid.y - 15, "svg-small-label", "start");
        drawText("Fc region", geom.fcEnd.x + 8, geom.fcEnd.y + 5, "svg-small-label", "start");
      }
      return geom;
    }

    function drawBridgeAntibody(pointA, pointB, sign = 1, opacity = 1) {
      const dx = pointB.x - pointA.x;
      const dy = pointB.y - pointA.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len * sign;
      const ny = dx / len * sign;
      const hinge = {
        x: (pointA.x + pointB.x) / 2 + nx * 18,
        y: (pointA.y + pointB.y) / 2 + ny * 18
      };
      const fcEnd = { x: hinge.x + nx * 48, y: hinge.y + ny * 48 };
      createSvgElement("path", {
        d: `M ${pointA.x} ${pointA.y} L ${hinge.x} ${hinge.y} L ${pointB.x} ${pointB.y} M ${hinge.x} ${hinge.y} L ${fcEnd.x} ${fcEnd.y}`,
        class: "antibody",
        opacity
      });
      [pointA, pointB].forEach(p => {
        createSvgElement("circle", {
          cx: p.x,
          cy: p.y,
          r: 5,
          class: "antibody-tip",
          opacity
        });
      });
      createSvgElement("circle", {
        cx: fcEnd.x,
        cy: fcEnd.y,
        r: 5,
        class: "fc-dot",
        opacity
      });
    }

    function drawFcBindingLine(from, to, label, opacity = 1) {
      createSvgElement("line", {
        x1: from.x,
        y1: from.y,
        x2: to.x,
        y2: to.y,
        stroke: "#405861",
        "stroke-width": 3,
        "stroke-linecap": "round",
        "stroke-dasharray": "4 5",
        opacity
      });
      createSvgElement("circle", {
        cx: to.x,
        cy: to.y,
        r: 6,
        fill: "#ffffff",
        stroke: "#405861",
        "stroke-width": 2,
        opacity
      });
      if (label) {
        drawText(label, (from.x + to.x) / 2, (from.y + to.y) / 2 - 10, "svg-small-label");
      }
    }

    function drawPhagocyte(x, y, engulfProgress = 0) {
      const g = createSvgElement("g", {});
      createSvgElement("ellipse", {
        cx: x,
        cy: y,
        rx: 116,
        ry: 88,
        fill: "#b8eee8",
        stroke: "#168c8c",
        "stroke-width": 4
      }, g);
      createSvgElement("circle", {
        cx: x - 25,

    function igeGeometryByFc(fcX, fcY, outwardDeg, scale = 1) {
      const inwardDeg = outwardDeg + 180;

      const origin = {
        x: fcX - base.fcEnd.x,
        y: fcY - base.fcEnd.y
      };
      return {
        origin,
        rotationDeg: base.rotationDeg,
        fabLeft: { x: origin.x + base.fabLeft.x, y: origin.y + base.fabLeft.y },
        fabRight: { x: origin.x + base.fabRight.x, y: origin.y + base.fabRight.y },
        fabMid: { x: origin.x + base.fabMid.x, y: origin.y + base.fabMid.y },
        hinge: { x: origin.x + base.hinge.x, y: origin.y + base.hinge.y },
        fcEnd: { x: fcX, y: fcY }
      };
    }

    function stepForNeutralization(p) {
      if (p < 0.14) return "Ready: microbe approaches a host cell receptor.";
      if (p < 0.45) return "1. Antibody Fab tips bind surface antigens.";
      if (p < 0.78) return "2. Coated binding structures cannot attach to the receptor.";
      return "3. Attachment fails: the receptor interaction is blocked.";
    }

    function stepForOpsonization(p) {
      if (p < 0.16) return "Ready: microbe exposes surface antigens.";
      if (p < 0.42) return "1. Antibody Fab tips coat antigens on the microbe.";
      if (p < 0.72) return "2. A phagocyte binds outward-facing Fc regions.";
      return "3. The phagocyte engulfs the antibody-coated microbe.";
    }

    function stepForAgglutination(p) {
      if (p < 0.2) return "Ready: microbes are separate.";
      if (p < 0.48) return "1. Antibodies bind antigens on different microbes.";
      if (p < 0.82) return "2. Antibody bridges pull microbes into a clump.";
      return "3. The clump is easier for the body to clear.";
    }

    function stepForMast(p) {
      if (p < 0.18) return "Ready: mast cell displays Fc receptors.";
      if (p < 0.43) return "1. IgE Fc stems bind mast cell Fc receptors.";
      if (p < 0.68) return "2. Antigen cross-links outward-facing Fab tips.";
      return "3. Cross-linking triggers mediator release.";
    }

    function stepForComplement(p) {
      if (p < 0.2) return "1. IgG binds antigen";
      if (p < 0.42) return "2. Complement binds Fc regions";
      if (p < 0.62) return "3. Complement cascade";
      if (p < 0.82) return "4. MAC forms";
      return "5. Membrane damage / lysis";
    }

    function stepForNK(p) {
      if (p < 0.22) return "1. Antibodies bind infected cell";
      if (p < 0.46) return "2. NK cell binds Fc regions";
      if (p < 0.64) return "3. Perforin forms pore";
      if (p < 0.82) return "4. Granzyme enters";
      return "5. Apoptosis";
    }

    function setStep(text) {
      stepText.textContent = text;
    }

    function renderNeutralization(progress = 0) {
      clearScene();
      captionText.innerHTML = captions.neutralization;
      setStep(stepForNeutralization(progress));

      drawHostCellWithReceptor();
      drawArrowLine(165, 95, 260, 95, "#6d7d84", 3, "6 6");
      drawText("movement toward receptor", 292, 101, "svg-small-label", "start");

      // Neutralization begins when Fab tips bind microbial surface antigens.
      // The Fc stems face outward because no effector cell is binding them here.
      const firstMove = ease(segment(progress, 0, 0.2));
      const secondMove = ease(segment(progress, 0.45, 0.78));
      const microbeX = lerp(190, 300, firstMove) + lerp(0, 305, secondMove);
      const microbeY = 250;
      const sites = drawMicrobe(state.target, microbeX, microbeY, 1, { label: true });
      const coatOpacity = segment(progress, 0.15, 0.36);
      if (coatOpacity > 0) {
        const indices = state.target === "bacterium" ? [2, 3, 4, 5] : [2, 3, 4, 5, 6];
        indices.forEach((index, i) => {
          drawAntibodyAtSurface(sites[index].x, sites[index].y, sites[index].outwardDeg, 0.78, {
            opacity: coatOpacity,
            showLabels: i === 0 && progress < 0.62
          });
        });
      }
      const receptorX = 718;
      createSvgElement("path", {
        d: `M ${microbeX + 90} 247 C ${microbeX + 165} 224, ${receptorX - 70} 224, ${receptorX} 247`,
        class: "failed-path",
        opacity: segment(progress, 0.52, 0.85)
      });
      if (progress > 0.66) {
        drawBlockedSymbol(690, 250, 1);
        drawText("blocked", 690, 294, "svg-small-label");
      }
    }

    function renderOpsonization(progress = 0) {
      clearScene();
      captionText.innerHTML = captions.opsonization;
      setStep(stepForOpsonization(progress));

      createSvgElement("rect", {
        x: 44,
        y: 54,
        width: 892,
        height: 372,
        rx: 18,
        fill: "#f9fbfd",
        stroke: "#e2ecf0"
      });

      const coatOpacity = segment(progress, 0.12, 0.34);
      const phagoMove = ease(segment(progress, 0.42, 0.7));
      const engulf = ease(segment(progress, 0.72, 1));
      const phagoX = lerp(142, 390, phagoMove);

      // Opsonization marks the microbe; the phagocyte recognizes the antibody Fc stems,
      // not the antigen-binding Fab tips.
      drawPhagocyte(phagoX, 250, engulf);

      const microbeScale = lerp(1, 0.76, engulf);
      const microbeOpacity = lerp(1, 0.38, engulf);
      const sites = drawMicrobe(state.target, 540, 250, microbeScale, {
        label: true,
        opacity: microbeOpacity
      });

      const antibodyGeometries = [];
      if (coatOpacity > 0) {
        const indices = state.target === "bacterium" ? [0, 1, 2, 6] : [0, 1, 6, 7];
        indices.forEach((index, i) => {
          const site = sites[index];
          antibodyGeometries.push(drawAntibodyAtSurface(site.x, site.y, site.outwardDeg, 0.76 * microbeScale, {
            opacity: coatOpacity * (1 - engulf * 0.45),
            showLabels: i === 1 && progress < 0.55
          }));
        });
      }

      if (progress > 0.56 && antibodyGeometries.length) {
        const bindOpacity = segment(progress, 0.56, 0.74);
        antibodyGeometries.slice(0, 3).forEach((geom, i) => {
          drawFcBindingLine(
            { x: phagoX + 93, y: 220 + i * 28 },
            geom.fcEnd,
            i === 1 ? "Fc binding" : "",
            bindOpacity
          );
        });
      }
      if (engulf > 0.58) {
        drawText("engulfment", 528, 116, "svg-label");
      }
    }

    function renderAgglutination(progress = 0) {
      clearScene();
      captionText.innerHTML = captions.agglutination;
      setStep(stepForAgglutination(progress));

      const clump = ease(segment(progress, 0.45, 0.85));
      const initial = [
        [255, 162], [516, 145], [735, 245], [350, 360], [638, 356]
      ];
      const final = [
        [430, 225], [510, 202], [582, 254], [455, 316], [548, 330]
      ];
      const positions = initial.map((p, i) => ({
        x: lerp(p[0], final[i][0], clump),
        y: lerp(p[1], final[i][1], clump)
      }));

      // Agglutination uses the two Fab arms of an antibody to cross-link antigens
      // on separate microbes, forming a larger aggregate.
      positions.forEach((p, i) => {
        drawMicrobe(state.target, p.x, p.y, 0.72, {
          label: i === 0 && progress < 0.28
        });
      });

      const bridgeOpacity = segment(progress, 0.2, 0.48);
      if (bridgeOpacity > 0) {
        const pairs = [[0, 1, 1], [1, 2, -1], [0, 3, -1], [3, 4, 1], [2, 4, -1]];
        pairs.forEach(([a, b, sign], i) => {
          const pa = positions[a];
          const pb = positions[b];
          const dx = pb.x - pa.x;
          const dy = pb.y - pa.y;
          const len = Math.hypot(dx, dy) || 1;
          const radius = state.target === "bacterium" ? 60 : 48;
          const pointA = { x: pa.x + dx / len * radius, y: pa.y + dy / len * radius };
          const pointB = { x: pb.x - dx / len * radius, y: pb.y - dy / len * radius };
          drawBridgeAntibody(pointA, pointB, sign, bridgeOpacity);
          if (i === 0 && progress < 0.65) {
            drawText("one antibody bridges two microbes", (pointA.x + pointB.x) / 2, (pointA.y + pointB.y) / 2 - 58, "svg-small-label");
          }
        });
      }

      if (progress > 0.78) {
        createSvgElement("ellipse", {
          cx: 505,
          cy: 277,
          rx: 206,
          ry: 154,
          fill: "none",
          stroke: "#52636d",
          "stroke-width": 3,
          "stroke-dasharray": "7 8",
          opacity: 0.75
        });
        drawText("clump", 505, 460, "svg-label");
      }
    }

    function renderMastCellSensitization(progress = 0) {
      clearScene();
      captionText.innerHTML = captions.mast;
      setStep(stepForMast(progress));

      const release = ease(segment(progress, 0.68, 1));
      drawMastCellBase(release);
      drawMastReceptors();

      // In mast cell sensitization, IgE binds "backwards": its Fc stem docks
      // on the mast cell receptor while the Fab tips point outward for antigen binding.
      const bind = ease(segment(progress, 0.12, 0.42));
      const receptors = mastReceptorPoints();
      const geometries = receptors.map((target, i) => {
        const startX = target.x + (i - 2) * 18;
        const startY = 185 + (i % 2) * 18;
        const fcX = lerp(startX, target.x, bind);
        const fcY = lerp(startY, target.y, bind);
        return drawIgEByFc(fcX, fcY, -90, 0.82, segment(progress, 0.04, 0.18));
      });

      if (progress > 0.2 && progress < 0.48) {
        drawText("Fc stem binds receptor", 235, 246, "svg-small-label", "start");
        drawText("Fab tips face outward", 614, 160, "svg-small-label", "start");
      }

      const cross = segment(progress, 0.45, 0.65);
      if (cross > 0) {
        drawAntigenCrosslink(geometries[1].fabRight, geometries[2].fabLeft, cross);
        drawAntigenCrosslink(geometries[2].fabRight, geometries[3].fabLeft, cross);
        drawText("antigen cross-link", 500, 182, "svg-small-label");
      }
    }

    function renderComplementFixation(progress = 0) {
      clearScene();
      captionText.innerHTML = captions.complement;
      setStep(stepForComplement(progress));

      createSvgElement("rect", {
        x: 42,
        y: 58,
        width: 896,
        height: 366,
        rx: 18,
        fill: "#f9fbfd",
        stroke: "#e2ecf0"
      });

      const microbeX = 455;
      const microbeY = 252;
      const microbeScale = state.target === "bacterium" ? 1.05 : 1.18;
      const lysis = segment(progress, 0.82, 1);
      const microbeOpacity = lerp(1, 0.58, ease(lysis));
      const sites = drawMicrobe(state.target, microbeX, microbeY, microbeScale, {
        label: state.target === "bacterium",
        opacity: microbeOpacity
      });
      if (state.target === "virus") {
        drawText("enveloped virus", microbeX, microbeY + 105, "svg-small-label");
      }
      const antibodyOpacity = segment(progress, 0.02, 0.2);
      const antibodyIndices = state.target === "bacterium" ? [2, 3] : [1, 2];
      const antibodyGeometries = [];

      // Complement fixation starts with adjacent IgG molecules bound by Fab tips.
      // C1 binds the neighboring Fc regions, then the cascade builds a MAC pore.
      if (antibodyOpacity > 0) {
        antibodyIndices.forEach((index, i) => {
          const site = sites[index];
          antibodyGeometries.push(drawAntibodyAtSurface(site.x, site.y, site.outwardDeg, 0.82, {
            opacity: antibodyOpacity,
            showLabels: i === 0 && progress < 0.32
          }));
        });
        drawText("IgG", microbeX - 35, microbeY - 125, "svg-small-label");
      }

      if (antibodyGeometries.length === 2 && progress > 0.2) {
        const c1 = segment(progress, 0.2, 0.42);
        const fcA = antibodyGeometries[0].fcEnd;
        const fcB = antibodyGeometries[1].fcEnd;
        const c1X = (fcA.x + fcB.x) / 2;
        const c1Y = (fcA.y + fcB.y) / 2 - 32;
        [fcA, fcB].forEach(fc => {
          createSvgElement("line", {
            x1: c1X,
            y1: c1Y,
            x2: fc.x,
            y2: fc.y,
            stroke: "#f4a340",
            "stroke-width": 3,
            "stroke-linecap": "round",
            opacity: c1
          });
        });
        [[0, 0], [-14, 8], [14, 8], [0, -14]].forEach(([dx, dy]) => {
          createSvgElement("circle", {
            cx: c1X + dx,
            cy: c1Y + dy,
            r: 10,
            fill: "#ffd166",
            stroke: "#b77a16",
            "stroke-width": 2,
            opacity: c1
          });
        });
        if (c1 > 0.35) {
          drawText("C1 binds Fc regions", c1X + 34, c1Y + 4, "svg-small-label", "start");
        }

        const cascade = segment(progress, 0.42, 0.62);
        if (cascade > 0) {
          const macX = state.target === "bacterium" ? microbeX + 86 : microbeX + 62;
          const macY = microbeY + 4;
          drawArrowLine(c1X + 38, c1Y + 10, macX - 42, macY - 34, "#43a047", 3, "5 6");
          const nodeX = lerp(c1X + 70, macX - 76, ease(cascade));
          const nodeY = lerp(c1Y + 26, macY - 28, ease(cascade));
          ["C3", "C5"].forEach((label, i) => {
            createSvgElement("circle", {
              cx: nodeX + i * 34,
              cy: nodeY + i * 9,
              r: 13,
              fill: "#dff4e6",
              stroke: "#43a047",
              "stroke-width": 2,
              opacity: cascade
            });
            drawText(label, nodeX + i * 34, nodeY + i * 9 + 4, "svg-small-label");
          });
          drawText("complement cascade", nodeX + 45, nodeY - 25, "svg-small-label", "start");
        }

        const macProgress = segment(progress, 0.62, 0.82);
        const macX = state.target === "bacterium" ? microbeX + 86 : microbeX + 62;
        const macY = microbeY + 4;
        drawMAC(macX, macY, macProgress);
        drawMicrobeDamage(microbeX, microbeY, state.target, lysis);
      }
    }

    function renderNKCellActivation(progress = 0) {
      clearScene();
      captionText.innerHTML = captions.nk;
      setStep(stepForNK(progress));

      // NK-cell activation is shown only for virus-infected host cells.
      // Two nearby antibodies bind viral antigens with Fab tips; the NK cell binds
      // their Fc stems before releasing perforin and granzyme.
      const cellX = 580;
      const cellY = 252;
      const apoptosis = segment(progress, 0.82, 1);
      const cellRadius = lerp(108, 76, ease(apoptosis));
      const sites = drawInfectedHostCell(cellX, cellY, 1, apoptosis);
      const chosen = [0, 8];
      const antibodyGeometries = [];
      chosen.forEach((index, i) => {
        const site = sites[index];
        antibodyGeometries.push(drawAntibodyAtSurface(site.x, site.y, site.outwardDeg, 0.78, {
          opacity: 1,
          showLabels: i === 0 && progress < 0.22
        }));
      });

      const nkMove = ease(segment(progress, 0.2, 0.46));
      const nkX = lerp(132, 365, nkMove);
      const bindProgress = segment(progress, 0.36, 0.54);
      drawNKCell(nkX, cellY, [
        {
          offsetY: -42,
          target: antibodyGeometries[0].fcEnd,
          bindProgress,
          label: progress < 0.62 ? "Fc receptors" : ""
        },
        {
          offsetY: 42,
          target: antibodyGeometries[1].fcEnd,
          bindProgress
        }
      ]);

      if (bindProgress > 0.55) {
        drawText("NK binds Fc", nkX + 90, cellY - 72, "svg-small-label", "start");
      }

      const poreX = cellX - cellRadius;
      const poreY = cellY;
      const perforin = segment(progress, 0.54, 0.64);
      if (perforin > 0) {
        drawMediatorDots(nkX + 75, cellY - 4, poreX - 14, poreY - 4, perforin, "perforin");
      }
      drawMembranePore(poreX, poreY, segment(progress, 0.58, 0.7), "pore");

      const granzyme = segment(progress, 0.66, 0.82);
      if (granzyme > 0) {
        drawMediatorDots(poreX - 18, poreY + 18, poreX + 66, poreY + 10, granzyme, "granzyme enters");
      }
    }

    function renderCurrent(progress = state.progress) {
      if (state.functionName === "neutralization") {
        renderNeutralization(progress);
      } else if (state.functionName === "opsonization") {
        renderOpsonization(progress);
      } else if (state.functionName === "agglutination") {
        renderAgglutination(progress);
      } else if (state.functionName === "complement") {
        renderComplementFixation(progress);
      } else if (state.functionName === "mast") {
        renderMastCellSensitization(progress);
      } else if (state.functionName === "nk") {
        renderNKCellActivation(progress);
      }
    }

    function cancelPlayback() {
      if (state.raf) {
        cancelAnimationFrame(state.raf);
      }
      state.raf = null;
      state.playing = false;
      playButton.textContent = "Play animation";
    }

    function resetAnimation() {
      cancelPlayback();
      state.progress = 0;
      renderCurrent(0);
    }

    function playAnimation() {
      cancelPlayback();
      state.playing = true;
      playButton.textContent = "Playing...";
      state.progress = 0;
      const duration = state.functionName === "mast" ? 6200 : 5600;
      let startTime = null;

      function frame(time) {
        if (!startTime) startTime = time;
        state.progress = clamp((time - startTime) / duration);
        renderCurrent(state.progress);
        if (state.progress < 1) {
          state.raf = requestAnimationFrame(frame);
        } else {
          cancelPlayback();
          state.progress = 1;
          renderCurrent(1);
        }
      }

      state.raf = requestAnimationFrame(frame);
    }

    function updateControls() {
      targetButtons.forEach(button => {
        const selected = button.dataset.target === state.target;
        button.setAttribute("aria-pressed", String(selected));
      });
      functionButtons.forEach(button => {
        const selected = button.dataset.function === state.functionName;
        button.setAttribute("aria-pressed", String(selected));
      });
      const bacteriumSelected = state.target === "bacterium";
      nkButton.disabled = bacteriumSelected;
      nkButton.setAttribute("aria-disabled", String(bacteriumSelected));
      nkNote.classList.toggle("visible", bacteriumSelected);
    }

    targetButtons.forEach(button => {
      button.addEventListener("click", () => {
        state.target = button.dataset.target;
        if (state.target === "bacterium" && state.functionName === "nk") {
          state.functionName = "neutralization";
        }
        updateControls();
        resetAnimation();
      });
    });

    functionButtons.forEach(button => {
      button.addEventListener("click", () => {
        if (button.disabled) return;
        state.functionName = button.dataset.function;
        updateControls();
        resetAnimation();
      });
    });

    playButton.addEventListener("click", playAnimation);
    resetButton.addEventListener("click", resetAnimation);

    updateControls();
    renderCurrent(0);
  </script>
</body>
</html>
